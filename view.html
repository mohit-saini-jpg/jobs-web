  <script>
    (function () {
      const urlParams = new URLSearchParams(window.location.search);
      const sectionParam = urlParams.get("section");
      const urlParam = urlParams.get("url");
      const nameParam = urlParams.get("name") || "View";

      const urlView = document.getElementById("url-view");
      const sectionView = document.getElementById("section-view");
      const fallback = document.getElementById("fallback");

      function show(el){ if(el) el.classList.remove("hidden"); }

      function safe(v) {
        return (v ?? "").toString().trim();
      }

      function normalizeUrl(raw) {
        const s = safe(raw);
        if (!s) return "";
        if (/^(https?:)?\/\//i.test(s) || /^(mailto:|tel:)/i.test(s)) return s;
        if (s.startsWith("#") || s.startsWith("?")) return s;
        if (s.startsWith("/") || s.includes(".html") || s.startsWith("./") || s.startsWith("../")) return s;
        return "https://" + s.replace(/^\/+/, "");
      }

      function slugifyTitle(raw) {
        const text = safe(raw)
          .normalize("NFKD")
          .replace(/[̀-ͯ]/g, "")
          .replace(/&/g, " and ")
          .replace(/[’']/g, "")
          .toLowerCase();

        const slug = text
          .replace(/[^a-z0-9]+/g, "-")
          .replace(/^-+|-+$/g, "")
          .replace(/-{2,}/g, "-")
          .slice(0, 120);

        return slug || "official-link";
      }

      function urlRedirectFingerprint(raw) {
        const s = normalizeUrl(raw);
        let h1 = 2166136261 >>> 0;
        let h2 = 8159751279 >>> 0;
        for (let i = 0; i < s.length; i++) {
          const c = s.charCodeAt(i);
          h1 ^= c;
          h1 = Math.imul(h1, 16777619) >>> 0;
          h2 = (Math.imul(h2, 1099511627) ^ c) >>> 0;
        }
        const alphabet = "0123456789abcdefghijklmnopqrstuvwxyz";
        function pack(n, len) {
          let x = n >>> 0;
          let out = "";
          for (let i = 0; i < len; i++) {
            out = alphabet[x % 36] + out;
            x = Math.floor(x / 36);
          }
          return out;
        }
        return pack(h1, 6) + pack(h2, 6);
      }

      function buildRedirectUrl(targetUrl, label) {
        const to = safe(targetUrl);
        if (!to) return "";
        const qs = new URLSearchParams();
        qs.set("slug", slugifyTitle(label || targetUrl));
        qs.set("k", urlRedirectFingerprint(to));
        // pass section context for breadcrumb on job.html
        if (sectionParam) qs.set("section", sectionParam);
        return `job.html?${qs.toString()}`;
      }

      // Update OG/Twitter meta tags so shared links show the correct title
      function updateShareMeta(title, desc) {
        var setMeta = function(sel, val) { var el = document.querySelector(sel); if (el) el.setAttribute('content', val); };
        var safeTitle = title || 'Top Sarkari Jobs';
        var safeDesc  = desc  || 'Latest government job updates, admit cards and results on Top Sarkari Jobs.';
        document.title = safeTitle + ' | Top Sarkari Jobs';
        setMeta('meta[property="og:title"]',       safeTitle + ' | Top Sarkari Jobs');
        setMeta('meta[property="og:description"]', safeDesc);
        setMeta('meta[name="twitter:title"]',      safeTitle + ' | Top Sarkari Jobs');
        setMeta('meta[name="twitter:description"]',safeDesc);
        setMeta('meta[property="og:url"]', window.location.href);
        // Update canonical URL dynamically
        var canonical = document.getElementById('canonicalTag');
        if (canonical) canonical.setAttribute('href', window.location.href);
        // Update description meta
        setMeta('meta[name="description"]', safeDesc);
        // Update keywords dynamically
        var kwMeta = document.querySelector('meta[name="keywords"]');
        if (kwMeta && safeTitle) {
          kwMeta.setAttribute('content', safeTitle + ', sarkari jobs 2026, government jobs, top sarkari jobs');
        }
      }

      // ── 1. Tool / URL View ──────────────────────────────────────────
      if (urlParam) {
        show(urlView);
        const toolName = nameParam || 'Online Tool';
        const toolUrl  = decodeURIComponent(urlParam);
        updateShareMeta(toolName, 'Use ' + toolName + ' free on Top Sarkari Jobs.');

        // Sites known to block iframe embedding (X-Frame-Options / CSP)
        var IFRAME_BLOCKED = [
          'imageresizer.com','tinypng.com','iloveimg.com','ilovepdf.com',
          'photoroom.com','cutout.pro','befunky.com','cloudconvert.com',
          'resizepixel.com','freeconvert.com','clideo.com',
          'online-video-cutter.com','mp3cut.net','mp3joiner.com',
          'online-voice-recorder.com','compressjpeg.com','compressnow.com',
          'smallpdf.com','pdf2go.com','sejda.com','tools.pdf24.org',
          'www.adobe.com','canva.com','remove.bg','cleanup.pictures',
          'upscalepics.com','picresize.com','birme.net','bulkresizephotos.com',
          'pdfresizer.com','lightpdf.com','freepdfconvert.com'
        ];

        function isBlocked(url) {
          try {
            var host = new URL(url).hostname.replace(/^www\./,'');
            return IFRAME_BLOCKED.some(function(b){ return host === b || host.endsWith('.'+b); });
          } catch(e){ return false; }
        }

        // Tool icon map by keyword
        function toolIcon(name) {
          var n = (name||'').toLowerCase();
          if(n.includes('pdf'))      return {icon:'fa-file-pdf',   color:'#dc2626', bg:'#fff5f5'};
          if(n.includes('image')||n.includes('photo')||n.includes('resize')||n.includes('compress')||n.includes('passport')||n.includes('background')||n.includes('crop')||n.includes('signature')) return {icon:'fa-image', color:'#1a56db', bg:'#eff6ff'};
          if(n.includes('video')||n.includes('mp4')||n.includes('avi')||n.includes('mov')) return {icon:'fa-video', color:'#7c3aed', bg:'#faf5ff'};
          if(n.includes('audio')||n.includes('mp3')||n.includes('music')||n.includes('voice')) return {icon:'fa-music', color:'#0891b2', bg:'#ecfeff'};
          if(n.includes('convert')) return {icon:'fa-arrows-rotate', color:'#059669', bg:'#f0fdf4'};
          return {icon:'fa-screwdriver-wrench', color:'#1a56db', bg:'#eff6ff'};
        }

        var iframe = document.getElementById("url-iframe");
        var urlViewEl = document.getElementById("url-view");

        // Render a branded "Open Tool" landing card
        function showLandingCard(reason) {
          var t = toolIcon(toolName);
          urlViewEl.innerHTML = [
            '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:72vh;padding:24px;text-align:center;">',

              // Card
              '<div style="background:#fff;border:1.5px solid #e2e8f0;border-radius:18px;padding:36px 32px 32px;max-width:460px;width:100%;box-shadow:0 8px 32px rgba(13,34,87,.1);">',

                // Big icon
                '<div style="width:72px;height:72px;background:'+t.bg+';border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:2rem;color:'+t.color+';margin:0 auto 18px;border:1.5px solid rgba(0,0,0,.06);">',
                  '<i class="fa-solid '+t.icon+'"></i>',
                '</div>',

                '<h1 style="font-size:1.25rem;font-weight:900;color:#0d2257;margin-bottom:8px;">'+toolName+'</h1>',
                '<p style="font-size:.83rem;color:#64748b;line-height:1.6;margin-bottom:8px;">Yeh tool ek alag website par hai. Security restrictions ki wajah se hum ise seedha yahan nahi dikha sakte.</p>',

                // Info badge
                '<div style="display:inline-flex;align-items:center;gap:7px;background:#fffbeb;border:1px solid #fde68a;color:#92400e;border-radius:8px;padding:8px 14px;font-size:.76rem;font-weight:700;margin-bottom:22px;">',
                  '<i class="fa-solid fa-circle-info"></i> Tool new tab mein khulega — bilkul free hai',
                '</div>',

                // Main CTA button
                '<a href="'+toolUrl+'" target="_blank" rel="noopener noreferrer" ',
                  'style="display:inline-flex;align-items:center;justify-content:center;gap:10px;',
                  'background:'+t.color+';color:#fff;font-size:.95rem;font-weight:800;',
                  'padding:14px 32px;border-radius:12px;text-decoration:none;width:100%;',
                  'box-shadow:0 4px 14px rgba(0,0,0,.15);transition:opacity .15s;margin-bottom:12px;" ',
                  'onmouseover="this.style.opacity=\'.88\';" onmouseout="this.style.opacity=\'1\';">',
                  '<i class="fa-solid fa-arrow-up-right-from-square"></i>',
                  toolName+' Kholo',
                '</a>',

                // Secondary: back
                '<a href="tools.html" ',
                  'style="display:inline-flex;align-items:center;justify-content:center;gap:7px;',
                  'color:#64748b;font-size:.8rem;font-weight:700;padding:10px 20px;',
                  'border-radius:10px;border:1.5px solid #e2e8f0;text-decoration:none;width:100%;',
                  'background:#f8fafc;" ',
                  'onmouseover="this.style.background=\'#f1f5f9\';" onmouseout="this.style.background=\'#f8fafc\';">',
                  '<i class="fa-solid fa-arrow-left"></i> Wapas Tools Par Jao',
                '</a>',

              '</div>',

              // Trust badges row
              '<div style="display:flex;flex-wrap:wrap;justify-content:center;gap:10px;margin-top:20px;">',
                '<span style="background:#fff;border:1px solid #e2e8f0;border-radius:20px;padding:4px 13px;font-size:.68rem;font-weight:700;color:#64748b;"><i class="fa-solid fa-check" style="color:#059669;"></i> 100% Free</span>',
                '<span style="background:#fff;border:1px solid #e2e8f0;border-radius:20px;padding:4px 13px;font-size:.68rem;font-weight:700;color:#64748b;"><i class="fa-solid fa-lock" style="color:#1a56db;"></i> No Signup</span>',
                '<span style="background:#fff;border:1px solid #e2e8f0;border-radius:20px;padding:4px 13px;font-size:.68rem;font-weight:700;color:#64748b;"><i class="fa-solid fa-bolt" style="color:#d97706;"></i> Instant</span>',
              '</div>',

            '</div>'
          ].join('');
        }

        // If URL is in known-blocked list → show landing card immediately (no iframe attempt)
        if (isBlocked(toolUrl)) {
          showLandingCard('blocked');
          return;
        }

        // Otherwise try iframe; show landing card if it errors or doesn't load within 6s
        if (iframe) {
          var iframeLoaded = false;
          var timer = setTimeout(function(){
            if(!iframeLoaded) showLandingCard('timeout');
          }, 6000);

          iframe.addEventListener('load', function(){
            iframeLoaded = true;
            clearTimeout(timer);
            // Try to detect X-Frame-Options block — if contentDocument is null/about:blank after load, it was blocked
            try {
              var doc = iframe.contentDocument || iframe.contentWindow.document;
              if (!doc || doc.URL === 'about:blank' || doc.body === null) {
                showLandingCard('blocked-detected');
              }
            } catch(e) {
              // Cross-origin error = loaded fine (same-origin restriction means content IS there)
            }
          });

          iframe.addEventListener('error', function(){
            clearTimeout(timer);
            showLandingCard('iframe-error');
          });

          iframe.src = toolUrl;
        }
        return;
      }

      // 2. Section View (Has Search Bar)
      if (sectionParam) {
        show(sectionView);
        const rawTitle = decodeURIComponent(sectionParam).replace(/-/g, ' ');
        const title = rawTitle.replace(/\b\w/g, function(c){ return c.toUpperCase(); });
        updateShareMeta(title, 'Browse ' + title + ' — latest government job updates on Top Sarkari Jobs.');
        if(document.getElementById("page-title")) document.getElementById("page-title").textContent = title.toUpperCase();

        // Render List
        (async () => {
             const list = document.getElementById("links-list");
             try {
                 const d = await getJobsSectionsV();
                 const spLower = sectionParam.toLowerCase().replace(/[\s_-]+/g, " ").trim();
                 const sec = d.sections.find(s =>
                   s.id === sectionParam ||
                   s.title === sectionParam ||
                   (s.id || "").toLowerCase().replace(/[\s_-]+/g, " ").trim() === spLower ||
                   (s.title || "").replace(/[\u{1F000}-\u{1FFFF}\u{2600}-\u{27BF}\u{2B00}-\u{2BFF}\u{FE00}-\u{FEFF}]/gu, "").replace(/[^\x00-\x7E]/g, "").trim().toLowerCase().replace(/[\s_-]+/g, " ").trim() === spLower
                 ) || d.sections[0];
                 
                 if(sec && sec.items) {
                     document.getElementById("loading").classList.add("hidden");
                     
                     // Filter Garbage Link
                     const cleanItems = sec.items.filter(i => {
                        const t = (i.name||i.title||"").toLowerCase();
                        return !t.includes("main home page");
                     });

                     if (!cleanItems.length) {
                       document.getElementById("loading").innerHTML = `
                         <div class="flex flex-col items-center gap-3 py-10">
                           <i class="fas fa-inbox text-3xl text-slate-300"></i>
                           <p class="text-slate-500 text-sm">Is category mein abhi koi jobs nahi hain.</p>
                         </div>`;
                     } else {

                     document.getElementById("countNow").textContent = cleanItems.length;
                     list.innerHTML = cleanItems.map(i => {
                        const label = i.name || i.title || 'Open';
                        // If item has a direct slug (from jobs-index.json), link directly to job.html?slug=
                        // Otherwise fall back to redirect hash system
                        let href;
                        if (i.slug) {
                          const qs = new URLSearchParams();
                          qs.set("slug", i.slug);
                          if (sectionParam) qs.set("section", sectionParam);
                          href = `job.html?${qs.toString()}`;
                        } else {
                          href = buildRedirectUrl(i.url || i.link, label) || (i.url || i.link || '#');
                        }
                        const targetAttr = i.external ? 'target="_blank" rel="noopener"' : '';
                        // Clean date display
