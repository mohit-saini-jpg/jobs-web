<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    view.html — SECTION LISTING PAGE (SEO-OPTIMIZED v3)
    ====================================================
    OLD UGLY URLs:
      /view.html?section=latest jobs        ← Google indexes this garbage
    NEW CLEAN URLs (via _redirects):
      /section/latest-jobs/                 ← redirect 200 → view.html

    The SEO engine (seo-engine.js) auto-generates:
      ✅ Dynamic title + description
      ✅ Canonical to /section/<slug>/
      ✅ BreadcrumbList schema
      ✅ FAQPage schema
      ✅ ItemList schema
      ✅ Related internal links
      ✅ FAQ HTML block
  -->
  <!-- GA4: Centralized Analytics -->
  <script src="/analytics.js" defer></script>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Top Sarkari Jobs | Latest Government Jobs, Results &amp; Admit Cards</title>
  <meta name="description" content="Browse latest Sarkari Jobs, Results, Admit Cards, Answer Keys, Admissions and Online Forms by category — updated daily on Top Sarkari Jobs." />
  <meta name="keywords" content="sarkari jobs, sarkari result, govt jobs, admit card, online form, answer key, syllabus" />
  <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
  <link id="canonicalTag" rel="canonical" href="https://www.topsarkarijobs.com/view.html" />
  <link rel="icon" type="image/x-icon" href="/image.ico">

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://www.topsarkarijobs.com/view.html" />
  <meta property="og:title" content="Top Sarkari Jobs - View" />
  <meta property="og:description" content="Top Sarkari Jobs: latest government job updates, admit cards, results, answer keys, syllabus and online forms." />
  <meta property="og:image" content="https://www.topsarkarijobs.com/image.png" />
  <meta property="og:image:width" content="800" />
  <meta property="og:image:height" content="800" />
  <meta property="og:site_name" content="Top Sarkari Jobs" />
  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Top Sarkari Jobs - View" />
  <meta name="twitter:description" content="Top Sarkari Jobs: latest government job updates, admit cards, results, answer keys, syllabus and online forms." />
  <meta name="twitter:image" content="https://www.topsarkarijobs.com/image.png" />

  <!-- ✅ SEO ENGINE: Auto-injects all dynamic meta, schema, FAQ, related links -->
  <script src="/seo-engine.js"></script>

  <!-- Schema placeholders (overwritten by seo-engine.js) -->
  <script type="application/ld+json" id="schema-breadcrumb">{}</script>
  <script type="application/ld+json" id="schema-faq">{}</script>
  <script type="application/ld+json" id="schema-itemlist">{}</script>

  <link rel="stylesheet" href="/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="/fonts/fa/all.min.css">

  <style>
    html, body { height: 100%; }
    body { display: flex; flex-direction: column; }
    main { flex: 1; }
    #site-header .search-card,
    #site-header .top-search,
    #site-header .search-row,
    #site-header input[type="search"] { display: none !important; }
    #view-search-container { position: relative; z-index: 50; }
    .search-dropdown {
       position: absolute; top: 100%; left: 0; right: 0; width: 100%;
       background: white; border: 1px solid #e2e8f0;
       border-bottom-left-radius: 0.5rem; border-bottom-right-radius: 0.5rem;
       box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
       max-height: 24rem; overflow-y: auto; margin-top: 0.25rem; z-index: 100;
    }
    .search-result-item {
      display: flex; flex-direction: column;
      padding: 10px 14px; border-bottom: 1px solid #f1f5f9;
      text-decoration: none; color: #0f172a; transition: background .12s;
    }
    .search-result-item:hover { background: #eff6ff; }
    .result-name { font-size: .84rem; font-weight: 700; color: #0369a1; }
    .result-meta { font-size: .73rem; color: #64748b; margin-top: 2px; }
  </style>
</head>
<body>
  <div id="site-header"></div>

  <main>
    <!-- URL / iframe tool view -->
    <section id="url-view" class="hidden h-full">
      <div class="w-full h-full">
        <iframe id="url-iframe" title="Viewer"
          style="width:100%;height:calc(100vh - 60px);border:none;"
          sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox allow-downloads allow-modals">
        </iframe>
      </div>
    </section>

    <!-- Section listing view -->
    <section id="section-view" class="hidden">
      <div class="max-w-5xl mx-auto px-4 py-4">
        <!-- Search bar -->
        <div id="view-search-container" class="mb-4">
          <div class="flex gap-2">
            <input id="sectionSearchInput" type="search"
              placeholder="Search jobs in this section..."
              class="flex-1 border border-slate-300 rounded-lg px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
              autocomplete="off" aria-label="Search jobs" />
            <button id="sectionSearchBtn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg transition shrink-0">
              Search
            </button>
          </div>
          <div id="sectionSearchResults" class="search-dropdown" style="display:none;" role="listbox"></div>
        </div>

        <!-- Section heading — H1 injected by seo-engine.js, H2 shown visually -->
        <h2 id="page-title" class="text-2xl font-bold text-slate-900 mb-4">Section</h2>

        <!-- Job cards grid -->
        <div id="section-cards" class="grid grid-cols-1 gap-3"></div>

        <!-- Pagination / load more -->
        <div id="section-pagination" class="mt-6 text-center"></div>
      </div>
    </section>

    <!-- Fallback: no section param -->
    <section id="fallback" class="hidden">
      <div class="max-w-2xl mx-auto px-4 py-8 text-center">
        <h3 class="font-bold text-lg">Pick a section</h3>
        <p class="mt-2 text-sm">Browse a category:</p>
        <ul id="fallback-sections" class="mt-3 grid grid-cols-1 md:grid-cols-2 gap-2 text-sm"></ul>
      </div>
    </section>
  </main>

  <div id="site-footer"></div>

  <!-- ═══════════════════════════════════════════════════════
       VIEW PAGE CONTROLLER
       Reads ?section= param → fetches data → renders cards
       Calls window.__SEO_updateSection() after render
  ═══════════════════════════════════════════════════════ -->
  <script>
  (function() {
    'use strict';

    /* ── DOM refs ── */
    var urlView      = document.getElementById('url-view');
    var sectionView  = document.getElementById('section-view');
    var fallbackView = document.getElementById('fallback');
    var pageTitle    = document.getElementById('page-title');
    var sectionCards = document.getElementById('section-cards');
    var searchInput  = document.getElementById('sectionSearchInput');
    var searchBtn    = document.getElementById('sectionSearchBtn');
    var searchResults= document.getElementById('sectionSearchResults');

    function show(el) {
      [urlView, sectionView, fallbackView].forEach(function(e) {
        if (e) e.classList.add('hidden');
      });
      if (el) el.classList.remove('hidden');
    }

    function qp(name) {
      return new URLSearchParams(window.location.search).get(name) || '';
    }

    /* ── Slugify ── */
    function slugify(str) {
      return (str || '').toLowerCase().replace(/[^\w\s-]/g,'').replace(/\s+/g,'-').replace(/-+/g,'-').replace(/^-|-$/g,'');
    }

    /* ── Update canonical + history to clean URL ── */
    function cleanifyURL(sectionParam) {
      var cleanSlug = slugify(sectionParam);
      var cleanUrl  = 'https://www.topsarkarijobs.com/section/' + cleanSlug + '/';
      // Update browser URL (SEO engine also handles canonical tag)
      if (window.history && window.history.replaceState) {
        try { window.history.replaceState({}, '', '/section/' + cleanSlug + '/'); } catch(e) {}
      }
      return cleanUrl;
    }

    /* ── Render a single job card ── */
    function renderCard(item) {
      var a    = document.createElement('a');
      var slug = item.slug || slugify(item.name || item.title || '');
      a.href   = '/jobs/' + slug + '/';
      a.className = 'block bg-white border border-slate-200 rounded-xl p-4 hover:shadow-md hover:border-blue-300 transition-all';
      a.setAttribute('title', item.name || item.title || '');

      var title = document.createElement('div');
      title.className = 'font-semibold text-slate-800 text-sm leading-snug mb-1';
      title.textContent = item.name || item.title || '';

      var meta = document.createElement('div');
      meta.className = 'flex flex-wrap gap-x-3 gap-y-1 mt-1';

      function badge(icon, text, color) {
        if (!text) return;
        var span = document.createElement('span');
        span.className = 'text-xs text-' + (color||'slate') + '-600 flex items-center gap-1';
        span.textContent = icon + ' ' + text;
        meta.appendChild(span);
      }

      badge('📅', item.date, 'blue');
      badge('📋', item.vac ? item.vac + ' Posts' : '', 'green');
      badge('💰', item.salary, 'purple');
      badge('🖊️', item.mode, 'orange');

      a.appendChild(title);
      a.appendChild(meta);
      return a;
    }

    /* ── Main entry ── */
    var sectionParam = qp('section');
    var urlParam     = qp('url');
    var nameParam    = qp('name');

    /* ─ TOOL / iframe ─ */
    if (urlParam) {
      show(urlView);
      var iframe = document.getElementById('url-iframe');
      var toolUrl = decodeURIComponent(urlParam);
      iframe.src  = toolUrl;
      iframe.title = nameParam || 'Online Tool';
      // noindex set by seo-engine.js automatically for ?url= pages
      return;
    }

    /* ─ SECTION ─ */
    if (sectionParam) {
      show(sectionView);
      cleanifyURL(sectionParam);

      /* Fetch jobs data */
      var dataUrls = ['/Complete_Jobs_Full_Data.json', '/dailyupdates.json', '/jobs.json'];

      Promise.all(dataUrls.map(function(u) {
        return fetch(u).then(function(r) { return r.ok ? r.json() : null; }).catch(function() { return null; });
      })).then(function(results) {
        var allItems = [];
        var sp = sectionParam.toLowerCase();

        /* ── Parse Complete_Jobs_Full_Data.json ── */
        if (results[0]) {
          var full = results[0];
          var arr  = Array.isArray(full) ? full : (full.jobs || full.data || Object.values(full)[0] || []);
          arr.forEach(function(job) {
            var t = (job.title || job.name || '').toLowerCase();
            if (t.indexOf(sp) !== -1 || matchCategory(job, sp)) {
              allItems.push(normalise(job));
            }
          });
        }

        /* ── Parse dailyupdates.json ── */
        if (results[1]) {
          var du = results[1];
          var duArr = Array.isArray(du) ? du : (du.jobs || du.updates || []);
          duArr.forEach(function(job) {
            var t = (job.title || '').toLowerCase();
            if (t.indexOf(sp) !== -1 || matchCategory(job, sp)) {
              allItems.push(normalise(job));
            }
          });
        }

        /* ── Parse jobs.json sections ── */
        if (results[2] && !allItems.length) {
          var jd = results[2];
          ['top_jobs','left_jobs','right_jobs'].forEach(function(key) {
            if (Array.isArray(jd[key])) {
              jd[key].forEach(function(job) {
                var t = (job.title || '').toLowerCase();
                if (t.indexOf(sp) !== -1) {
                  allItems.push(normalise(job));
                }
              });
            }
          });
        }

        /* ── Deduplicate ── */
        var seen = {};
        allItems = allItems.filter(function(item) {
          var k = slugify(item.name || '');
          if (seen[k]) return false;
          seen[k] = true;
          return true;
        });

        /* ── Render ── */
        if (pageTitle) pageTitle.textContent = (sectionParam || 'Jobs').replace(/-/g,' ').replace(/\b\w/g, function(c) { return c.toUpperCase(); }) + ' ' + new Date().getFullYear();

        if (!allItems.length) {
          sectionCards.innerHTML = '<p class="text-slate-500 text-sm py-8 text-center">No jobs found. Check back soon!</p>';
        } else {
          sectionCards.innerHTML = '';
          allItems.slice(0, 60).forEach(function(item) {
            sectionCards.appendChild(renderCard(item));
          });
        }

        /* ── Call SEO engine with section data ── */
        if (window.__SEO_updateSection) {
          window.__SEO_updateSection(sectionParam, allItems);
        }

        /* ── Search box ── */
        setupSearch(allItems);
      });
    } else {
      /* No section param → show fallback with links */
      show(fallbackView);
      var list = document.getElementById('fallback-sections');
      if (list) {
        var cats = [
          ['Latest Jobs', '/section/latest-jobs/'],
          ['Upcoming Jobs', '/section/upcoming-jobs/'],
          ['10th Pass Jobs', '/section/10th-pass-jobs/'],
          ['Railway Jobs', '/section/railway-jobs/'],
          ['Bank Jobs', '/section/bank-jobs/'],
          ['Police Jobs', '/section/police-jobs/'],
          ['SSC Jobs', '/section/ssc-jobs/'],
          ['UPSC Jobs', '/section/upsc-jobs/'],
        ];
        cats.forEach(function(c) {
          var li = document.createElement('li');
          var a  = document.createElement('a');
          a.href = c[1];
          a.textContent = c[0];
          a.className = 'block p-3 bg-blue-50 rounded-lg text-blue-700 font-medium hover:bg-blue-100 transition text-sm';
          li.appendChild(a);
          list.appendChild(li);
        });
      }
    }

    /* ── Helpers ── */
    function matchCategory(job, sp) {
      var cats = (job.categories || job.category || job.section || '');
      if (Array.isArray(cats)) cats = cats.join(' ');
      return (cats.toLowerCase().indexOf(sp) !== -1);
    }

    function normalise(job) {
      return {
        name:   job.title || job.name || '',
        slug:   job.slug  || slugify(job.title || job.name || ''),
        date:   job.lastDate || job.last_date || job.date || '',
        vac:    job.totalVacancies || job.vacancies || job.posts || '',
        salary: job.salary || '',
        mode:   job.applyMode || job.mode || '',
        org:    job.organization || job.org || ''
      };
    }

    function setupSearch(items) {
      if (!searchInput) return;
      searchInput.addEventListener('input', function() {
        var q = this.value.trim().toLowerCase();
        searchResults.style.display = q.length < 2 ? 'none' : 'block';
        if (q.length < 2) return;
        searchResults.innerHTML = '';
        var hits = items.filter(function(i) { return (i.name||'').toLowerCase().indexOf(q) !== -1; }).slice(0, 10);
        hits.forEach(function(item) {
          var a = document.createElement('a');
          a.className = 'search-result-item';
          a.href = '/jobs/' + item.slug + '/';
          var name = document.createElement('span');
          name.className = 'result-name';
          name.textContent = item.name;
          var meta = document.createElement('span');
          meta.className = 'result-meta';
          meta.textContent = [item.date && ('Last Date: ' + item.date), item.vac && (item.vac + ' posts')].filter(Boolean).join(' · ');
          a.appendChild(name);
          a.appendChild(meta);
          searchResults.appendChild(a);
        });
        if (!hits.length) {
          searchResults.innerHTML = '<div class="p-3 text-sm text-slate-500">No results found for "' + q + '"</div>';
        }
      });
      document.addEventListener('click', function(e) {
        if (!searchResults.contains(e.target) && e.target !== searchInput) {
          searchResults.style.display = 'none';
        }
      });
      if (searchBtn) {
        searchBtn.addEventListener('click', function() {
          window.location.href = '/search.html?q=' + encodeURIComponent(searchInput.value);
        });
      }
    }
  })();
  </script>

  <!-- Header/Footer loader -->
  <script>
  ['header','footer'].forEach(function(part) {
    fetch('/' + part + '.html').then(function(r) { return r.ok ? r.text() : ''; }).then(function(html) {
      var el = document.getElementById('site-' + part);
      if (el && html) el.innerHTML = html;
    }).catch(function(){});
  });
  </script>
</body>
</html>
