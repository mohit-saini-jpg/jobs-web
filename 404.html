<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirecting… | Top Sarkari Jobs</title>
  <meta name="robots" content="noindex, nofollow" />
  <style>
    body { font-family: sans-serif; display: flex; align-items: center;
           justify-content: center; min-height: 100vh; margin: 0; background: #f0f4f8; }
    .box { text-align: center; color: #374151; }
    .spinner { width: 40px; height: 40px; border: 4px solid #e2e8f0;
               border-top-color: #1d4ed8; border-radius: 50%;
               animation: spin .7s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .home-link { display:inline-block; margin-top:12px; color:#1d4ed8;
                 font-size:.9rem; text-decoration:none; }
    .home-link:hover { text-decoration:underline; }
  </style>
  <script>
  /**
   * SEO-Friendly URL Router — Top Sarkari Jobs
   * ============================================
   * This file is served by GitHub Pages / Netlify / CF Pages for any
   * URL that does not match a real file. It reads the path and redirects
   * to the correct .html page. It is NOT a real 404 — it's a client-side router.
   *
   * CLEAN URL MAP:
   *   /jobs/<slug>/            → /job.html?slug=<slug>
   *   /section/<slug>/         → /view.html?section=<decoded>
   *   /category/<group>/       → /category.html?group=<group>
   *   /state/<name>/           → /state-jobs.html?_path=<path>
   *   /search/<query>/         → /search.html?q=<query>
   *   /state-jobs/<state>/     → /state-jobs.html?state=<state>  (legacy)
   *   shortcuts (see below)    → respective pages
   */
  (function () {
    'use strict';
    var path = window.location.pathname;

    // ── 1. Job detail: /jobs/<slug>/ ──────────────────────────────
    var jobMatch = path.match(/^\/jobs\/([^\/]+)\/?$/);
    if (jobMatch) {
      var slug = decodeURIComponent(jobMatch[1]);
      try { sessionStorage.setItem('__tsj_slug', slug); } catch(_) {}
      var refParam = '';
      try { refParam = new URLSearchParams(window.location.search).get('ref') || ''; } catch(_) {}
      var destUrl = '/job.html?slug=' + encodeURIComponent(slug);
      if (refParam) {
        try { sessionStorage.setItem('__tsj_ref', refParam); } catch(_) {}
        destUrl += '&ref=' + encodeURIComponent(refParam);
      }
      window.location.replace(destUrl);
      return;
    }

    // ── 2. Section pages: /section/<slug>/ ────────────────────────
    var sectionMatch = path.match(/^\/section\/([^\/]+)\/?$/);
    if (sectionMatch) {
      var sec = decodeURIComponent(sectionMatch[1]).replace(/-/g, ' ');
      window.location.replace('/view.html?section=' + encodeURIComponent(sec));
      return;
    }

    // ── 3. Category pages: /category/<group>/ ─────────────────────
    var catMatch = path.match(/^\/category\/([^\/]+)\/?$/);
    if (catMatch) {
      var group = decodeURIComponent(catMatch[1]);
      window.location.replace('/category.html?group=' + encodeURIComponent(group));
      return;
    }

    // ── 4. State listing (NEW): /state/<name>/ ────────────────────
    //    e.g. /state/madhya-pradesh/ → state-jobs.html reads slug from ?_path=
    var stateMatch = path.match(/^\/state\/([^\/]+)\/?$/);
    if (stateMatch) {
      window.location.replace('/state-jobs.html?_path=' + encodeURIComponent(path));
      return;
    }

    // ── 4b. State listing (legacy): /state-jobs/<state>/ ──────────
    var legacyStateMatch = path.match(/^\/state-jobs\/([^\/]+)\/?$/);
    if (legacyStateMatch) {
      var legacyState = decodeURIComponent(legacyStateMatch[1]).replace(/-/g, ' ');
      window.location.replace('/state-jobs.html?state=' + encodeURIComponent(legacyState));
      return;
    }

    // ── 5. Search: /search/<query>/ ───────────────────────────────
    var searchMatch = path.match(/^\/search\/([^\/]+)\/?$/);
    if (searchMatch) {
      var q = decodeURIComponent(searchMatch[1]).replace(/-/g, ' ');
      window.location.replace('/search.html?q=' + encodeURIComponent(q));
      return;
    }

    // ── 6. Static shortcut clean URLs ─────────────────────────────
    var shortcuts = {
      '/latest-jobs/':     '/view.html?section=latest+jobs',
      '/latest-jobs':      '/view.html?section=latest+jobs',
      '/results/':         '/view.html?section=Sarkari+Result',
      '/results':          '/view.html?section=Sarkari+Result',
      '/admit-card/':      '/view.html?section=Admit+cards+Exams+Date',
      '/admit-card':       '/view.html?section=Admit+cards+Exams+Date',
      '/railway-jobs/':    '/view.html?section=Railway+Jobs',
      '/railway-jobs':     '/view.html?section=Railway+Jobs',
      '/bank-jobs/':       '/view.html?section=Bank+Jobs',
      '/bank-jobs':        '/view.html?section=Bank+Jobs',
      '/police-jobs/':     '/view.html?section=Police+Jobs',
      '/police-jobs':      '/view.html?section=Police+Jobs',
      '/ssc-jobs/':        '/view.html?section=SSC+Jobs',
      '/ssc-jobs':         '/view.html?section=SSC+Jobs',
      '/upsc-jobs/':       '/view.html?section=UPSC+Jobs',
      '/upsc-jobs':        '/view.html?section=UPSC+Jobs',
      '/teaching-jobs/':   '/view.html?section=Teacher+Jobs',
      '/teaching-jobs':    '/view.html?section=Teacher+Jobs',
      '/army-jobs/':       '/view.html?section=Indian+ARMY+jobs',
      '/army-jobs':        '/view.html?section=Indian+ARMY+jobs',
      '/10th-pass-jobs/':  '/view.html?section=10th+Pass+jobs',
      '/10th-pass-jobs':   '/view.html?section=10th+Pass+jobs',
      '/12th-pass-jobs/':  '/view.html?section=12th+Pass+jobs',
      '/12th-pass-jobs':   '/view.html?section=12th+Pass+jobs',
      '/upcoming-jobs/':   '/view.html?section=upcoming-jobs',
      '/upcoming-jobs':    '/view.html?section=upcoming-jobs',
      '/state-jobs/':      '/view.html?section=State+jobs',
      '/state-jobs':       '/view.html?section=State+jobs',
      '/central-jobs/':    '/view.html?section=Central+jobs',
      '/central-jobs':     '/view.html?section=Central+jobs',
      '/answer-key/':      '/category.html?group=admit-result',
      '/answer-key':       '/category.html?group=admit-result',
      '/admissions/':      '/category.html?group=admissions',
      '/admissions':       '/category.html?group=admissions',
      '/haryana-jobs/':    '/section/haryana-all-state-jobs/',
      '/haryana-jobs':     '/section/haryana-all-state-jobs/',
      '/iti-jobs/':        '/section/iti-jobs/',
      '/iti-jobs':         '/section/iti-jobs/',
      '/diploma-jobs/':    '/section/diploma-jobs/',
      '/diploma-jobs':     '/section/diploma-jobs/',
      '/8th-pass-jobs/':   '/section/8th-pass/',
      '/8th-pass-jobs':    '/section/8th-pass/',
      '/graduation-jobs/': '/section/graduation-jobs/',
      '/graduation-jobs':  '/section/graduation-jobs/',
    };

    if (shortcuts[path]) {
      window.location.replace(shortcuts[path]);
      return;
    }

    // ── 7. Nothing matched — show real 404 ────────────────────────
    document.getElementById('spinnerEl').style.display = 'none';
    document.getElementById('loadingText').style.display = 'none';
    document.getElementById('notFoundBox').style.display = 'block';
  })();
  </script>
  <script src="/analytics.js" defer></script>
</head>
<body>
  <div class="box">
    <!-- Shown while JS redirects (default state) -->
    <div class="spinner" id="spinnerEl"></div>
    <p id="loadingText" style="margin:0;font-weight:600;color:#374151;">Redirecting…</p>
    <p style="margin:6px 0 0;font-size:.82rem;color:#94a3b8;" id="fallbackMsg"></p>

    <!-- Shown ONLY if no route matched (true 404) -->
    <div id="notFoundBox" style="display:none;">
      <p style="margin:0;font-weight:700;font-size:1.1rem;">404 — Page Not Found</p>
      <p style="margin:8px 0 0;font-size:.85rem;color:#6b7280;">
        Page not found. Please go back or visit the home page.
      </p>
      <a href="/" class="home-link">← Back to Home</a>
    </div>
  </div>
</body>
</html>
