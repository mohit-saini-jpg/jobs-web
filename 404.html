<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
<script>/*TSJ-WIDE-VIEWPORT*/(function(){var W=820,m=document.querySelector('meta[name="viewport"]');if(!m){m=document.createElement('meta');m.name='viewport';(document.head||document.documentElement).appendChild(m);}var sw=(window.screen&&screen.width)||window.innerWidth||W;if(sw<W){m.setAttribute('content','width='+W+', user-scalable=yes, maximum-scale=5.0');}else{m.setAttribute('content','width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=5.0');}})();</script>

  <!--
    404.html — GitHub Pages SPA Router + SEO-Smart Job Page Renderer
    ================================================================
    GitHub Pages serves this file for ANY URL that has no matching file.
    
    For /jobs/<slug>/ URLs:
      - Sets robots: index, follow (NOT noindex)
      - Injects correct canonical, title, JobPosting schema immediately
      - Fetches job.html via XHR and replaces entire document (seamless rewrite)
      - Googlebot sees a fully rendered job page, not a redirect
    
    For all other clean URLs (/section/, /category/, /state/, /search/):
      - JS redirects to the correct .html page (existing behavior unchanged)
  -->

  <!-- ── Default meta for non-job pages (overwritten immediately by JS for /jobs/) ── -->
  <title id="pageTitle">Top Sarkari Jobs | Latest Government Jobs 2026</title>
  <meta name="robots" id="metaRobots" content="noindex, nofollow" />
  <link rel="canonical" id="canonicalTag" href="https://www.topsarkarijobs.com/" />
  <meta name="description" id="metaDesc" content="Latest Sarkari Jobs 2026 – Government job notifications, admit cards, results updated daily." />

  <!-- OG / Twitter placeholders -->
  <meta property="og:type" content="article" />
  <meta property="og:site_name" content="Top Sarkari Jobs" />
  <meta property="og:image" content="https://www.topsarkarijobs.com/image.png" />
  <meta id="ogTitle" property="og:title" content="Sarkari Job | Top Sarkari Jobs" />
  <meta id="ogDesc"  property="og:description" content="Latest government job details on Top Sarkari Jobs." />
  <meta id="ogUrl"   property="og:url" content="https://www.topsarkarijobs.com/" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta id="twTitle" name="twitter:title" content="Sarkari Job | Top Sarkari Jobs" />
  <meta id="twDesc"  name="twitter:description" content="Latest government job details." />

  <!-- Structured Data placeholders — overwritten by JS for /jobs/ pages -->
  <script type="application/ld+json" id="jobSchema">{}</script>
  <script type="application/ld+json" id="breadcrumbSchema">{}</script>

  <!-- ══════════════════════════════════════════════════════════════
       PHASE 1 — SYNCHRONOUS HEAD SCRIPT
       Runs immediately. For /jobs/<slug>/ URLs:
         1. Flips robots to index,follow
         2. Sets correct canonical
         3. Injects derived title
         4. Seeds JobPosting + BreadcrumbList schema
       All BEFORE body renders — Googlebot sees correct SEO immediately.
  ══════════════════════════════════════════════════════════════════ -->
  <script>
  (function () {
    'use strict';

    var path   = window.location.pathname;
    var search = window.location.search;

    /* ── Helper: human-readable title from slug ── */
    function humanSlug(s) {
      var clean = s.replace(/-[0-9a-f]{6}$/i, '');                    // strip hash suffix e.g. -c2181b
      clean = clean.replace(/^[a-z][a-z0-9]*_[a-z0-9_]*-/i, '');     // strip sr_latest_jobs- prefix
      return clean.replace(/[-_]+/g, ' ').replace(/\b\w/g, function(c){ return c.toUpperCase(); });
    }

    /* ── Is this a /jobs/<slug>/ URL? ── */
    var jobMatch = path.match(/^\/jobs\/([^\/]+)\/?$/);

    if (jobMatch) {
      var slug     = decodeURIComponent(jobMatch[1]);
      var canonUrl = 'https://www.topsarkarijobs.com/jobs/' + slug + '/';
      var jobName  = humanSlug(slug);
      var titleStr = jobName + ' | Top Sarkari Jobs';
      var descStr  = jobName + ' – Check eligibility, vacancies, last date, salary and apply online at Top Sarkari Jobs. Government of India recruitment 2026.';
      var today    = new Date().toISOString().split('T')[0];

      /* 1. robots → index, follow (CRITICAL for Google) */
      var rm = document.getElementById('metaRobots');
      if (rm) rm.setAttribute('content', 'index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1');

      /* 2. Canonical */
      var can = document.getElementById('canonicalTag');
      if (can) can.href = canonUrl;

      /* 3. hreflang */
      ['en','en-IN','x-default'].forEach(function(lang) {
        var el = document.createElement('link');
        el.rel = 'alternate'; el.setAttribute('hreflang', lang); el.href = canonUrl;
        document.head.appendChild(el);
      });

      /* 4. Title */
      document.title = titleStr;
      var pt = document.getElementById('pageTitle');
      if (pt) pt.textContent = titleStr;

      /* 5. Meta description */
      var md = document.getElementById('metaDesc');
      if (md) md.setAttribute('content', descStr.slice(0, 300));

      /* 6. OG / Twitter */
      function setMeta(id, val) { var el = document.getElementById(id); if (el) el.setAttribute('content', val); }
      setMeta('ogTitle', titleStr); setMeta('twTitle', titleStr);
      setMeta('ogDesc',  descStr.slice(0,300)); setMeta('twDesc', descStr.slice(0,300));
      setMeta('ogUrl',   canonUrl);

      /* 7. Minimal JobPosting schema — valid for Rich Results even before full render */
      var jobSchemaEl = document.getElementById('jobSchema');
      if (jobSchemaEl) {
        jobSchemaEl.textContent = JSON.stringify({
          '@context': 'https://schema.org', '@type': 'JobPosting',
          'name': jobName, 'title': jobName,
          'description': descStr + ' Visit topsarkarijobs.com for complete details and direct application link for this government job notification 2026.',
          'datePosted': today, 'employmentType': 'FULL_TIME', 'url': canonUrl,
          'hiringOrganization': { '@type': 'Organization', 'name': 'Government of India' },
          'jobLocation': { '@type': 'Place', 'address': { '@type': 'PostalAddress', 'addressCountry': 'IN', 'addressRegion': 'India' } }
        });
      }

      /* 8. Minimal BreadcrumbList schema */
      var bcSchemaEl = document.getElementById('breadcrumbSchema');
      if (bcSchemaEl) {
        bcSchemaEl.textContent = JSON.stringify({
          '@context': 'https://schema.org', '@type': 'BreadcrumbList',
          'itemListElement': [
            { '@type': 'ListItem', 'position': 1, 'name': 'Home',        'item': 'https://www.topsarkarijobs.com/' },
            { '@type': 'ListItem', 'position': 2, 'name': 'Latest Jobs', 'item': 'https://www.topsarkarijobs.com/section/latest-jobs/' },
            { '@type': 'ListItem', 'position': 3, 'name': jobName,       'item': canonUrl }
          ]
        });
      }

      /* 9. Expose slug for Phase 2 */
      window.__TSJ_SLUG_FROM_404 = slug;
      window.__TSJ_CANONICAL     = canonUrl;

    } /* end if jobMatch */

  })();
  </script>

<body>
  <div class="box" id="loadingBox">
    <div class="spinner" id="spinnerEl"></div>
    <p id="loadingText" style="margin:0;font-weight:600;">Loading…</p>
    <div id="notFoundBox">
      <p style="margin:0;font-weight:700;font-size:1.15rem;">404 — Page Not Found</p>
      <p style="margin:8px 0 0;font-size:.85rem;color:#6b7280;">
        The page you're looking for doesn't exist or may have been moved.
      </p>
      <p id="extraMsg" style="margin:6px 0 0;font-size:.78rem;color:#ef4444;"></p>
      <a href="/" class="home-link">← Back to Home</a>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════════════════════
       PHASE 2 — BODY SCRIPT
       After body is parsed, fetch job.html and do a full document
       rewrite so the user (and Googlebot) sees the complete job page
       at the correct clean URL — no visible redirect, no flash.
  ══════════════════════════════════════════════════════════════════ -->
  <script>
  (function () {
    'use strict';

    var path   = window.location.pathname;
    var search = window.location.search;

    /* ════════════════════════════════════════════════════
       A. JOB PAGES — full document rewrite via fetch
    ════════════════════════════════════════════════════ */
    var slug = window.__TSJ_SLUG_FROM_404;
    if (slug) {

      /* ── SELF-HEAL old long slugs ──────────────────────────────────────
         Older search/builds produced 100-120 char slugs, but pages are
         generated with an 80-char cap. If the requested slug is longer than
         80 chars, redirect to the 80-char version (the real page) so old
         search links / Google-indexed long URLs never dead-end. */
      try {
        var capped = slug.slice(0, 80).replace(/-+$/, '');
        if (capped && capped !== slug) {
          window.location.replace('/jobs/' + capped + '/');
          return;
        }
      } catch(_) {}

      /* Restore the clean URL in browser address bar */
      var cleanPath = '/jobs/' + slug + '/';
      try {
        if (window.location.pathname !== cleanPath) {
          window.history.replaceState(null, '', cleanPath);
        }
      } catch(_) {}

      /* Save slug for job.html's own IIFE to pick up */
      try { sessionStorage.setItem('__tsj_slug', slug); } catch(_) {}

      /* Fetch job.html and render it in place — NO navigation to ?slug= URL.
         This keeps the clean /jobs/<slug>/ address bar (set above) and avoids
         any redirect loop with job.html's own ?slug= → /jobs/ redirect. */
      fetch('/job.html', { cache: 'no-store' })
        .then(function(r){ return r.ok ? r.text() : null; })
        .then(function(html){
          if (!html) { window.location.replace('/jobs/' + slug + '/'); return; }
          /* strip the ?slug= self-redirect IIFE so it doesn't bounce us */
          document.open();
          document.write(html);
          document.close();
        })
        .catch(function(){ window.location.replace('/jobs/' + slug + '/'); });

      return; /* Stop — don't run redirect logic below */
    }

    /* ════════════════════════════════════════════════════
       LOOP GUARD (for non-job pages)
    ════════════════════════════════════════════════════ */
    if (/\.html(\?|$)/i.test(path)) {
      show404('CDN cache issue — please hard-refresh (Ctrl+Shift+R).');
      return;
    }

    var loopKey = '__tsj_404_' + path.replace(/\//g,'_');
    try {
      var lastHit = parseInt(sessionStorage.getItem(loopKey) || '0', 10);
      if (lastHit && (Date.now() - lastHit) < 5000) {
        sessionStorage.removeItem(loopKey);
        show404();
        return;
      }
      sessionStorage.setItem(loopKey, Date.now().toString());
    } catch(_) {}

    /* ════════════════════════════════════════════════════
       B. SECTION PAGES  /section/<slug>/
    ════════════════════════════════════════════════════ */
    var sectionMatch = path.match(/^\/section\/([^\/]+)\/?$/);
    if (sectionMatch) {
      var slug = decodeURIComponent(sectionMatch[1]);
      // KEEP URL SAME: /section/admissions/ stays in address bar
      // Fetch view.html and rewrite document — no redirect, URL unchanged
      fetch('/view.html')
        .then(function(r) { return r.text(); })
        .then(function(html) {
          // Rewrite entire document — URL stays at /section/[slug]/
          document.open('text/html', 'replace');
          document.write(html);
          document.close();
        })
        .catch(function() {
          // Fallback: redirect (rare)
          window.location.replace('/view.html?section=' + encodeURIComponent(slug));
        });
      return;
    }

    /* ════════════════════════════════════════════════════
       C. CATEGORY PAGES  /category/<group>/
    ════════════════════════════════════════════════════ */
    var catMatch = path.match(/^\/category\/([^\/]+)\/?$/);
    if (catMatch) {
      // Keep URL same: /category/[group]/ stays in address bar
      fetch('/category.html')
        .then(function(r) { return r.text(); })
        .then(function(html) { document.open('text/html','replace'); document.write(html); document.close(); })
        .catch(function() { window.location.replace('/category.html?group=' + encodeURIComponent(decodeURIComponent(catMatch[1]))); });
      return;
    }

    /* ════════════════════════════════════════════════════
       D. STATE PAGES  /state/<name>/
    ════════════════════════════════════════════════════ */
    var stateMatch = path.match(/^\/state\/([^\/]+)\/?$/);
    if (stateMatch) {
      var stateName = decodeURIComponent(stateMatch[1]).replace(/-/g,' ').replace(/\b\w/g,function(c){return c.toUpperCase();});
      window.location.replace('/state-jobs.html?state=' + encodeURIComponent(stateName));
      return;
    }
    if (path === '/state/' || path === '/state') {
      window.location.replace('/state/');
      return;
    }
    var legacyStateMatch = path.match(/^\/state-jobs\/([^\/]+)\/?$/);
    if (legacyStateMatch) {
      var legacyState = decodeURIComponent(legacyStateMatch[1]).replace(/-/g,' ');
      window.location.replace('/state-jobs.html?state=' + encodeURIComponent(legacyState));
      return;
    }

    /* ════════════════════════════════════════════════════
       E. SEARCH  /search/<query>/
    ════════════════════════════════════════════════════ */
    var searchMatch = path.match(/^\/search\/([^\/]+)\/?$/);
    if (searchMatch) {
      // Keep URL same: /search/[query]/ stays in address bar
      fetch('/search.html')
        .then(function(r) { return r.text(); })
        .then(function(html) { document.open('text/html','replace'); document.write(html); document.close(); })
        .catch(function() {
          var q = decodeURIComponent(searchMatch[1]).replace(/-/g,' ');
          window.location.replace('/search.html?q=' + encodeURIComponent(q));
        });
      return;
    }

    /* ════════════════════════════════════════════════════
       F. STATIC SHORTCUTS
    ════════════════════════════════════════════════════ */
    var shortcuts = {
      '/latest-jobs/':     '/section/latest-jobs/',
      '/latest-jobs':      '/section/latest-jobs/',
      '/results/':         '/section/results/',
      '/results':          '/section/results/',
      '/admit-card/':      '/section/admit-card/',
      '/admit-card':       '/section/admit-card/',
      '/railway-jobs/':    '/section/railway-jobs/',
      '/railway-jobs':     '/section/railway-jobs/',
      '/bank-jobs/':       '/section/bank-jobs/',
      '/bank-jobs':        '/section/bank-jobs/',
      '/police-jobs/':     '/section/police-jobs/',
      '/police-jobs':      '/section/police-jobs/',
      '/ssc-jobs/':        '/section/ssc-jobs/',
      '/ssc-jobs':         '/section/ssc-jobs/',
      '/upsc-jobs/':       '/section/upsc-jobs/',
      '/upsc-jobs':        '/section/upsc-jobs/',
      '/teaching-jobs/':   '/section/teaching-jobs/',
      '/teaching-jobs':    '/section/teaching-jobs/',
      '/army-jobs/':       '/section/army-jobs/',
      '/army-jobs':        '/section/army-jobs/',
      '/10th-pass-jobs/':  '/section/10th-pass-jobs/',
      '/10th-pass-jobs':   '/section/10th-pass-jobs/',
      '/12th-pass-jobs/':  '/section/12th-pass-jobs/',
      '/12th-pass-jobs':   '/section/12th-pass-jobs/',
      '/upcoming-jobs/':   '/section/upcoming-jobs/',
      '/upcoming-jobs':    '/section/upcoming-jobs/',
      '/state-jobs/':      '/section/state-jobs/',
      '/state-jobs':       '/section/state-jobs/',
      '/central-jobs/':    '/section/central-jobs/',
      '/central-jobs':     '/section/central-jobs/',
      '/answer-key/':      '/section/answer-key/',
      '/answer-key':       '/section/answer-key/',
      '/admissions/':      '/section/admissions/',
      '/admissions':       '/section/admissions/',
      '/admission/':       '/section/admission/',
      '/admission':        '/section/admission/',
      '/haryana-jobs/':    '/section/haryana-jobs/',
      '/haryana-jobs':     '/section/haryana-jobs/',
      '/iti-jobs/':        '/section/iti-jobs/',
      '/iti-jobs':         '/section/iti-jobs/',
      '/diploma-jobs/':    '/section/diploma-jobs/',
      '/diploma-jobs':     '/section/diploma-jobs/',
      '/8th-pass-jobs/':   '/section/8th-pass-jobs/',
      '/8th-pass-jobs':    '/section/8th-pass-jobs/',
      '/graduation-jobs/': '/section/graduation-jobs/',
      '/graduation-jobs':  '/section/graduation-jobs/',
      '/medical-jobs/':    '/section/medical-jobs/',
      '/medical-jobs':     '/section/medical-jobs/',
      '/defence-jobs/':    '/section/defence-jobs/',
      '/defence-jobs':     '/section/defence-jobs/',
      '/latest-govt-jobs/':'/section/latest-govt-jobs/',
      '/latest-govt-jobs': '/section/latest-govt-jobs/',
    };;
    if (shortcuts[path]) {
      window.location.replace(shortcuts[path]);
      return;
    }

    /* ════════════════════════════════════════════════════
       G. NOTHING MATCHED — show real 404
    ════════════════════════════════════════════════════ */
    show404();

    function show404(extraMsg) {
      document.getElementById('spinnerEl').style.display   = 'none';
      document.getElementById('loadingText').style.display = 'none';
      document.getElementById('notFoundBox').style.display = 'block';
      if (extraMsg) document.getElementById('extraMsg').textContent = extraMsg;
    }

  })();
  </script>
