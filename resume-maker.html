  <style>
    /* ══════════════════════════════════════════════
       ROOT DESIGN TOKENS
    ══════════════════════════════════════════════ */
    :root {
      --navy:#0d2257; --blue:#1a56db; --blue2:#1e40af; --accent:#f97316;
      --green:#059669; --purple:#7c3aed; --teal:#0d9488; --red:#dc2626; --yellow:#d97706;
      --text:#0f172a; --muted:#64748b; --border:#e2e8f0; --bg:#f0f4fb; --white:#ffffff;
      --radius:12px; --radius-sm:8px;
      --shadow:0 2px 16px rgba(13,34,87,.07);
      --shadow-md:0 4px 24px rgba(13,34,87,.11);
      --shadow-lg:0 8px 40px rgba(13,34,87,.16);
      --gap:16px;
      /* Color Themes */
      --theme-primary:#0d2257; --theme-accent:#1a56db; --theme-light:#eef3ff;
    }
    /* Navy Blue Theme */
    .theme-navy { --theme-primary:#0d2257; --theme-accent:#1a56db; --theme-light:#eef3ff; }
    /* Black & White */
    .theme-bw { --theme-primary:#1a1a1a; --theme-accent:#444444; --theme-light:#f5f5f5; }
    /* Modern Green */
    .theme-green { --theme-primary:#064e3b; --theme-accent:#059669; --theme-light:#ecfdf5; }
    /* Corporate Grey */
    .theme-grey { --theme-primary:#374151; --theme-accent:#6b7280; --theme-light:#f9fafb; }

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);font-size:14px;overflow-x:hidden;}
    a{text-decoration:none;color:inherit;}
    img{max-width:100%;}
    .skip-link{position:absolute;left:-999px;top:-999px;background:#fff;color:var(--blue);padding:8px 16px;font-weight:700;z-index:9999;}
    .skip-link:focus{left:0;top:0;}
    .container{max-width:1240px;margin:0 auto;padding:0 14px;}

    /* ══ TOP BAR ══ */
    .top-bar{background:var(--navy);color:rgba(255,255,255,.85);font-size:.72rem;font-weight:600;padding:5px 0;display:none;}
    @media(min-width:768px){.top-bar{display:block;}}
    .top-bar-inner{display:flex;align-items:center;justify-content:space-between;gap:12px;}
    .top-bar-social{display:flex;align-items:center;gap:10px;}
    .top-bar-social a{color:rgba(255,255,255,.8);transition:color .15s;font-size:.85rem;}
    .top-bar-social a:hover{color:#fff;}
    .join-wa{background:#25d366;color:#fff;padding:3px 10px;border-radius:20px;font-size:.7rem;font-weight:700;display:flex;align-items:center;gap:5px;}
    .join-wa:hover{background:#22c35e;}

    /* ══ STICKY HEADER ══ */
    .site-header{background:var(--white);box-shadow:0 2px 12px rgba(0,0,0,.08);position:sticky;top:0;z-index:300;}
    .header-logo-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;gap:10px;}
    .brand{display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0;}
    .brand-logo{width:42px;height:42px;border-radius:10px;object-fit:cover;}
    .brand-title{font-size:1.18rem;font-weight:900;color:var(--navy);line-height:1.1;}
    .brand-title span{color:var(--accent);}
    .brand-sub{font-size:.6rem;color:var(--muted);font-weight:600;letter-spacing:.02em;}
    .header-actions{display:flex;align-items:center;gap:8px;}
    .wa-btn-header{background:#25d366;color:#fff;border:none;border-radius:8px;padding:7px 14px;font-size:.78rem;font-weight:800;cursor:pointer;display:none;align-items:center;gap:6px;}
    @media(min-width:1024px){.wa-btn-header{display:flex;}}
    .icon-btn{background:none;border:none;color:var(--text);width:38px;height:38px;border-radius:9px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:background .15s;}
    .icon-btn:hover{background:var(--bg);}

    /* ══ DESKTOP NAV ══ */
    .desktop-nav{display:none;align-items:center;gap:1px;padding:0 14px;background:linear-gradient(90deg,var(--navy) 0%,var(--blue2) 100%);border-bottom:3px solid var(--accent);}
    @media(min-width:901px){.desktop-nav{display:flex;}#menuBtn{display:none;}}
    .nav-link{color:rgba(255,255,255,.92);font-size:.79rem;font-weight:700;padding:10px 12px;white-space:nowrap;transition:background .15s;display:flex;align-items:center;gap:5px;}
    .nav-link:hover,.nav-link.active{background:rgba(255,255,255,.15);color:#fff;}
    .nav-dd{position:relative;}
    .nav-dd-btn{background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:5px;color:rgba(255,255,255,.92);font-size:.79rem;font-weight:700;padding:10px 12px;white-space:nowrap;font-family:inherit;}
    .nav-dd-btn:hover{background:rgba(255,255,255,.12);}
    .nav-dd-menu{position:absolute;top:100%;left:0;background:#fff;border:1px solid var(--border);border-radius:12px;box-shadow:0 8px 30px rgba(0,0,0,.12);min-width:220px;padding:6px;display:none;z-index:400;}
    .nav-dd:hover .nav-dd-menu{display:block;}
    .nav-dd-item{display:flex;align-items:center;gap:9px;padding:9px 13px;font-size:.8rem;font-weight:600;color:var(--text);text-decoration:none;border-radius:8px;transition:all .12s;}
    .nav-dd-item i{width:16px;color:var(--blue);font-size:.82rem;}
    .nav-dd-item:hover{background:#eff6ff;color:var(--blue);}

    /* ══ BREADCRUMB ══ */
    .breadcrumb{background:var(--white);border-bottom:1px solid var(--border);padding:8px 0;}
    .breadcrumb-inner{display:flex;align-items:center;gap:6px;font-size:.75rem;color:var(--muted);}
    .breadcrumb-inner a{color:var(--blue);font-weight:600;}
    .breadcrumb-inner a:hover{text-decoration:underline;}

    /* ══ PAGE HERO ══ */
    .page-hero{background:linear-gradient(135deg,var(--navy) 0%,#1a3c8f 55%,var(--blue) 100%);color:#fff;padding:26px 14px 22px;position:relative;overflow:hidden;}
    .page-hero::before{content:'';position:absolute;right:-40px;top:-40px;width:240px;height:240px;border-radius:50%;background:rgba(255,255,255,.04);pointer-events:none;}

    .page-hero-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.22);padding:4px 14px;border-radius:20px;font-size:.68rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px;}

    @media(min-width:980px){.resume-grid{grid-template-columns:1fr 300px;}}

    /* ══ SECTION CARDS ══ */
    .sec-card{background:var(--white);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);margin-bottom:14px;transition:box-shadow .2s;}

    .sec-head.blue{background:linear-gradient(90deg,#0d2257 0%,#1a56db 100%);}

    /* ══ RESUME FORM CARD ══ */
    .rm-card{background:var(--white);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);margin-bottom:16px;transition:box-shadow .2s;}

    .rm-section{padding:18px 18px 12px;}
    .rm-section-title{font-size:.72rem;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px;display:flex;align-items:center;gap:6px;padding-bottom:10px;border-bottom:1.5px solid var(--border);}
    .rm-section-title i{color:var(--blue);}
    .rm-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
    .rm-row.full{grid-template-columns:1fr;}
    .rm-row.three{grid-template-columns:1fr 1fr 1fr;}
    @media(max-width:540px){.rm-row,.rm-row.three{grid-template-columns:1fr;}}
    .rm-field{display:flex;flex-direction:column;gap:5px;}
    .rm-field label{font-size:.72rem;font-weight:700;color:var(--muted);display:flex;align-items:center;gap:4px;}
    .rm-field input,.rm-field textarea,.rm-field select{
      padding:9px 12px;border:1.5px solid var(--border);border-radius:9px;
      font-size:.83rem;font-family:inherit;color:var(--text);background:#fff;outline:none;
      transition:border .15s,box-shadow .15s;
    }
    .rm-field input:focus,.rm-field textarea:focus,.rm-field select:focus{
      border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,86,219,.09);
    }
    .rm-field textarea{resize:vertical;min-height:68px;}
    .rm-radio-row{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:12px;}
    .rm-radio-row label{display:flex;align-items:center;gap:7px;font-size:.83rem;font-weight:600;cursor:pointer;padding:8px 14px;border:1.5px solid var(--border);border-radius:9px;transition:all .12s;}
    .rm-radio-row label:has(input:checked){border-color:var(--blue);background:#eff6ff;color:var(--blue);}
    .rm-radio-row input[type=radio]{accent-color:var(--blue);}

    /* ══ PHOTO UPLOAD ══ */
    .photo-upload-area{border:2px dashed var(--border);border-radius:12px;padding:20px;text-align:center;cursor:pointer;transition:all .2s;position:relative;background:#fafbff;}
    .photo-upload-area:hover{border-color:var(--blue);background:#f0f6ff;}
    .photo-upload-area input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;}
    .photo-upload-area i{font-size:2rem;color:var(--blue);margin-bottom:8px;display:block;}
    .photo-upload-area p{font-size:.78rem;color:var(--muted);font-weight:600;}
    .photo-upload-area small{font-size:.68rem;color:#94a3b8;}
    .photo-preview{width:90px;height:110px;border-radius:10px;object-fit:cover;border:3px solid var(--blue);box-shadow:var(--shadow-md);display:none;}
    .photo-preview.show{display:block;}
    .photo-col{display:flex;flex-direction:column;align-items:center;gap:8px;}
    .remove-photo-btn{font-size:.68rem;color:var(--red);font-weight:700;cursor:pointer;display:none;}
    .remove-photo-btn.show{display:inline-block;}

    /* ══ SKILLS SECTION ══ */
    .skill-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
    .skill-name-input{flex:0 0 160px;padding:7px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:.8rem;font-family:inherit;outline:none;}
    .skill-name-input:focus{border-color:var(--blue);}
    .skill-bar-wrap{flex:1;display:flex;align-items:center;gap:10px;}
    .skill-range{flex:1;-webkit-appearance:none;height:6px;border-radius:4px;background:var(--border);outline:none;cursor:pointer;}
    .skill-range::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--blue);cursor:pointer;box-shadow:0 1px 4px rgba(26,86,219,.3);}
    .skill-pct{font-size:.72rem;font-weight:700;color:var(--blue);min-width:34px;text-align:right;}

    /* ══ CATEGORY TABS (Fresher / Experienced) ══ */
    .category-tabs{display:flex;gap:8px;padding:16px 18px 0;border-bottom:2px solid var(--border);margin-bottom:0;}
    .cat-tab{padding:9px 20px;border-radius:10px 10px 0 0;font-size:.8rem;font-weight:700;cursor:pointer;border:1.5px solid transparent;border-bottom:none;color:var(--muted);background:none;font-family:inherit;transition:all .15s;}
    .cat-tab.active{background:var(--blue);color:#fff;border-color:var(--blue);}
    .cat-panel{display:none;}
    .cat-panel.active{display:block;}

    /* ══ COLOR THEMES ══ */
    .theme-picker{display:flex;gap:10px;flex-wrap:wrap;padding:4px 0 10px;}
    .theme-dot{width:34px;height:34px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .2s;position:relative;}
    .theme-dot.active{border-color:#fff;box-shadow:0 0 0 3px var(--blue),0 2px 8px rgba(0,0,0,.2);}
    .theme-dot[title]:hover::after{content:attr(title);position:absolute;bottom:-24px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;font-size:.6rem;font-weight:700;padding:3px 7px;border-radius:4px;white-space:nowrap;pointer-events:none;}

    /* ══ EDU TABLE ══ */
    .edu-table-header{display:grid;grid-template-columns:2fr 2fr 1.1fr 1.1fr 1.1fr 36px;gap:6px;margin-bottom:5px;}
    .edu-table-header span{font-size:.64rem;font-weight:700;color:var(--muted);padding:0 2px;}
    .edu-row{display:grid;grid-template-columns:2fr 2fr 1.1fr 1.1fr 1.1fr 36px;gap:6px;margin-bottom:7px;align-items:center;}
    .edu-row input{padding:7px 9px;border:1.5px solid var(--border);border-radius:7px;font-size:.76rem;font-family:inherit;color:var(--text);background:#fff;outline:none;}
    .edu-row input:focus{border-color:var(--blue);}
    @media(max-width:600px){
      .edu-table-header{grid-template-columns:1fr 1fr;}.edu-table-header span:nth-child(n+3){display:none;}
      .edu-row{grid-template-columns:1fr 1fr;}.edu-row input:nth-child(n+3){display:none;}
    }
    .add-btn{display:inline-flex;align-items:center;gap:6px;font-size:.76rem;font-weight:700;color:var(--blue);background:none;border:1.5px dashed var(--blue);border-radius:7px;padding:6px 14px;cursor:pointer;margin-top:5px;transition:background .12s;}
    .add-btn:hover{background:#eff6ff;}
    .rm-btn{background:none;border:1.5px solid var(--border);border-radius:7px;padding:5px 8px;cursor:pointer;color:var(--muted);font-size:.7rem;transition:all .12s;}
    .rm-btn:hover{border-color:var(--red);color:var(--red);}
    .extra-row{display:flex;gap:8px;margin-bottom:9px;align-items:center;}
    .extra-row input{flex:1;padding:8px 11px;border:1.5px solid var(--border);border-radius:7px;font-size:.8rem;font-family:inherit;color:var(--text);outline:none;}
    .extra-row input:focus{border-color:var(--blue);}

    /* ══ CAREER OBJECTIVE ══ */
    .obj-option{display:flex;align-items:flex-start;gap:8px;padding:9px 12px;border:1.5px solid var(--border);border-radius:9px;margin-bottom:7px;cursor:pointer;transition:all .12s;}

    .obj-option span{font-size:.76rem;line-height:1.6;color:var(--muted);}

    /* ══ TEMPLATE GRID ══ */

    .tpl-item:hover{border-color:var(--blue);transform:translateY(-2px);box-shadow:var(--shadow-md);}
    .tpl-item.active{border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,86,219,.15);}

    .tpl-header-bar{padding:8px 9px;font-size:7.5px;font-weight:800;letter-spacing:.02em;}
    .tpl-body-wrap{flex:1;display:flex;gap:3px;padding:5px 8px;}
    .tpl-main-col{flex:1;display:flex;flex-direction:column;gap:4px;}
    .tpl-side-col{width:28%;display:flex;flex-direction:column;gap:3px;padding:4px;}

    .tpl-label{padding:6px 8px;font-size:9.5px;font-weight:800;text-align:center;border-top:1.5px solid var(--border);color:var(--text);}
    .tpl-badge{position:absolute;top:4px;right:4px;background:#10b981;color:#fff;font-size:6px;font-weight:800;padding:2px 5px;border-radius:3px;text-transform:uppercase;}
    .tpl-badge.ats{background:#6366f1;}

    /* ══ GENERATE BUTTON ══ */
    .rm-submit-row{padding:14px 18px 18px;display:flex;gap:12px;flex-wrap:wrap;align-items:center;}
    .gen-btn{background:linear-gradient(135deg,var(--navy),var(--blue));color:#fff;border:none;border-radius:10px;padding:14px 32px;font-size:.95rem;f
