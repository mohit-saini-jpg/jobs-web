name: 🔍 Check & Fix Broken Job Links

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'  # Daily 3 AM IST (nightly)

jobs:
  check-and-fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check & Fix Broken Links
        run: |
          python3 << 'PYEOF'
import json, os, re, sys

ROOT = '.'
jobs_dir = os.path.join(ROOT, 'jobs')
redirects_path = os.path.join(ROOT, '_redirects')

def slugify(t):
    t = str(t).lower()
    t = re.sub(r'[^a-z0-9\s-]', '', t)
    t = re.sub(r'[\s_-]+', '-', t)
    return t.strip('-')[:80].strip('-') or 'page'

# Load current redirects
existing_redirects = open(redirects_path, encoding='utf-8').read() if os.path.exists(redirects_path) else ''

# Get all disk pages
disk_pages = set()
if os.path.isdir(jobs_dir):
    for d in os.listdir(jobs_dir):
        if os.path.isfile(os.path.join(jobs_dir, d, 'index.html')):
            content = open(os.path.join(jobs_dir, d, 'index.html'), encoding='utf-8').read()
            if 'Page Not Available' not in content:
                disk_pages.add(d)

print(f"✅ Valid disk pages: {len(disk_pages)}")

# Normalize: strip hyphens/chars for fuzzy matching
def norm(s):
    return re.sub(r'[^a-z0-9]', '', s.lower())

disk_norm = {}
for s in disk_pages:
    n = norm(s)
    disk_norm[n] = s

# Load sections-index
si = json.load(open(os.path.join(ROOT, 'sections-index.json')))
broken = []   # (broken_slug, best_match_slug)
ok = 0

for cat, items in si.items():
    if not isinstance(items, list): continue
    for item in items:
        slug = item.get('slug', '')
        if not slug: continue
        if slug in disk_pages:
            ok += 1
            continue
        # Fuzzy match
        n = norm(slug)
        if n in disk_norm:
            broken.append((slug, disk_norm[n], 'fuzzy', cat))
        else:
            # Partial match: first 40 normalized chars
            prefix = n[:40]
            matches = [v for k, v in disk_norm.items() if k.startswith(prefix)]
            if matches:
                broken.append((slug, matches[0], 'prefix', cat))
            else:
                broken.append((slug, None, 'no-match', cat))

print(f"✅ OK: {ok}")
print(f"❌ Broken: {len(broken)}")

# Add redirects for fixable ones
new_redirects = []
truly_missing = []

for broken_slug, match, match_type, cat in broken:
    if match and match_type in ('fuzzy', 'prefix'):
        rule = f"/jobs/{broken_slug}/  /jobs/{match}/  301"
        if rule not in existing_redirects:
            new_redirects.append(rule)
            print(f"  🔀 {broken_slug[:50]}")
            print(f"      → {match[:50]}")
    else:
        truly_missing.append((broken_slug, cat))

if new_redirects:
    block = '\n# ══ Auto-fixed broken links (' + str(len(new_redirects)) + ') ══\n'
    block += '\n'.join(new_redirects) + '\n'
    with open(redirects_path, 'a', encoding='utf-8') as f:
        f.write(block)
    print(f"\n✅ Added {len(new_redirects)} redirect rules")
else:
    print("\n✅ No new redirects needed")

if truly_missing:
    print(f"\n⚠️  {len(truly_missing)} truly missing (no match):")
    for slug, cat in truly_missing[:20]:
        print(f"  [{cat}] {slug}")

# Summary for GitHub Actions
summary = f"""## 🔍 Broken Link Check Results

| Metric | Count |
|--------|-------|
| ✅ Valid pages | {len(disk_pages)} |
| ✅ OK links | {ok} |
| 🔀 Auto-fixed (redirect added) | {len(new_redirects)} |
| ⚠️ Truly missing (no match) | {len(truly_missing)} |

{'### ⚠️ Truly Missing (need scraper re-run):' if truly_missing else ''}
"""
for slug, cat in truly_missing[:10]:
    summary += f"- [{cat}] `{slug}`\n"

with open(os.environ.get('GITHUB_STEP_SUMMARY', '/tmp/summary.md'), 'w') as f:
    f.write(summary)

sys.exit(0)
PYEOF

      - name: Commit fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No changes to commit"
          else
            git add _redirects
            FIXED=$(grep -c "Auto-fixed" _redirects 2>/dev/null || echo "0")
            git commit -m "fix: auto-fix broken job links [skip ci]"
            git push
            echo "✅ Pushed redirect fixes"
          fi
