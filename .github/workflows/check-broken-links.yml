name: "\U0001F50D Check & Fix Broken Job Links"

on:
  workflow_dispatch:
  # Bonus trigger: fires right after "Auto Update Jobs" finishes, IF GitHub
  # actually delivers the workflow_run event (observed unreliable in this
  # repo — even the pre-existing ai-nightly → ai-patch-html workflow_run
  # chain has gone silent for weeks despite ai-nightly itself running fine).
  # The cron below is the real, proven-reliable trigger — this just saves
  # time on the days workflow_run does fire.
  workflow_run:
    workflows: ["🔄 Auto Update Jobs + Sitemap + Cache Bust"]
    types: [completed]
  schedule:
    - cron: '30 3 * * *'   # Daily 9:00 AM IST — comfortably after the
                            # scraper (~5:37 AM) and Auto Update Jobs (7:00 AM
                            # cron, or sooner via its own push-trigger)

jobs:
  # Prevents a late-firing native `schedule` event from redoing today's scan
  # if the workflow_run chain trigger or punctual_dispatcher.py already ran
  # it — see .github/actions/skip-daily-duplicate/action.yml. workflow_run
  # and workflow_dispatch-triggered runs are NEVER affected by this.
  guard:
    runs-on: ubuntu-latest
    permissions:
      actions: read
    outputs:
      skip: ${{ steps.g.outputs.skip }}
    steps:
      - uses: actions/checkout@v4
      - id: g
        uses: ./.github/actions/skip-daily-duplicate
        with:
          workflow-file: check-broken-links.yml

  check-and-fix:
    needs: guard
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: >
      needs.guard.outputs.skip != 'true' && (
        github.event_name == 'workflow_dispatch' ||
        github.event_name == 'schedule' ||
        github.event.workflow_run.conclusion == 'success'
      )

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check & Fix Broken Links
        run: python3 .github/workflows/check_broken_links.py

      - name: Commit fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No changes to commit"
          else
            git add _redirects
            git commit -m "fix: auto-fix broken job links [skip ci]"
            git push
            echo "Pushed redirect fixes"
          fi
