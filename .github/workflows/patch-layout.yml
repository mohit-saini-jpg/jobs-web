name: Patch All Job Pages Layout
on:
  workflow_dispatch:

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run layout patch script
        run: python3 scripts/patch_layout.py

      - name: Commit patched pages
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add jobs/
          git diff --cached --quiet || git commit -m "fix: patch all job pages to modern 3-column layout with sidebar"
          git push
