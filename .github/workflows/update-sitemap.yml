name: Daily Sitemap Update
on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:
jobs:
  update-sitemap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run Sitemap Generator
        run: node sitemap-generator.js
      - name: Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "sitemap update"
          file_pattern: "sitemap-jobs.xml sitemap-index.xml sitemap.xml"
          push_options: "--force"
