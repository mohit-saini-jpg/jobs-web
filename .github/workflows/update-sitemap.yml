name: Daily Sitemap Update
on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  update-sitemap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Sitemap Generator
        run: node sitemap-generator.js

      - name: Commit and Push
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sitemap-jobs.xml sitemap-index.xml sitemap.xml
          if git diff --staged --quiet; then
            echo "No changes"
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "sitemap update $(date +'%Y-%m-%d')"
            git pull --rebase origin main
            git push origin main
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      # ─── BP-1: IndexNow auto-trigger after sitemap update ───────
      - name: Submit URLs to IndexNow
        if: steps.commit.outputs.changed == 'true'
        run: |
          INDEXNOW_KEY="topsarkarijobs-indexnow-key-2026"
          SITE="https://www.topsarkarijobs.com"

          # Collect URLs added/changed in the last 24 hours from sitemap-jobs.xml
          CUTOFF=$(date -u -d '24 hours ago' '+%Y-%m-%dT%H:%M:%S' 2>/dev/null || \
                   date -u -v-24H '+%Y-%m-%dT%H:%M:%S')

          # Extract <loc> URLs from sitemap-jobs.xml (up to 10,000 per IndexNow spec)
          URLS=$(grep -oP '(?<=<loc>)[^<]+' sitemap-jobs.xml | head -500 | \
                 python3 -c "
          import sys, json
          urls = [u.strip() for u in sys.stdin if u.strip()]
          print(json.dumps(urls))
          ")

          COUNT=$(echo "$URLS" | python3 -c "import sys,json; print(len(json.load(sys.stdin)))")
          echo "Submitting $COUNT URLs to IndexNow..."

          # POST to IndexNow API
          HTTP_STATUS=$(curl -s -o /tmp/indexnow_response.json -w "%{http_code}" \
            -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "{
              \"host\": \"www.topsarkarijobs.com\",
              \"key\": \"${INDEXNOW_KEY}\",
              \"keyLocation\": \"${SITE}/topsarkarijobs-indexnow-key-2026.txt\",
              \"urlList\": ${URLS}
            }")

          echo "IndexNow HTTP status: $HTTP_STATUS"
          cat /tmp/indexnow_response.json || true

          if [ "$HTTP_STATUS" = "200" ] || [ "$HTTP_STATUS" = "202" ]; then
            echo "✅ IndexNow submission successful (status $HTTP_STATUS)"
          else
            echo "⚠️  IndexNow returned status $HTTP_STATUS — check response above"
            # Don't fail the workflow for IndexNow errors
          fi
