name: Daily Scraper + AI Content Layer

# ──────────────────────────────────────────────────────────────────────
# SCOPE: This workflow ONLY scrapes fresh data + fills the AI content
# fields (ai_overview, ai_title, etc.) into Complete_Jobs_Full_Data.json,
# then commits that JSON.
#
# IT DELIBERATELY DOES NOT run generate_all.py or build the static site.
# That is already handled by the existing auto-update-jobs.yml workflow,
# which runs daily at 7 AM IST and reads whatever Complete_Jobs_Full_Data.json
# is in the repo at that time. Running generate_all.py here too would mean
# TWO workflows generating + pushing the site on different schedules —
# a real risk of git conflicts and duplicate/wasted regenerations.
#
# Pipeline as it actually runs, end to end:
#   2:00 AM IST  → THIS workflow: scrape (new jobs) + AI-fill + commit JSON
#   7:00 AM IST  → auto-update-jobs.yml: reads that JSON, runs generate_all.py,
#                  rebuilds sitemap, pushes the live site
# ──────────────────────────────────────────────────────────────────────

on:
  schedule:
    # 2 AM IST (8:30 PM UTC) — runs BEFORE auto-update-jobs.yml (7 AM IST),
    # so the 7 AM run always picks up today's freshly-scraped + AI-filled data.
    - cron: '30 20 * * *'
  workflow_dispatch:   # manual trigger bhi kar sakta hai

jobs:
  scrape-and-ai:
    runs-on: ubuntu-latest
    timeout-minutes: 150

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed for a safe rebase before push (handles same-day concurrent edits)

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── STEP 1: Install dependencies ──────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml

      # ── STEP 2: Run all 4 scrapers (data collection, incremental) ───────
      - name: Run scrapers (FJA + Sarkari + State + Education)
        working-directory: scraper
        run: python scraper_all.py
        continue-on-error: false

      # ── STEP 3: Merge + consolidate data (drops jobs no longer on source) ─
      - name: Merge scraped data
        working-directory: scraper
        run: python scraper_merge.py

      # ── STEP 4: Check today's AI quota before spending it ───────────────
      - name: Check AI quota status
        id: quota_check
        working-directory: scraper
        run: |
          python3 << 'QUOTA_EOF'
          import json, os
          from datetime import date

          usage_file = "ai_usage_tracker.json"
          today = date.today().isoformat()

          if os.path.exists(usage_file):
              u = json.load(open(usage_file, encoding="utf-8"))
          else:
              u = {}

          if u.get("date") != today:
              u = {"date": today, "requests_today": 0, "tokens_today": 0}

          used = u.get("requests_today", 0)
          daily_limit = 1000
          remaining = max(0, daily_limit - used)

          print(f"::notice title=AI Quota Status::Used today: {used}/{daily_limit} | Remaining: {remaining}")

          # modern GitHub Actions output syntax (replaces deprecated ::set-output::)
          gh_output = os.environ.get("GITHUB_OUTPUT", "")
          if gh_output:
              with open(gh_output, "a") as f:
                  f.write(f"used={used}\n")
                  f.write(f"remaining={remaining}\n")
                  f.write(f"should_run={'true' if remaining > 0 else 'false'}\n")

          json.dump(u, open(usage_file, "w", encoding="utf-8"), ensure_ascii=False)
          QUOTA_EOF

      # ── STEP 5: AI content layer — only spends quota if some remains ────
      # AI_DATA_FILE is explicit here because scraper_merge.py writes
      # Complete_Jobs_Full_Data.json directly into scraper/ (not scraper/data/)
      # — ai_content_layer.py's own default assumes a data/ subfolder, so we
      # override it to match what scraper_merge.py actually produces.
      - name: AI Content Layer (fills ai_* fields, rate-limited)
        if: steps.quota_check.outputs.should_run == 'true'
        working-directory: scraper
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          AI_DATA_FILE: Complete_Jobs_Full_Data.json
        run: python ai_content_layer.py
        continue-on-error: true   # AI failure should never block site generation

      - name: Skip notice (quota already used up today)
        if: steps.quota_check.outputs.should_run == 'false'
        run: echo "::notice title=AI Quota::Daily limit already used — skipping AI calls, site will use existing/_backup_ content."

      # ── STEP 6: Sync the AI-filled JSON to repo root (same convention used
      # by auto-update-jobs.yml's "Ensure Complete_Jobs_Full_Data.json at
      # root" step). We do NOT run generate_all.py here — auto-update-jobs.yml
      # does that at 7 AM IST and will pick up this file automatically.
      # NOTE: in this repo, generate_all.py and scraper/ are BOTH at repo
      # root (jobs-web-main IS the repo root) — so this is a same-level copy,
      # not a cross-folder one. ──
      - name: Sync updated JSON to repo root (for auto-update-jobs.yml to pick up)
        run: |
          if [ -f "scraper/Complete_Jobs_Full_Data.json" ]; then
            cp scraper/Complete_Jobs_Full_Data.json Complete_Jobs_Full_Data.json
            mkdir -p data
            cp scraper/Complete_Jobs_Full_Data.json data/Complete_Jobs_Full_Data.json
            echo "Synced AI-filled JSON → repo root + data/"
          else
            echo "::warning::scraper/Complete_Jobs_Full_Data.json not found — check scraper_merge.py FINAL_OUTPUT path"
          fi

      # ── STEP 7: Append today's usage to history log ────────────────────
      - name: Update usage history
        run: |
          python3 << 'REPORT_EOF'
          import json, os
          from datetime import date

          usage_file = "scraper/ai_usage_tracker.json"
          history_file = "ai_daily_usage_history.json"

          if not os.path.exists(usage_file):
              raise SystemExit(0)

          u = json.load(open(usage_file, encoding="utf-8"))
          used = u.get("requests_today", 0)
          daily_limit = 1000
          pct = (used / daily_limit * 100) if daily_limit else 0

          print("="*60)
          print("  AI CONTENT LAYER — DAILY REPORT")
          print("="*60)
          print(f"  Date: {u.get('date', date.today().isoformat())}")
          print(f"  Requests: {used}/{daily_limit}  ({pct:.1f}%)")
          print("="*60)

          hist = []
          if os.path.exists(history_file):
              try:
                  hist = json.load(open(history_file, encoding="utf-8"))
              except Exception:
                  hist = []
          hist.append(u)
          hist = hist[-90:]   # keep last ~90 days only, avoid unbounded growth
          json.dump(hist, open(history_file, "w", encoding="utf-8"), ensure_ascii=False, indent=2)
          REPORT_EOF

      # ── STEP 8: Commit + push (rebase-safe — avoids clobbering a same-day
      # manual push or the 7 AM auto-update-jobs.yml run if schedules ever
      # drift close together) ───────────────────────────────────────────
      - name: Sanitize AWS keys from all JSON files (GitHub Secret Scanning safety)
        run: |
          python3 << 'SANITIZE_EOF'
          import json, os, re, glob
          AWS_PATTERN = re.compile(r'AKIA[0-9A-Z]{16}')

          def strip_aws(obj):
              if isinstance(obj, dict):
                  return {k: strip_aws(v) for k, v in obj.items()}
              if isinstance(obj, list):
                  return [strip_aws(i) for i in obj]
              if isinstance(obj, str) and AWS_PATTERN.search(obj):
                  return AWS_PATTERN.sub('[REDACTED]', obj)
              return obj

          # Check all JSON files in scraper/ folder
          targets = glob.glob('scraper/*.json') + glob.glob('*.json') + glob.glob('data/*.json')
          cleaned = 0
          for path in targets:
              if 'backup' in path or 'backups' in path:
                  continue  # skip backups
              try:
                  with open(path, encoding='utf-8') as f:
                      data = json.load(f)
                  text_before = json.dumps(data)
                  data_clean = strip_aws(data)
                  text_after = json.dumps(data_clean)
                  if text_before != text_after:
                      with open(path, 'w', encoding='utf-8') as f:
                          json.dump(data_clean, f, ensure_ascii=False)
                      print(f"[SANITIZED] {path} — AWS keys removed")
                      cleaned += 1
              except Exception as e:
                  pass  # skip non-JSON or corrupt files
          print(f"Sanitization done: {cleaned} files cleaned")
          SANITIZE_EOF

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Daily scrape + AI content layer — $(date -u +'%Y-%m-%d %H:%M UTC')" || echo "No changes to commit"
          git pull --rebase --autostash origin main || echo "Nothing to rebase"
          git push

      - name: Completion notice
        if: always()
        run: echo "✅ Daily pipeline finished. Check ai_daily_usage_history.json for quota tracking."
