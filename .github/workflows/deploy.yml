# ══════════════════════════════════════════════════════════════════════
# WORKFLOW 1: deploy.yml — Master Version Bump & Deploy
# Triggers: JS/CSS/HTML code changes (NOT data files)
# Does: version bump only — no page generation
# ══════════════════════════════════════════════════════════════════════

name: 🔖 Deploy — Version Bump

on:
  push:
    branches: [main]
    paths:
      - '*.js'
      - '*.css'
      - 'sw.js'
      - 'tsj-version.js'
      - 'tsj-push.js'
      - 'tsj-menu.js'
      - 'pwa-install.js'
      - 'analytics.js'
      - 'perf-ultra.js'
      - 'styles.css'

  workflow_dispatch:

concurrency:
  group: deploy-version
  cancel-in-progress: false

jobs:
  version-bump:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🔖 Run version bump
        run: node .github/workflows/generate_version.js

      - name: 📤 Commit & Push (conflict-safe)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add version.json sw.js
          git add -u '*.html' 2>/dev/null || true

          if git diff --staged --quiet; then
            echo "✅ Nothing to commit"
            exit 0
          fi

          VERSION=$(node -e "console.log(require('./version.json').version)")
          git commit -m "🔖 Version bump v${VERSION}"

          git fetch origin main
          git merge origin/main -X ours --no-edit --allow-unrelated-histories || true
          git push origin main
          echo "✅ Pushed v${VERSION}"

      - name: 📊 Summary
        run: |
          VERSION=$(node -e "console.log(require('./version.json').version)" 2>/dev/null || echo "unknown")
          echo "### 🔖 Deploy — Version Bump" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger:** \`${{ github.event_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** \`${VERSION}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Time (IST):** $(TZ='Asia/Kolkata' date '+%Y-%m-%d %H:%M')" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
