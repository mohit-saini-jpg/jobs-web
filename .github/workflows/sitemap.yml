name: Daily Sitemap Update

on:
  schedule:
    - cron: '0 1 * * *'  # Har roz raat 1 baje (IST 6:30 AM)
  workflow_dispatch:       # Manual run bhi kar sakte ho

permissions:
  contents: write

jobs:
  update-sitemap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Sitemap Generator
        run: node sitemap-generator.js

      - name: Commit & Push updated sitemap
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sitemap-jobs.xml sitemap-index.xml sitemap.xml
          git diff --staged --quiet || git commit -m "🗺️ Auto-update sitemap $(date +'%Y-%m-%d')"
          git push origin HEAD:main
