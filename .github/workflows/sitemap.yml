name: Daily Sitemap Update

on:
  schedule:
    - cron: '0 1 * * *'  # Har roz raat 1 baje (IST 6:30 AM)
  workflow_dispatch:       # Manual run bhi kar sakte ho

jobs:
  update-sitemap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Run Sitemap Generator
        run: node sitemap-generator.js

      - name: Commit & Push updated sitemap
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add sitemap-jobs.xml sitemap-index.xml sitemap.xml
          git diff --quiet && git diff --staged --quiet || git commit -m "🗺️ Auto-update sitemap $(date +'%Y-%m-%d')"
          git push
