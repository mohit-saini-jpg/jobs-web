# ══════════════════════════════════════════════════════════════════════
# WORKFLOW: scraper-fja-education.yml — GitHub Scraper (FJA + Education)
# Runs on GitHub's own runners (freejobalert.com does not block GitHub IPs).
# Sarkari (SR) scraping stays on the user's PC — see merge-sr.yml instead.
#
# Sequence (must stay sequential — both scripts read-modify-write the SAME
# Complete_Jobs_Full_Data.json via scraper_merge.py, so parallel runs would
# race/corrupt the merge):
#   1. scraper_unified_fja.py  → source "freejobalert_unified"
#   2. scraper_education.py    → source "education_jobs"
# Each step commits+pushes its own result, so a 60-min timeout mid-run only
# loses that step's work — the other's is already safely committed.
#
# Pushing Complete_Jobs_Full_Data.json auto-triggers auto-update-jobs.yml
# (path-trigger already set there), which then chains into
# check-broken-links.yml → ai-nightly.yml.
# ══════════════════════════════════════════════════════════════════════

name: 🆕 GitHub Scraper (FJA + Education)

on:
  schedule:
    - cron: '7 0 * * *'    # Daily ~5:37 AM IST (UTC 00:07 — off-the-hour, avoids
                            # the :00 congestion spike that delayed this to 8:48 AM once
  workflow_dispatch:

concurrency:
  group: scraper-fja-education
  # false lets one stuck/orphaned run permanently block every future
  # scheduled scrape from ever running, with no visible error (see
  # ai-nightly.yml). Each scraper step commits its own checkpoint, so a
  # cancelled run loses at most the in-progress phase, not prior work.
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      actions: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: pip install --quiet requests beautifulsoup4

      - name: 📋 Seed scraper/ working copy of master JSON
        run: cp Complete_Jobs_Full_Data.json scraper/Complete_Jobs_Full_Data.json

      # ── STEP: Unified FJA (qualification + state + district in one pass) ──
      - name: 🕷️ Run Unified FJA scraper
        working-directory: scraper
        run: python scraper_unified_fja.py

      - name: 💾 Commit + push (Unified FJA)
        id: commit_fja
        run: |
          cp scraper/Complete_Jobs_Full_Data.json Complete_Jobs_Full_Data.json
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Complete_Jobs_Full_Data.json
          if git diff --staged --quiet; then
            echo "No FJA changes to commit"
            echo "pushed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "🕷️ FJA scraper update ($(TZ='Asia/Kolkata' date '+%Y-%m-%d %H:%M') IST)"
            for i in 1 2 3; do
              git push origin main && break
              echo "push retry $i…"
              git pull --rebase origin main || break
            done
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          fi

      # ── STEP: Education jobs ────────────────────────────────────────────
      - name: 🕷️ Run Education scraper
        working-directory: scraper
        run: python scraper_education.py

      - name: 💾 Commit + push (Education)
        id: commit_edu
        run: |
          cp scraper/Complete_Jobs_Full_Data.json Complete_Jobs_Full_Data.json
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Complete_Jobs_Full_Data.json
          if git diff --staged --quiet; then
            echo "No Education changes to commit"
            echo "pushed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "🕷️ Education scraper update ($(TZ='Asia/Kolkata' date '+%Y-%m-%d %H:%M') IST)"
            for i in 1 2 3; do
              git push origin main && break
              echo "push retry $i…"
              git pull --rebase origin main || break
            done
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          fi

      # PERMANENT NOTE (2026-07-13): pushes made with the default GITHUB_TOKEN
      # do NOT trigger other workflows' `push` events — GitHub's built-in
      # infinite-loop guard, not something we can configure away (same issue
      # fixed in merge-sr.yml the same day). So a real scrape could succeed
      # and push fresh jobs, yet the site never rebuilt from them — visitors
      # kept seeing yesterday's order/content until the next unrelated push
      # or the 7 AM cron. Explicitly dispatching here closes that gap.
      - name: 🚀 Trigger site regeneration (auto-update-jobs.yml)
        if: steps.commit_fja.outputs.pushed == 'true' || steps.commit_edu.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run auto-update-jobs.yml

      - name: 📊 Summary
        run: |
          echo "### 🆕 GitHub Scraper (FJA + Education)" >> $GITHUB_STEP_SUMMARY
          echo "- **Time (IST):** $(TZ='Asia/Kolkata' date '+%Y-%m-%d %H:%M')" >> $GITHUB_STEP_SUMMARY
