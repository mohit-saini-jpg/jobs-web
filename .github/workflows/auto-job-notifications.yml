# TOP SARKARI JOBS — Auto Individual Job Notifications
# Har 10 min mein ek INDIVIDUAL JOB PAGE ka notification
# URL: https://www.topsarkarijobs.com/jobs/[slug]/
# NOT section pages — actual job detail pages

name: Auto Job Notifications (Every 10 Min)

on:
  schedule:
    - cron: '0,10,20,30,40,50 4-17 * * *'  # 9:30 AM–11 PM IST

  workflow_dispatch:
    inputs:
      category:
        description: 'Category'
        required: false
        type: choice
        options: ['', 'latest-jobs', 'result', 'admit-card', 'answer-key', 'admission']
      force_slug:
        description: 'Specific job slug (optional)'
        required: false

jobs:
  send-job-notification:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm install firebase-admin

      - name: Pick Real Job & Send Notification
        env:
          SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          FORCE_CATEGORY: ${{ inputs.category }}
          FORCE_SLUG: ${{ inputs.force_slug }}
        run: |
          node << 'SCRIPT'
          const admin = require('firebase-admin');
          const fs    = require('fs');

          // Init Firebase
          admin.initializeApp({ credential: admin.credential.cert(JSON.parse(process.env.SA_JSON)) });
          const msg  = admin.messaging();
          const SITE = 'https://www.topsarkarijobs.com';

          // Category config — maps to Complete_Jobs_Full_Data.json sarkari_data.jobs category keys
          const CAT_MAP = {
            'latest-jobs': {
              dataKey: 'SR_Latest_Jobs',
              fallbackKey: 'Latest_Notifications',  // sections-index.json
              topic:  'tsj-latest-jobs',
              emoji:  '💼',
              action: '💼 Apply Now',
              body:   (t) => `${t.slice(0,80)} — Abhi apply karein! Last date miss mat karo.`,
            },
            'result': {
              dataKey: 'SR_Result',
              fallbackKey: null,
              topic:  'tsj-result',
              emoji:  '🏆',
              action: '🏆 Result Dekho',
              body:   (t) => `${t.slice(0,80)} — Result aa gaya! Roll no. check karo.`,
            },
            'admit-card': {
              dataKey: 'SR_Admit_Card',
              fallbackKey: null,
              topic:  'tsj-admit-card',
              emoji:  '🎫',
              action: '🎫 Download Karo',
              body:   (t) => `${t.slice(0,80)} — Admit Card jari! Abhi download karo.`,
            },
            'answer-key': {
              dataKey: 'SR_Answer_Key',
              fallbackKey: null,
              topic:  'tsj-answer-key',
              emoji:  '🔑',
              action: '🔑 Dekho',
              body:   (t) => `${t.slice(0,80)} — Answer Key jari!`,
            },
            'admission': {
              dataKey: 'SR_Admission',
              fallbackKey: null,
              topic:  'tsj-admission',
              emoji:  '🎓',
              action: '🎓 Dekho',
              body:   (t) => `${t.slice(0,80)} — Admission form open!`,
            },
          };

          // Load data files
          let mergedJobs = [];
          let sectionsIdx = {};
          // SINGLE SOURCE: extract from Complete_Jobs_Full_Data.json
          try { const cj=JSON.parse(fs.readFileSync('Complete_Jobs_Full_Data.json','utf8')); mergedJobs=(cj.sarkari_data&&cj.sarkari_data.jobs)||cj.jobs||[]; } catch(e){}
          try { sectionsIdx = JSON.parse(fs.readFileSync('sections-index.json','utf8')); } catch(e){}

          // Pick category — rotate every 10 min
          const catKeys = Object.keys(CAT_MAP);
          const tick    = Math.floor(Date.now() / 600000);
          let   catKey  = process.env.FORCE_CATEGORY || catKeys[tick % catKeys.length];
          if (!CAT_MAP[catKey]) catKey = 'latest-jobs';
          const cat = CAT_MAP[catKey];

          // Pick job from merged_sarkari_data (has proper slugs → /jobs/[slug]/)
          let jobSlug  = '';
          let jobTitle = '';
          let jobUrl   = '';

          if (process.env.FORCE_SLUG) {
            jobSlug  = process.env.FORCE_SLUG;
            jobTitle = jobSlug.replace(/-/g,' ').replace(/\b\w/g, c=>c.toUpperCase());
            jobUrl   = `${SITE}/jobs/${jobSlug}/`;
          } else {
            // Get jobs with slugs for this category
            let items = mergedJobs.filter(j => j.category === cat.dataKey && j.slug && j.slug.length > 5);
            
            // Fallback to sections-index Latest_Notifications
            if (!items.length && cat.fallbackKey && sectionsIdx[cat.fallbackKey]) {
              items = sectionsIdx[cat.fallbackKey]
                .filter(i => i.slug && i.slug.length > 5)
                .map(i => ({ slug: i.slug, title: i.name || i.title || '' }));
            }

            if (!items.length) {
              // Last fallback: any Latest_Notifications
              items = (sectionsIdx['Latest_Notifications'] || [])
                .filter(i => i.slug && i.slug.length > 5)
                .map(i => ({ slug: i.slug, title: i.name || '' }));
            }

            if (!items.length) {
              console.log('No items found for:', catKey);
              process.exit(0);
            }

            // Rotate index — different job each 10 min, no repeats for hours
            const idx = tick % items.length;
            const job = items[idx];
            jobSlug   = job.slug;
            jobTitle  = (job.title || jobSlug.replace(/-/g,' ')).trim();
            // ALWAYS use /jobs/[slug]/ — individual job detail page
            jobUrl    = `${SITE}/jobs/${jobSlug}/`;
          }

          // Build notification
          const shortTitle  = jobTitle.length > 62 ? jobTitle.slice(0,59)+'...' : jobTitle;
          const notifTitle  = `${cat.emoji} ${shortTitle}`;
          const notifBody   = cat.body(jobTitle);

          const message = {
            topic: cat.topic,
            webpush: {
              notification: {
                title:    notifTitle,
                body:     notifBody,
                icon:     `${SITE}/icons/icon-192x192.png`,
                badge:    `${SITE}/icons/icon-96x96.png`,
                tag:      `tsj-${catKey}`,
                renotify: true,
                requireInteraction: false,
                vibrate:  [150, 80, 150],
                actions:  [
                  { action: 'view',    title: cat.action },
                  { action: 'dismiss', title: '✕ Baad Mein' },
                ],
              },
              // CRITICAL: link in fcmOptions ensures click opens job URL
              fcmOptions: { link: jobUrl },
            },
            android: {
              priority: 'high',
              notification: {
                title:     notifTitle,
                body:      notifBody,
                color:     '#0d2257',
                tag:       `tsj-${catKey}`,
                channelId: 'tsj_jobs',
                defaultVibrateTimings: true,
              },
              data: { url: jobUrl, category: catKey, title: notifTitle, body: notifBody },
            },
            // Data payload — sw.js reads this for notification click routing
            data: {
              title:    notifTitle,
              body:     notifBody,
              url:      jobUrl,    // ← Individual job page URL
              category: catKey,
              slug:     jobSlug,
            },
          };

          msg.send(message)
            .then(id => {
              console.log('✅ Notification sent!');
              console.log('   Category:', catKey, '→', cat.topic);
              console.log('   Job Title:', shortTitle);
              console.log('   Job URL:', jobUrl);   // Should be /jobs/[slug]/
              console.log('   FCM ID:', id);
            })
            .catch(err => {
              console.warn('⚠️ Send result:', err.message);
              console.log('   (Normal if 0 subscribers — will work after users subscribe)');
            });
          SCRIPT

      - name: Summary
        run: |
          echo "### 🔔 Auto Job Notification" >> $GITHUB_STEP_SUMMARY
          echo "- **Time (IST):** $(TZ='Asia/Kolkata' date '+%Y-%m-%d %H:%M')" >> $GITHUB_STEP_SUMMARY
