# ╔══════════════════════════════════════════════════════════════════╗
# ║  TOP SARKARI JOBS — Auto Individual Job Notifications           ║
# ║  Har 10 minute mein ek individual job page ka notification      ║
# ║  Latest Jobs · Admit Card · Result · Answer Key — rotate karta  ║
# ╚══════════════════════════════════════════════════════════════════╝
#
# SECRETS needed:
#   FIREBASE_SERVICE_ACCOUNT_JSON — content of serviceAccountKey.json

name: Auto Job Notifications (Every 10 Min)

on:
  schedule:
    # IST = UTC+5:30 | 9:30 AM to 11:00 PM IST = 4:00 to 17:30 UTC
    - cron: '0,10,20,30,40,50 4-17 * * *'

  workflow_dispatch:
    inputs:
      category:
        description: 'Category'
        required: false
        type: choice
        options: ['', 'latest-jobs', 'result', 'admit-card', 'answer-key']
      force_slug:
        description: 'Specific job slug (optional)'
        required: false

jobs:
  send-job-notification:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - run: npm install firebase-admin

      - name: Pick Job & Send Notification
        env:
          SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          FORCE_CATEGORY: ${{ inputs.category }}
          FORCE_SLUG: ${{ inputs.force_slug }}
        run: |
          node << 'SCRIPT'
          const admin = require('firebase-admin');
          const fs    = require('fs');

          // ── Firebase init ──────────────────────────────────────────
          const sa = JSON.parse(process.env.SA_JSON);
          admin.initializeApp({ credential: admin.credential.cert(sa) });
          const msg  = admin.messaging();
          const SITE = 'https://www.topsarkarijobs.com';

          // ── Category config ────────────────────────────────────────
          // Matches exact category keys from merged_sarkari_data.json
          const CAT_MAP = {
            'latest-jobs': {
              dataKey:  'SR_Latest_Jobs',
              fallback: 'Latest_Notifications', // from sections-index.json
              topic:    'tsj-latest-jobs',
              emoji:    '💼',
              label:    'New Job Alert',
              action:   '💼 Apply Now',
              bodyTpl:  (t) => `${t} — Abhi apply karein! Last date miss mat karo.`,
            },
            'result': {
              dataKey:  'SR_Result',
              fallback: null,
              topic:    'tsj-result',
              emoji:    '🏆',
              label:    'Result Declared!',
              action:   '🏆 Result Dekho',
              bodyTpl:  (t) => `${t} — Result aa gaya! Roll no. check karo.`,
            },
            'admit-card': {
              dataKey:  'SR_Admit_Card',
              fallback: null,
              topic:    'tsj-admit-card',
              emoji:    '🎫',
              label:    'Admit Card Out!',
              action:   '🎫 Download Karo',
              bodyTpl:  (t) => `${t} — Admit Card jari! Abhi download karo.`,
            },
            'answer-key': {
              dataKey:  'SR_Answer_Key',
              fallback: null,
              topic:    'tsj-answer-key',
              emoji:    '🔑',
              label:    'Answer Key Out!',
              action:   '🔑 Answer Key Dekho',
              bodyTpl:  (t) => `${t} — Answer Key jari! Objection check karo.`,
            },
          };

          // ── Load data files ────────────────────────────────────────
          let mergedData   = { jobs: [] };
          let sectionsIdx  = {};
          try { mergedData  = JSON.parse(fs.readFileSync('merged_sarkari_data.json',  'utf8')); } catch(e) {}
          try { sectionsIdx = JSON.parse(fs.readFileSync('sections-index.json', 'utf8')); } catch(e) {}

          const allJobs = mergedData.jobs || [];

          // ── Pick category — rotate every 10 min ───────────────────
          const cats    = Object.keys(CAT_MAP);
          const tick    = Math.floor(Date.now() / 600000); // changes every 10 min
          let   catKey  = process.env.FORCE_CATEGORY || cats[tick % cats.length];
          if (!CAT_MAP[catKey]) catKey = 'latest-jobs';
          const cat     = CAT_MAP[catKey];

          // ── Get job list for this category ─────────────────────────
          let items = allJobs.filter(j => j.category === cat.dataKey && j.slug);

          // Fallback to sections-index Latest_Notifications
          if (!items.length && cat.fallback && sectionsIdx[cat.fallback]) {
            items = sectionsIdx[cat.fallback]
              .filter(i => i.slug)
              .map(i => ({ slug: i.slug, title: i.name || i.title || '' }));
          }

          if (!items.length) {
            // Last fallback: any Latest_Notifications from sections
            items = (sectionsIdx['Latest_Notifications'] || [])
              .filter(i => i.slug)
              .map(i => ({ slug: i.slug, title: i.name || '' }));
          }

          if (!items.length) {
            console.log('No items found for:', catKey);
            process.exit(0);
          }

          // ── Pick job (rotate index — no repeats for hours) ─────────
          let job;
          if (process.env.FORCE_SLUG) {
            job = { slug: process.env.FORCE_SLUG, title: process.env.FORCE_SLUG.replace(/-/g,' ') };
          } else {
            const idx = tick % items.length;
            job       = items[idx];
          }

          // ── Build job URL ──────────────────────────────────────────
          const slug   = job.slug || '';
          const jobUrl = slug.startsWith('http') ? slug : `${SITE}/jobs/${slug}/`;

          // ── Build notification text ────────────────────────────────
          const rawTitle   = (job.title || slug.replace(/-/g,' ')).trim();
          const shortTitle = rawTitle.length > 60 ? rawTitle.slice(0,57) + '...' : rawTitle;
          const notifTitle = `${cat.emoji} ${shortTitle}`;
          const notifBody  = cat.bodyTpl(rawTitle.slice(0, 90));

          // ── FCM message ────────────────────────────────────────────
          const message = {
            topic: cat.topic,
            webpush: {
              notification: {
                title:    notifTitle,
                body:     notifBody,
                icon:     `${SITE}/icons/icon-192x192.png`,
                badge:    `${SITE}/icons/icon-96x96.png`,
                tag:      `tsj-${catKey}-job`,
                renotify: true,
                requireInteraction: false,
                vibrate:  [150, 80, 150],
                actions: [
                  { action: 'view',    title: cat.action },
                  { action: 'dismiss', title: '✕ Baad Mein' },
                ],
              },
              fcmOptions: { link: jobUrl },
            },
            android: {
              priority: 'high',
              notification: {
                title:     notifTitle,
                body:      notifBody,
                color:     '#0d2257',
                tag:       `tsj-${catKey}-job`,
                channelId: 'tsj_jobs',
                defaultVibrateTimings: true,
              },
              data: { url: jobUrl, category: catKey },
            },
            // Data payload — sw.js uses this to route notification click
            data: {
              title:    notifTitle,
              body:     notifBody,
              url:      jobUrl,
              category: catKey,
              slug:     slug,
            },
          };

          msg.send(message)
            .then(id => {
              console.log('✅ Notification sent!');
              console.log('   Category :', catKey, '→', cat.topic);
              console.log('   Job      :', shortTitle);
              console.log('   URL      :', jobUrl);
              console.log('   FCM ID   :', id);
            })
            .catch(err => {
              // Don't fail the action — topic might have no subscribers yet
              console.warn('⚠️  Send result:', err.message);
              console.log('   (Normal if no subscribers yet — will work after users subscribe)');
            });
          SCRIPT

      - name: Summary
        run: |
          echo "### 🔔 Auto Job Notification" >> $GITHUB_STEP_SUMMARY
          echo "- **Time (IST):** $(TZ='Asia/Kolkata' date '+%Y-%m-%d %H:%M')" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
