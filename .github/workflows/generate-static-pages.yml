name: Generate Static Pages Manual Full Regen

on:
  workflow_dispatch:
    inputs:
      force_regenerate:
        description: Force regenerate all pages
        type: boolean
        default: true
      run_validate:
        description: Run validation after generation
        type: boolean
        default: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - name: Checkout latest code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Version bump
        run: node .github/workflows/generate_version.js

      - name: Record start time
        run: echo "START_TIME=$(date +%s)" >> $GITHUB_ENV

      - name: Ensure JSON data at root
        run: |
          if [ ! -f "Complete_Jobs_Full_Data.json" ] && [ -f "data/Complete_Jobs_Full_Data.json" ]; then
            cp data/Complete_Jobs_Full_Data.json Complete_Jobs_Full_Data.json
            echo "JSON copied from data/"
          fi
          ls -lh Complete_Jobs_Full_Data.json 2>/dev/null || echo "WARNING: JSON not found"

      - name: Ensure output dirs exist (preserve old pages for SEO)
        run: |
          # DO NOT delete old pages. Wiping jobs/ on every run made expired-job
          # URLs 404 and hurt Google rankings. generate_all.py overwrites current
          # jobs; old pages stay live and indexed.
          mkdir -p jobs/data state education category/study section qualification
          echo "Output dirs ready (old pages preserved)"

      - name: Patch generate_all.py if needed
        run: |
          # Remove broken build_seo_title call if present (NameError fix)
          if grep -q "build_seo_title" generate_all.py 2>/dev/null; then
            echo "Applying permanent fix to generate_all.py..."
            python3 .github/workflows/patch_generator.py
            echo "Patch applied"
          else
            echo "generate_all.py is up to date, no patch needed"
          fi

      - name: UNIFIED generator - generate_all.py
        run: |
          echo "Running unified generator..."
          python3 generate_all.py
          python3 fix_jobposting_schema.py
          echo "Generation complete"

      - name: Fix AI duplication in built pages
        run: python3 scripts/fix_ai_duplication.py --apply

      - name: Inject dynamic SEO headings (orphan/legacy pages)
        run: python3 scripts/inject_dynamic_headings.py --apply

      - name: Bulk fix lang attribute (en-IN for English pages)
        run: |
          find jobs category/study state education section qualification -name "index.html" \
            -exec sed -i 's/<html lang="hi-IN">/<html lang="en-IN">/g' {} + 2>/dev/null || true
          echo "lang attributes fixed"

      - name: Rebuild sitemaps
        run: |
          node .github/workflows/generate_sitemap.js 2>/dev/null || true
          python3 .github/workflows/build_sitemaps.py 2>/dev/null || true

      - name: Rebuild minified JS from source (permanent freshness fix)
        run: |
          # If source JS changed, the minified file must be rebuilt — otherwise
          # the live site keeps running stale code even though the source updated.
          npm install -g terser >/dev/null 2>&1 || true
          if command -v terser >/dev/null 2>&1; then
            [ -f script.js ] && terser script.js --compress --mangle -o script.min.js 2>/dev/null && echo "rebuilt script.min.js" || true
            [ -f smart-search.js ] && terser smart-search.js --compress --mangle -o smart-search.min.js 2>/dev/null && echo "rebuilt smart-search.min.js" || true
            [ -f seo-engine.js ] && terser seo-engine.js --compress --mangle -o seo-engine.min.js 2>/dev/null && echo "rebuilt seo-engine.min.js" || true
          else
            echo "terser unavailable — skipping minify rebuild"
          fi

      - name: Bump asset cache versions
        run: |
          VERSION=$(date +%Y%m%d%H%M%S)
          # Bump ?v= on ALL html (not just index) so every page busts cache when files change.
          # Limit to known versioned asset names to stay safe.
          find . -name "*.html" -not -path "./.git/*" -print0 | xargs -0 sed -i -E \
            "s/(script\.min\.js\?v=)[0-9]+/\1${VERSION}/g; \
             s/(smart-search\.min\.js\?v=)[0-9]+/\1${VERSION}/g; \
             s/(seo-engine\.min\.js\?v=)[0-9]+/\1${VERSION}/g; \
             s/(sections-index\.json\?v=)[0-9]+/\1${VERSION}/g; \
             s/(dailyupdates\.json\?v=)[0-9]+/\1${VERSION}/g; \
             s/(styles\.css\?v=)[0-9]+/\1${VERSION}/g" 2>/dev/null || true
          echo "Asset versions bumped to ${VERSION} across all HTML"

      - name: Count generated pages
        run: |
          JOBS=$(find jobs -maxdepth 2 -name "index.html" 2>/dev/null | wc -l)
          STATE=$(find state -maxdepth 3 -name "index.html" 2>/dev/null | wc -l)
          EDU=$(find education -maxdepth 3 -name "index.html" 2>/dev/null | wc -l)
          CAT=$(find category -maxdepth 4 -name "index.html" 2>/dev/null | wc -l)
          SEC=$(find section -maxdepth 2 -name "index.html" 2>/dev/null | wc -l)
          QUAL=$(find qualification -maxdepth 2 -name "index.html" 2>/dev/null | wc -l)
          TOTAL=$((JOBS + STATE + EDU + CAT + SEC + QUAL))
          echo "PAGES_GENERATED=${TOTAL}" >> $GITHUB_ENV
          echo "Pages: jobs=$JOBS state=$STATE edu=$EDU cat=$CAT sec=$SEC qual=$QUAL TOTAL=$TOTAL"

      - name: Validate generated pages
        if: ${{ inputs.run_validate == true }}
        run: python3 scripts/validate.py --fail

      - name: Commit and Push (safe - no stale merge)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage ALL generated files
          git add jobs/ state/ education/ category/ section/ qualification/ 2>/dev/null || true
          git add jobs-index.json sections-index.json version.json sw.js 2>/dev/null || true
          git add Qualification_Wise_Jobs.json 2>/dev/null || true
          git add sitemap-jobs.xml sitemap-states.xml sitemap-education.xml sitemap-categories.xml 2>/dev/null || true
          git add sitemap-sections.xml sitemap.xml 2>/dev/null || true
          git add index.html 2>/dev/null || true
          git add -A 2>/dev/null || true

          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          VERSION=$(node -e "console.log(require('./version.json').version)" 2>/dev/null || echo "$(date +%Y%m%d)")
          git commit -m "Full regen v${VERSION}: ${PAGES_GENERATED} pages [skip ci]"

          # Safe push: stash → fetch → merge (no rebase to avoid unstaged changes error)
          git stash --include-untracked 2>/dev/null || true
          git fetch origin main
          git merge origin/main -X ours --no-edit --allow-unrelated-histories 2>/dev/null || true
          git stash pop 2>/dev/null || true
          git push origin main
          echo "Pushed successfully - ${PAGES_GENERATED} pages live"

      - name: Summary
        run: |
          END_TIME=$(date +%s)
          ELAPSED=$(( END_TIME - START_TIME ))
          VERSION=$(node -e "console.log(require('./version.json').version)" 2>/dev/null || echo "unknown")
          echo "### Full Static Page Regen Complete" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Pages Generated | **${PAGES_GENERATED}** |" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`${VERSION}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Time Taken | ${ELAPSED}s |" >> $GITHUB_STEP_SUMMARY
          echo "| Generator | generate_all.py (unified) |" >> $GITHUB_STEP_SUMMARY
          echo "| IST Time | $(TZ='Asia/Kolkata' date '+%Y-%m-%d %H:%M') |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Old pages are preserved (never deleted) — only current jobs are added/updated. No stale-content wipe.**" >> $GITHUB_STEP_SUMMARY
