name: Lighthouse Performance Monitor

# Report-only: measures live-site performance, writes a scoreboard to the run
# summary, and opens/updates a GitHub issue on a real drop. NEVER modifies
# code or fails a deploy — it's a monitor, not a fixer.
#
# MANUAL ONLY (2026-07-13, user request): no schedule/push auto-trigger — run
# it from the Actions tab when you actually want a performance check.

on:
  workflow_dispatch: {}           # run on demand from the Actions tab

# Don't pile up runs; a newer commit/schedule supersedes an in-flight one.
concurrency:
  group: lighthouse-monitor
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # On a push, give Vercel time to build & promote the new deploy before we
      # measure the LIVE site (schedule/manual runs skip this — site is already up).
      - name: Wait for Vercel deploy
        if: github.event_name == 'push'
        run: sleep 120

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        continue-on-error: true      # budget failures must not fail the job
        with:
          configPath: ./lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Build summary + detect regression
        id: parse
        run: node .github/workflows/lh-summary.js

      - name: Open / update regression issue
        if: steps.parse.outputs.regressed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '⚠️ Lighthouse performance regression detected.';
            try { body = fs.readFileSync('.lighthouseci/issue-body.md', 'utf8'); } catch (e) {}
            const TITLE = '⚠️ Lighthouse performance regression';
            const { owner, repo } = context.repo;
            const existing = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: 'perf-regression', per_page: 5
            });
            if (existing.data.length) {
              const n = existing.data[0].number;
              await github.rest.issues.createComment({ owner, repo, issue_number: n, body });
              core.info(`Updated existing issue #${n}`);
            } else {
              const created = await github.rest.issues.create({
                owner, repo, title: TITLE, body, labels: ['perf-regression']
              });
              core.info(`Opened issue #${created.data.number}`);
            }
