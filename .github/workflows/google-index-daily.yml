# ══════════════════════════════════════════════════════════════════════
# WORKFLOW: google-index-daily.yml — Google Indexing API (ONCE A DAY)
# ══════════════════════════════════════════════════════════════════════
# WHY THIS EXISTS (2026-07-13): this step used to live inside
# auto-update-jobs.yml, so it fired on EVERY pipeline run — and that
# pipeline can run many times a day (scraper pushes, manual SR uploads,
# any code push). Google's Indexing API rejects requests with HTTP 429
# after just a handful per call, not anywhere near the 200/day quota the
# script assumes — so back-to-back runs the same day mostly just burned
# through a few requests each and hit 429 immediately, wasting most of
# the day's real quota on failed/duplicate attempts instead of steadily
# draining the backlog.
#
# Moving this to its own once-daily cron means exactly ONE clean attempt
# at the real quota per day, at a fixed time, regardless of how many
# times the rest of the pipeline fires that day.
# ══════════════════════════════════════════════════════════════════════

name: 🔎 Google Indexing API (Daily)

on:
  schedule:
    - cron: '30 8 * * *'   # Daily 2:00 PM IST (UTC 08:30) — after SEO
                            # Guardian (1:30 PM, 30min timeout), so nothing
                            # gets submitted before being validated
                            # (user-confirmed chain order, 2026-07-13).
  workflow_dispatch:

concurrency:
  group: google-index-daily
  cancel-in-progress: true

jobs:
  submit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🔎 Google Indexing API submit
        env:
          GOOGLE_INDEXING_SA_JSON: ${{ secrets.GOOGLE_INDEXING_SA_JSON }}
        run: node .github/workflows/google-index-submit.js

      - name: 💾 Commit Google-index state
        run: |
          git add data/google_index_state.json 2>/dev/null || true
          if ! git diff --staged --quiet; then
            git -c user.name="github-actions[bot]" \
                -c user.email="github-actions[bot]@users.noreply.github.com" \
                commit -m "🔎 Google index state ($(TZ='Asia/Kolkata' date '+%Y-%m-%d %H:%M') IST) [skip ci]"

            # ROOT CAUSE FIX (2026-07-14): the old 3-attempt loop treated a
            # rebase conflict as "give up" (bare `|| break`, no exit 1) --
            # today's submitted_today/done_slugs update (192 newly-submitted
            # URLs) silently never reached origin because another workflow
            # pushed at the same moment, and the job still reported "success".
            # Tomorrow's run would then re-submit the same 192 URLs instead of
            # draining fresh backlog. Same robust pattern as ai-patch-html.yml:
            # more retries, rebase-then-merge-ours fallback, and a hard exit 1
            # so a real failure is visible instead of silently swallowed.
            push_ok=0
            for i in 1 2 3 4 5; do
              if git push origin main; then push_ok=1; break; fi
              echo "push rejected (attempt $i/5) — syncing with origin/main…"
              git fetch origin main || true
              if ! git rebase origin/main; then
                git rebase --abort 2>/dev/null || true
                git merge -X ours --no-edit origin/main || true
              fi
              sleep 4
            done
            if [ "$push_ok" = "1" ]; then
              echo "✅ Google-index state pushed"
            else
              echo "❌ push failed after 5 attempts — today's submitted/done_slugs update was lost"
              exit 1
            fi
          else
            echo "No state change to commit."
          fi

      - name: 📊 Summary
        run: |
          echo "### 🔎 Google Indexing API (Daily)" >> $GITHUB_STEP_SUMMARY
          echo "- **Time (IST):** $(TZ='Asia/Kolkata' date '+%Y-%m-%d %H:%M')" >> $GITHUB_STEP_SUMMARY
