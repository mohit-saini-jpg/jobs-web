# ══════════════════════════════════════════════════════════════════════
# WORKFLOW: google-index-daily.yml — Google Indexing API (ONCE A DAY)
# ══════════════════════════════════════════════════════════════════════
# WHY THIS EXISTS (2026-07-13): this step used to live inside
# auto-update-jobs.yml, so it fired on EVERY pipeline run — and that
# pipeline can run many times a day (scraper pushes, manual SR uploads,
# any code push). Google's Indexing API rejects requests with HTTP 429
# after just a handful per call, not anywhere near the 200/day quota the
# script assumes — so back-to-back runs the same day mostly just burned
# through a few requests each and hit 429 immediately, wasting most of
# the day's real quota on failed/duplicate attempts instead of steadily
# draining the backlog.
#
# Moving this to its own once-daily cron means exactly ONE clean attempt
# at the real quota per day, at a fixed time, regardless of how many
# times the rest of the pipeline fires that day.
# ══════════════════════════════════════════════════════════════════════

name: 🔎 Google Indexing API (Daily)

on:
  schedule:
    - cron: '30 8 * * *'   # Daily 2:00 PM IST (UTC 08:30) — after SEO
                            # Guardian (1:30 PM, 30min timeout), so nothing
                            # gets submitted before being validated
                            # (user-confirmed chain order, 2026-07-13).
  workflow_dispatch:

concurrency:
  group: google-index-daily
  cancel-in-progress: true

jobs:
  # Especially important here: a duplicate run burns real Google Indexing
  # API quota on 429s instead of steadily draining the backlog (see the
  # header comment above) — the exact failure mode this workflow was split
  # out to prevent in the first place. Prevents a late-firing native
  # `schedule` event from redoing today's submission if
  # punctual_dispatcher.py already ran it — see
  # .github/actions/skip-daily-duplicate/action.yml.
  guard:
    runs-on: ubuntu-latest
    permissions:
      actions: read
    outputs:
      skip: ${{ steps.g.outputs.skip }}
    steps:
      - uses: actions/checkout@v4
      - id: g
        uses: ./.github/actions/skip-daily-duplicate
        with:
          workflow-file: google-index-daily.yml

  submit:
    needs: guard
    if: needs.guard.outputs.skip != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🔎 Google Indexing API submit
        env:
          GOOGLE_INDEXING_SA_JSON: ${{ secrets.GOOGLE_INDEXING_SA_JSON }}
        run: node .github/workflows/google-index-submit.js

      - name: 💾 Commit Google-index state
        # ROOT CAUSE FIX (2026-07-16): git-level rebase/merge on this file
        # was fragile under concurrent pushes — on 2026-07-16 it failed 5/5
        # retries (one hit a git-identity edge case in the merge fallback)
        # and silently lost a real 200-URL Google Indexing API submission
        # from the day's tracking, which cascaded into a second run wasting
        # the day's remaining real Google quota on redundant work. Replaced
        # with save-google-index-state.js: a SEMANTIC (JSON-level) merge —
        # union the URL lists with whatever is on origin right now, then
        # `git reset --hard origin/main` + recommit — so there is no git
        # conflict state to get stuck in, no matter how many processes push
        # around the same time. See that file's header comment for detail.
        run: node .github/workflows/save-google-index-state.js

      - name: 📊 Summary
        run: |
          echo "### 🔎 Google Indexing API (Daily)" >> $GITHUB_STEP_SUMMARY
          echo "- **Time (IST):** $(TZ='Asia/Kolkata' date '+%Y-%m-%d %H:%M')" >> $GITHUB_STEP_SUMMARY
