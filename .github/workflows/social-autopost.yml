# ══════════════════════════════════════════════════════════════════════
# WORKFLOW: social-autopost.yml — X (Twitter) + Telegram Auto-Posting
# Completely separate from the site-build pipeline (auto-update-jobs.yml).
# Does NOT run on every code/JSON push — only on its own schedule or
# when triggered manually.
# ══════════════════════════════════════════════════════════════════════

name: 📢 Social Auto-Post (X + Telegram)

on:
  schedule:
    # Every 3 hours, all day. Adjust the cron expression if you want a
    # different frequency (this does NOT need to match the site-build schedule).
    - cron: '0 */3 * * *'

  workflow_dispatch:   # lets you click "Run workflow" manually anytime

concurrency:
  group: social-autopost
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: pip install --quiet tweepy requests

      - name: 📢 Run social auto-post
        env:
          X_CONSUMER_KEY: ${{ secrets.X_CONSUMER_KEY }}
          X_CONSUMER_SECRET: ${{ secrets.X_CONSUMER_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: python3 run_social_autopost.py

      - name: 📤 Commit posted_jobs.txt (dedupe tracking)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add posted_jobs.txt 2>/dev/null || true

          if git diff --staged --quiet; then
            echo "✅ No new posts — nothing to commit"
            exit 0
          fi

          git commit -m "🤖 Update posted_jobs.txt [skip ci]"

          # Retry push a couple times in case another workflow pushed in between
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin main && break
            echo "Push failed, retrying ($i)..."
            sleep 5
          done
