# ══════════════════════════════════════════════════════════════════
# FILE: .github/workflows/ai-patch-html.yml
# PURPOSE: AI data existing HTML pages mein inject karo
# TRIGGER: ai-nightly.yml complete hone ke baad automatically
#          Ya manually run karo
# ══════════════════════════════════════════════════════════════════
name: 🔧 AI HTML Patcher

on:
  # ai-nightly workflow complete hone ke baad auto-trigger
  workflow_run:
    workflows: ["🌙 AI Content Enrichment (Nightly)"]
    types: [completed]

  # Manual trigger bhi
  workflow_dispatch:
    inputs:
      slug:
        description: 'Single slug test (blank = all AI jobs)'
        required: false
        default: ''

concurrency:
  group: ai-patch-html
  cancel-in-progress: false

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    # Sirf chalao agar nightly succeeded ya manual trigger
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: 📥 Checkout (with full history for git push)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: 🐍 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🔧 Patch AI content into HTML files
        env:
          SLUG: ${{ github.event.inputs.slug || '' }}
        run: |
          if [ -n "$SLUG" ]; then
            python3 patch_ai_html.py --slug "$SLUG"
          else
            python3 patch_ai_html.py
          fi

      - name: 💾 Commit patched HTML
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add jobs/

          if git diff --staged --quiet; then
            echo "No HTML changes (all pages already up-to-date)"
            exit 0
          fi

          PATCHED=$(git diff --staged --name-only | grep "index.html" | wc -l)
          DATE_IST=$(TZ='Asia/Kolkata' date '+%Y-%m-%d %H:%M')
          git commit -m "🤖 AI patched: ${PATCHED} HTML pages updated | ${DATE_IST} IST [skip ci]"
          git push origin main
          echo "✅ ${PATCHED} pages committed and pushed"

      - name: 📊 Summary
        run: |
          echo "### 🔧 AI HTML Patcher" >> $GITHUB_STEP_SUMMARY
          echo "- Patched HTML files committed to /jobs/" >> $GITHUB_STEP_SUMMARY
          echo "- Time (IST): $(TZ='Asia/Kolkata' date '+%Y-%m-%d %H:%M')" >> $GITHUB_STEP_SUMMARY
