# ══════════════════════════════════════════════════════════════════
# FILE: .github/workflows/ai-patch-html.yml
# PURPOSE: AI data existing HTML pages mein inject karo
# TRIGGER: ai-nightly.yml complete hone ke baad automatically
#          Ya manually run karo
# ══════════════════════════════════════════════════════════════════
name: 🔧 AI HTML Patcher

on:
  # Bonus trigger: ai-nightly workflow complete hone ke baad auto-trigger,
  # IF GitHub actually delivers the workflow_run event (this chain had gone
  # silent for 2+ weeks despite ai-nightly itself running fine — workflow_run
  # is unreliable in this repo). Cron below is the real, reliable trigger.
  workflow_run:
    workflows: ["🌙 AI Content Enrichment (Nightly)"]
    types: [completed]

  schedule:
    - cron: '30 7 * * *'   # Daily 1:00 PM IST — comfortable buffer after
                            # AI Content Enrichment's 9:30 AM start (up to
                            # 170 min runtime)

  # Manual trigger bhi
  workflow_dispatch:
    inputs:
      slug:
        description: 'Single slug test (blank = all AI jobs)'
        required: false
        default: ''

concurrency:
  group: ai-patch-html
  # Same reasoning as ai-nightly.yml — false lets one stuck/orphaned run
  # permanently block every future trigger with no visible error.
  cancel-in-progress: true

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    # Sirf chalao agar nightly succeeded ya manual trigger ya scheduled
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: 📥 Checkout (with full history for git push)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: 🐍 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🔧 Patch AI content into HTML files
        env:
          SLUG: ${{ github.event.inputs.slug || '' }}
        run: |
          if [ -n "$SLUG" ]; then
            python3 patch_ai_html.py --slug "$SLUG"
          else
            python3 patch_ai_html.py
          fi

      - name: 💾 Commit patched HTML
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add jobs/

          if git diff --staged --quiet; then
            echo "No HTML changes (all pages already up-to-date)"
            exit 0
          fi

          PATCHED=$(git diff --staged --name-only | grep "index.html" | wc -l)
          DATE_IST=$(TZ='Asia/Kolkata' date '+%Y-%m-%d %H:%M')
          git commit -m "🤖 AI patched: ${PATCHED} HTML pages updated | ${DATE_IST} IST [skip ci]"

          # Robust push: rebase onto latest origin/main and retry if another
          # workflow pushed meanwhile; on same-file conflict our patched version
          # wins while remote's other work is still merged in.
          push_ok=0
          for i in 1 2 3 4 5; do
            if git push origin main; then push_ok=1; break; fi
            echo "push rejected (attempt $i/5) — syncing with origin/main…"
            git fetch origin main || true
            if ! git rebase origin/main; then
              git rebase --abort 2>/dev/null || true
              git merge -X ours --no-edit origin/main || true
            fi
            sleep 4
          done
          if [ "$push_ok" = "1" ]; then
            echo "✅ ${PATCHED} pages committed and pushed"
          else
            echo "❌ push failed after 5 attempts"; exit 1
          fi

      - name: 📊 Summary
        run: |
          echo "### 🔧 AI HTML Patcher" >> $GITHUB_STEP_SUMMARY
          echo "- Patched HTML files committed to /jobs/" >> $GITHUB_STEP_SUMMARY
          echo "- Time (IST): $(TZ='Asia/Kolkata' date '+%Y-%m-%d %H:%M')" >> $GITHUB_STEP_SUMMARY
