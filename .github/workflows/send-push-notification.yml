# ══════════════════════════════════════════════════════════════════════
# WORKFLOW 5: send-push-notification.yml — Instant Push on data change
# P4 FIX: Variables passed via process.env — NO shell interpolation
#          Apostrophes in titles cannot break Node.js script
# ══════════════════════════════════════════════════════════════════════

name: 📣 Send Push Notifications

on:
  push:
    branches: [main]
    paths:
      - 'dailyupdates.json'
      - 'Complete_Jobs_Full_Data.json'
      - 'data/Complete_Jobs_Full_Data.json'

  workflow_dispatch:
    inputs:
      category:
        description: 'Notification category'
        required: true
        type: choice
        options: [latest-jobs, result, admit-card, admission, answer-key]
      title:
        description: 'Notification title'
        required: true
        default: '🔔 New Update on Top Sarkari Jobs!'
      body:
        description: 'Notification body'
        required: true
        default: 'Nayi sarkari vacancy aa gayi. Abhi check karo!'
      job_url:
        description: 'Job URL (optional)'
        required: false

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install firebase-admin
        run: npm install firebase-admin

      # ── P4 FIX: Compute notification content in a SEPARATE step ──
      # Variables go into GITHUB_ENV — never interpolated inside Node.js code
      - name: 🧠 Compute notification content
        id: notif
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Manual dispatch — use inputs directly
            echo "COMPUTED_CAT=${{ inputs.category }}"    >> $GITHUB_ENV
            echo "COMPUTED_URL=${{ inputs.job_url || format('https://www.topsarkarijobs.com/section/{0}/', inputs.category) }}" >> $GITHUB_ENV
            # Title and body written to files to avoid shell escaping issues with apostrophes
            printf '%s' "${{ inputs.title }}" > /tmp/notif_title.txt
            printf '%s' "${{ inputs.body }}"  > /tmp/notif_body.txt
          else
            # Auto-trigger — detect which file changed
            CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")

            if echo "$CHANGED" | grep -q "dailyupdates.json"; then
              # dailyupdates.json changed → today updates notification
              echo "COMPUTED_CAT=latest-jobs" >> $GITHUB_ENV
              echo "COMPUTED_URL=https://www.topsarkarijobs.com/section/today-updates/" >> $GITHUB_ENV
              node -e "
                const fs = require('fs');
                try {
                  const d = JSON.parse(fs.readFileSync('dailyupdates.json','utf8'));
                  const sec = (d.sections||[d])[0];
                  const item = (sec.items||[])[0];
                  const name = (item && (item.name || item.title)) || 'Today Updates';
                  fs.writeFileSync('/tmp/notif_title.txt', '🔴 ' + name.slice(0,60));
                  fs.writeFileSync('/tmp/notif_body.txt', 'Aaj ki nayi sarkari updates. Abhi check karo!');
                } catch(e) {
                  fs.writeFileSync('/tmp/notif_title.txt', '🔴 New Sarkari Updates Today');
                  fs.writeFileSync('/tmp/notif_body.txt', 'Aaj ki nayi sarkari updates. Abhi check karo!');
                }
              "
            else
              # Complete_Jobs_Full_Data.json changed → latest job notification
              echo "COMPUTED_CAT=latest-jobs" >> $GITHUB_ENV
              node -e "
                const fs = require('fs');
                try {
                  const paths = ['data/Complete_Jobs_Full_Data.json','Complete_Jobs_Full_Data.json'];
                  let cj = null;
                  for (const p of paths) {
                    if (fs.existsSync(p)) { cj = JSON.parse(fs.readFileSync(p,'utf8')); break; }
                  }
                  const jobs = (cj && cj.sarkari_data && cj.sarkari_data.jobs) || [];
                  const latest = jobs.find(j => j.category === 'SR_Latest_Jobs' && j.title) || jobs[0];
                  const title = (latest && latest.title) || 'New Govt Job 2026';
                  const slug = (latest && latest.slug) || '';
                  const url = slug
                    ? 'https://www.topsarkarijobs.com/jobs/' + slug + '/'
                    : 'https://www.topsarkarijobs.com/section/latest-jobs/';
                  fs.writeFileSync('/tmp/notif_title.txt', ('💼 ' + title).slice(0,65));
                  fs.writeFileSync('/tmp/notif_body.txt', 'Nayi sarkari vacancy! Abhi apply karein. Last date miss mat karo.');
                  fs.writeFileSync('/tmp/notif_url.txt', url);
                } catch(e) {
                  fs.writeFileSync('/tmp/notif_title.txt', '💼 New Govt Jobs 2026');
                  fs.writeFileSync('/tmp/notif_body.txt', 'Nayi sarkari vacancy! Abhi apply karein.');
                  fs.writeFileSync('/tmp/notif_url.txt', 'https://www.topsarkarijobs.com/section/latest-jobs/');
                }
              "
              URL=$(cat /tmp/notif_url.txt 2>/dev/null || echo "https://www.topsarkarijobs.com/section/latest-jobs/")
              echo "COMPUTED_URL=${URL}" >> $GITHUB_ENV
            fi
          fi

      # ── P4 FIX: Pass vars via process.env — safe with apostrophes ─
      - name: 📣 Send Push via send-fcm.js
        env:
          SA_JSON:     ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          NOTIF_CAT:   ${{ env.COMPUTED_CAT }}
          NOTIF_URL:   ${{ env.COMPUTED_URL }}
        run: |
          # Read title/body from files (written by compute step above) — avoids all escaping issues
          export NOTIF_TITLE=$(cat /tmp/notif_title.txt 2>/dev/null || echo "🔔 New Sarkari Update")
          export NOTIF_BODY=$(cat /tmp/notif_body.txt 2>/dev/null || echo "Nayi sarkari update available!")
          node .github/workflows/send-fcm.js

      - name: 📊 Summary
        run: |
          TITLE=$(cat /tmp/notif_title.txt 2>/dev/null || echo "unknown")
          echo "### 📣 Push Notification Sent" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger:** \`${{ github.event_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Category:** \`${{ env.COMPUTED_CAT }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Title:** ${TITLE}" >> $GITHUB_STEP_SUMMARY
          echo "- **URL:** \`${{ env.COMPUTED_URL }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Time (IST):** $(TZ='Asia/Kolkata' date '+%Y-%m-%d %H:%M')" >> $GITHUB_STEP_SUMMARY
