# ══════════════════════════════════════════════════════════════════
# FILE 1: .github/workflows/ai-nightly.yml
# PURPOSE: Raat ko AI enrichment — Groq free limit ke andar
# TRIGGER: Daily cron 1:30 AM IST (8 PM UTC) + manual
# ══════════════════════════════════════════════════════════════════
name: 🌙 AI Content Enrichment (Nightly)

on:
  schedule:
    - cron: '0 20 * * *'   # Daily 1:30 AM IST (UTC+5:30 = 20:00 UTC)

  workflow_dispatch:
    inputs:
      run_limit:
        description: 'Jobs per run (default: 150)'
        default: '150'
        required: false
      daily_limit:
        description: 'Max API calls today (default: 12000)'
        default: '12000'
        required: false
      force_regen:
        description: 'Force re-generate all (ignore cache)'
        type: boolean
        default: false

# Only one AI run at a time — queue nahi, overlap nahi
concurrency:
  group: ai-nightly
  cancel-in-progress: false

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: 🐍 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📋 Ensure JSON at root
        run: |
          if [ ! -f "Complete_Jobs_Full_Data.json" ] && [ -f "data/Complete_Jobs_Full_Data.json" ]; then
            cp data/Complete_Jobs_Full_Data.json Complete_Jobs_Full_Data.json
          fi
          ls -lh Complete_Jobs_Full_Data.json
          echo "Jobs JSON ready"

      - name: 🤖 Run AI Enrichment
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: 'gemma2-9b-it'
          GROQ_SAFE_RPM: '5'
          RUN_LIMIT: ${{ github.event.inputs.run_limit || '150' }}
          DAILY_LIMIT: ${{ github.event.inputs.daily_limit || '12000' }}
          FORCE_REGEN: ${{ github.event.inputs.force_regen || 'false' }}
        run: python3 ai_content_layer.py

      - name: 💾 Commit enriched JSON
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add Complete_Jobs_Full_Data.json .ai_progress.json 2>/dev/null || true

          if git diff --staged --quiet; then
            echo "No changes (all jobs already enriched)"
            exit 0
          fi

          # Count enriched jobs
          ENRICHED=$(python3 -c "
          import json
          m = json.load(open('Complete_Jobs_Full_Data.json', encoding='utf-8'))
          n = 0
          def count(jobs):
              global n
              if isinstance(jobs, list):
                  for j in jobs:
                      if isinstance(j, dict) and j.get('ai_overview'):
                          n += 1
          fja = m.get('freejobalert_categories', {})
          if isinstance(fja, dict):
              for v in fja.values(): count(v)
          count(m.get('sarkari_data', {}).get('jobs', []))
          print(n)
          " 2>/dev/null || echo "?")

          DATE_IST=$(TZ='Asia/Kolkata' date '+%Y-%m-%d %H:%M')
          git commit -m "🤖 AI enriched: ${ENRICHED} jobs total | ${DATE_IST} IST"
          git push origin main
          echo "✅ Enriched JSON pushed"

      - name: 📊 Summary
        run: |
          echo "### 🌙 AI Nightly Enrichment" >> $GITHUB_STEP_SUMMARY
          echo "- **Model:** \`gemma2-9b-it\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Run Limit:** ${{ github.event.inputs.run_limit || '150' }} jobs" >> $GITHUB_STEP_SUMMARY
          echo "- **Time (IST):** $(TZ='Asia/Kolkata' date '+%Y-%m-%d %H:%M')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "💡 HTML rebuild triggers automatically after this commit via auto-update-jobs.yml" >> $GITHUB_STEP_SUMMARY
