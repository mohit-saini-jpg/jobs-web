# ══════════════════════════════════════════════════════════════════
# FILE: .github/workflows/ai-nightly.yml
# PURPOSE: HTML pages seedha read → Groq API → HTML mein AI write
# JSON touch nahi karta
# ══════════════════════════════════════════════════════════════════
name: 🌙 AI Content Enrichment (Nightly)

on:
  # Chained: fires right after "Check & Fix Broken Job Links" finishes, so
  # AI enrichment always runs on the day's freshest data (scraper push →
  # auto-update → broken-links → ai-nightly). Replaces the old fixed
  # 6:00 AM cron, which drifted whenever the earlier steps ran late.
  workflow_run:
    workflows: ["🔍 Check & Fix Broken Job Links"]
    types: [completed]

  workflow_dispatch:
    inputs:
      run_limit:
        description: 'Pages per run (default: 300)'
        default: '300'
        required: false
      force:
        description: 'Force re-enrich already done pages'
        type: boolean
        default: false
      slug:
        description: 'Single slug test (blank = all)'
        required: false
        default: ''

concurrency:
  group: ai-nightly
  cancel-in-progress: false

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 170       # room for 300 pages @ 3 RPM (~100 min) + 429 waits
    permissions:
      contents: write
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: 🐍 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🔑 Verify GROQ_API_KEY
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          if [ -z "$GROQ_API_KEY" ]; then
            echo "❌ GROQ_API_KEY is EMPTY"
            exit 1
          fi
          echo "Key length: ${#GROQ_API_KEY}"
          echo "Key prefix: ${GROQ_API_KEY:0:10}..."
          HTTP_CODE=$(curl -s -o /tmp/groq_resp.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $GROQ_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"model":"llama-3.1-8b-instant","max_tokens":5,"messages":[{"role":"user","content":"hi"}]}' \
            https://api.groq.com/openai/v1/chat/completions)
          echo "HTTP Code: $HTTP_CODE"
          cat /tmp/groq_resp.json
          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Groq API rejected key (HTTP $HTTP_CODE) — update GROQ_API_KEY secret"
            exit 1
          fi
          echo "✅ Groq API key valid"

      - name: 🤖 Run AI HTML Enricher
        env:
          GROQ_API_KEY:  ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL:    'llama-3.1-8b-instant'
          # 3 RPM (20s) keeps us under the free-tier tokens-per-minute limit so we
          # don't burn the budget in a 429 storm. The script also reads Retry-After
          # on any 429 and waits exactly, then continues (never skips/stops early).
          GROQ_SAFE_RPM: '3'
          RUN_LIMIT:     ${{ github.event.inputs.run_limit || '300' }}
          DAILY_LIMIT:   '300'
          FORCE_REGEN:   ${{ github.event.inputs.force || 'false' }}
          JOBS_DIR:      'jobs'
        run: |
          SLUG="${{ github.event.inputs.slug }}"
          if [ -n "$SLUG" ]; then
            python3 ai_html_enricher.py --slug "$SLUG"
          else
            python3 ai_html_enricher.py
          fi

      - name: 💾 Final commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add jobs/ .ai_progress_html.json 2>/dev/null || true

          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          PATCHED=$(git diff --staged --name-only | grep "index.html" | wc -l || echo "0")
          DATE_IST=$(TZ='Asia/Kolkata' date '+%Y-%m-%d %H:%M')
          git commit -m "🤖 AI enriched: ${PATCHED} HTML pages | ${DATE_IST} IST"

          # Robust push: another workflow (regen / sitemap / version bump) may have
          # pushed to main while we ran, causing a non-fast-forward rejection.
          # Rebase our commit onto the latest origin and retry; on a same-file
          # conflict fall back to a merge where our enriched version wins — remote's
          # other work is still merged in, nothing is lost.
          push_ok=0
          for i in 1 2 3 4 5; do
            if git push origin main; then push_ok=1; break; fi
            echo "push rejected (attempt $i/5) — syncing with origin/main…"
            git fetch origin main || true
            if ! git rebase origin/main; then
              echo "rebase conflict — falling back to merge (enriched version wins)"
              git rebase --abort 2>/dev/null || true
              git merge -X ours --no-edit origin/main || true
            fi
            sleep 4
          done
          if [ "$push_ok" = "1" ]; then
            echo "✅ ${PATCHED} pages pushed"
          else
            echo "❌ push failed after 5 attempts"; exit 1
          fi

      - name: 📊 Summary
        run: |
          echo "### 🌙 AI Nightly Enrichment" >> $GITHUB_STEP_SUMMARY
          echo "- **Model:** \`llama-3.1-8b-instant\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Time (IST):** $(TZ='Asia/Kolkata' date '+%Y-%m-%d %H:%M')" >> $GITHUB_STEP_SUMMARY
