name: Auto-Update Jobs (Push JSON → Generate All Files)

# ✅ Sirf Complete_Jobs_Full_Data.json push karo — baaki sab automatic!
on:
  push:
    paths:
      - 'Complete_Jobs_Full_Data.json'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run job file generator
        run: python3 .github/workflows/generate_jobs.py

      - name: Generate sitemap (if script exists)
        run: |
          if [ -f sitemap-generator.js ]; then
            node sitemap-generator.js && echo "Sitemap updated"
          else
            echo "No sitemap-generator.js found, skipping"
          fi

      - name: Commit and push all changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add jobs-index.json jobs/data/ sitemap-jobs.xml sitemap-index.xml sitemap.xml 2>/dev/null || true
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "Auto: jobs updated $(date +'%Y-%m-%d %H:%M')"
          git pull --rebase origin main
          git push
