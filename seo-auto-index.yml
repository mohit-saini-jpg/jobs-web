name: SEO Auto Index & Sitemap Update

on:
  push:
    branches: [main]
    paths:
      - 'Complete_Jobs_Full_Data.json'
      - 'jobs/data/**'
  schedule:
    - cron: '30 0 * * *'
  workflow_dispatch:

jobs:
  seo-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate Sitemaps
        run: node sitemap-auto.js

      - name: Ping Google Sitemap
        run: |
          curl -s "https://www.google.com/ping?sitemap=https://www.topsarkarijobs.com/sitemap-index.xml" || true
          curl -s "https://www.google.com/ping?sitemap=https://www.topsarkarijobs.com/sitemap-jobs.xml" || true
        continue-on-error: true

      - name: Ping Bing IndexNow
        run: |
          curl -s -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d '{"host":"www.topsarkarijobs.com","key":"topsarkarijobs-indexnow-key-2026","keyLocation":"https://www.topsarkarijobs.com/topsarkarijobs-indexnow-key-2026.txt","urlList":["https://www.topsarkarijobs.com/","https://www.topsarkarijobs.com/jobs/"]}' || true
        continue-on-error: true

      - name: Commit sitemaps
        run: |
          git config --local user.email "bot@topsarkarijobs.com"
          git config --local user.name "SEO Bot"
          git add sitemap*.xml sitemap.html
          git diff --staged --quiet || git commit -m "SEO: auto-update sitemaps $(date +'%Y-%m-%d')"
          git push || true
        continue-on-error: true
