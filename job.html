<script>
(function(){
'use strict';

// ── Handle ?ref= external redirect (dailyupdates.json items) ──
(function(){
  var ref = new URLSearchParams(location.search).get('ref') || '';
  if(ref && ref.startsWith('http')){
    document.getElementById('loader').innerHTML='<div style="text-align:center;padding:40px 20px">'
      +'<div style="font-size:2rem;margin-bottom:12px">&#128279;</div>'
      +'<p style="color:#374151;font-size:.9rem">Redirecting to official source...</p>'
      +'<a href="'+ref+'" style="display:inline-block;margin-top:12px;background:#1d4ed8;color:#fff;padding:8px 20px;border-radius:8px;text-decoration:none;font-weight:700" target="_blank" rel="noopener noreferrer">Open Link &#8594;</a>'
      +'</div>';
    setTimeout(function(){window.location.replace(ref);},1200);
    return;
  }
})();


const BASE = 'https://www.topsarkarijobs.com';
const BLOCKED = new Set(['sarkariresult.com','freejobalert.com','sarkariresultshine.com','sarkarinetwork.com']);

// ── Slug extraction ──────────────────────────────────────────────
function getSlug(){
  // 1. Clean path: /jobs/slug/
  var m = location.pathname.match(/\/jobs\/([^\/]+)\/?$/i);
  if(m && !/^(index\.html|job\.html)$/.test(m[1])) return decodeURIComponent(m[1]);
  // 2. ?_path= (GitHub Pages 404 redirect)
  var pp = new URLSearchParams(location.search).get('_path')||'';
  var m2 = pp.match(/\/jobs\/([^\/]+)\/?$/i);
  if(m2) return decodeURIComponent(m2[1]);
  // 3. ?slug= legacy
  var s = new URLSearchParams(location.search).get('slug')||'';
  if(s) return s;
  // 4. sessionStorage fallback
  try{ return sessionStorage.getItem('__tsj_slug')||''; }catch(e){ return ''; }
}

function cleanSlug(s){
  return s.replace(/^sr_[a-z_]+-/,'').replace(/-[0-9a-f]{6,8}$/,'').replace(/-+/g,'-').replace(/^-|-$/g,'');
}

// ── Helpers ──────────────────────────────────────────────────────
function safe(v){
  if(v==null) return '';
  if(typeof v==='string') return v.trim();
  if(typeof v==='number'||typeof v==='boolean') return String(v).trim();
  if(Array.isArray(v)) return v.map(safe).filter(Boolean).join(', ');
  if(typeof v==='object'){
    for(var k of ['text','value','name','description','details','qualification','eligibility','content'])
      if(typeof v[k]==='string'&&v[k].trim()) return v[k].trim();
    return Object.values(v).map(safe).filter(Boolean).join(' | ');
  }
  return String(v).trim();
}
function esc(s){ return safe(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function isBlocked(u){ return [...BLOCKED].some(d=>u.toLowerCase().includes(d)); }
function normDate(raw){
  if(!raw) return null;
  raw=String(raw).trim();
  if(/^\d{4}-\d{2}-\d{2}$/.test(raw)) return raw;
  var months={jan:1,feb:2,mar:3,apr:4,may:5,jun:6,jul:7,aug:8,sep:9,oct:10,nov:11,dec:12};
  var m1=raw.match(/(\d{1,2})[-\/](\d{1,2})[-\/](\d{4})/);
  if(m1) return m1[3]+'-'+String(m1[2]).padStart(2,'0')+'-'+String(m1[1]).padStart(2,'0');
  var m2=raw.match(/(\d{1,2})\s+([a-zA-Z]+)\s+(\d{4})/);
  if(m2){var mo=months[m2[2].slice(0,3).toLowerCase()];if(mo)return m2[3]+'-'+String(mo).padStart(2,'0')+'-'+String(m2[1]).padStart(2,'0');}
  return null;
}

// ── Section Renderers ────────────────────────────────────────────
function card(grad,icon,heading,body){
  if(!body||!body.trim()) return '';
  return `<div class="job-card"><div class="job-card-head" style="background:${grad}"><i class="fa-solid ${icon}"></i><h2>${esc(heading)}</h2></div><div class="job-card-body">${body}</div></div>`;
}

function renderDates(obj){
  if(!obj||typeof obj!=='object') return '';
  var FIELDS=[['application_start_date','Application Start'],['application_begin','Application Begin'],['date_of_notification','Notification Date'],['notification_date','Notification Date'],['last_date_to_apply','Last Date to Apply'],['last_date','Last Date'],['fee_payment_last_date','Fee Payment Last Date'],['exam_date','Exam Date'],['written_exam_date','Written Exam Date'],['online_exam_date','Online Exam Date'],['interview_date','Interview Date'],['admit_card_date','Admit Card Available'],['admit_card','Admit Card'],['result_date','Result Date'],['event','Event']];
  var seen=new Set(),rows='';
  for(var [k,lbl] of FIELDS){var v=safe(obj[k]);if(!v||seen.has(lbl))continue;seen.add(lbl);var red=/last|closing/i.test(k);rows+=`<tr><th>${esc(lbl)}</th><td${red?' style="color:#dc2626;font-weight:700"':''}>${esc(v)}</td></tr>`;}
  for(var [k,v] of Object.entries(obj)){var sv=safe(v);if(!sv)continue;var lbl=k.replace(/_/g,' ').replace(/\b[a-z]/g,c=>c.toUpperCase());if(seen.has(lbl))continue;seen.add(lbl);rows+=`<tr><th>${esc(lbl)}</th><td>${esc(sv)}</td></tr>`;}
  return rows?card('linear-gradient(135deg,#b91c1c,#dc2626)','fa-calendar-check','Important Dates',`<table class="jd-table"><tbody>${rows}</tbody></table>`):'';
}

function renderFee(obj){
  if(!obj||typeof obj!=='object') return '';
  var FIELDS=[['General / UR','general'],['General / UR','general_fee'],['OBC','obc'],['OBC','obc_fee'],['SC','sc'],['SC','sc_fee'],['ST','st'],['EWS','ews'],['Female','female'],['PH / Divyang','ph'],['PH / Divyang','pwd'],['Ex-Serviceman','ex_serviceman_fee'],['All Categories','all'],['All Categories','all_category']];
  var seen=new Set(),items='';
  for(var [lbl,key] of FIELDS){var v=safe(obj[key]);if(!v||seen.has(lbl))continue;seen.add(lbl);var free=/nil|^0$|free|no fee/i.test(v);items+=`<div class="fee-item"><div class="fee-label">${esc(lbl)}</div><div class="fee-val ${free?'free':'paid'}">${esc(v)}</div></div>`;}
  var note=safe(obj.details||obj.fee_mode||obj.payment_mode||'');
  if(!items&&!note) return '';
  return card('linear-gradient(135deg,#c2410c,#ea580c)','fa-indian-rupee-sign','Application Fee',(items?`<div class="fee-grid">${items}</div>`:'')+( note?`<div class="fee-note"><i class="fa-solid fa-circle-info"></i> ${esc(note)}</div>`:''));
}

function renderAge(obj){
  if(!obj||typeof obj!=='object') return '';
  var pairs=[['Minimum Age',obj.minimum_age||obj.min_age],['Maximum Age',obj.maximum_age||obj.max_age||obj.age_limit],['Age Relaxation',obj.age_relaxation||obj.details],['Age Details',obj.age_details]];
  var rows=pairs.filter(([,v])=>safe(v)).map(([l,v])=>`<tr><th>${esc(l)}</th><td>${esc(safe(v))}</td></tr>`).join('');
  return rows?card('linear-gradient(135deg,#0f766e,#0891b2)','fa-user-clock','Age Limit',`<table class="jd-table"><tbody>${rows}</tbody></table>`):'';
}

function renderQual(obj){
  if(!obj) return '';
  if(typeof obj==='string'&&obj.trim()) return card('linear-gradient(135deg,#4338ca,#6366f1)','fa-graduation-cap','Qualification / Eligibility',`<div style="padding:10px 14px;font-size:.83rem">${esc(obj)}</div>`);
  if(typeof obj==='object'){
    var pairs=[['Education Qualification',obj.education_qualification||obj.qualification||obj.eligibility],['Required Degree',obj.required_degree],['Experience',obj.experience_required],['Details',obj.details]];
    var rows=pairs.filter(([,v])=>safe(v)).map(([l,v])=>`<tr><th>${esc(l)}</th><td>${esc(safe(v))}</td></tr>`).join('');
    return rows?card('linear-gradient(135deg,#4338ca,#6366f1)','fa-graduation-cap','Qualification / Eligibility',`<table class="jd-table"><tbody>${rows}</tbody></table>`):'';
  }
  return '';
}

function renderVacancy(arr){
  if(!Array.isArray(arr)||!arr.length) return '';
  var COL_MAP={post_name:['post_name','post','name','Post Name'],total:['total','total_vacancies','total_posts','Total Posts'],ur:['ur','general','UR'],obc:['obc','OBC'],sc:['sc','SC'],st:['st','ST'],ews:['ews','EWS'],women:['women','Women'],salary:['salary','pay_scale','Salary'],qualification:['eligibility','qualification','Educational Qualification']};
  var ORDER=['post_name','total','ur','obc','sc','st','ews','women','salary','qualification'];
  var LABELS={post_name:'Post Name',total:'Total Posts',ur:'UR/General',obc:'OBC',sc:'SC',st:'ST',ews:'EWS',women:'Women',salary:'Salary',qualification:'Qualification'};
  var norm=[],avail=new Set();
  for(var row of arr){
    if(typeof row!=='object') continue;
    var n={};
    for(var [col,aliases] of Object.entries(COL_MAP))
      for(var a of aliases) if(row[a]!=null&&row[a]!==''){n[col]=safe(row[a]);avail.add(col);break;}
    if(Object.keys(n).length) norm.push(n);
  }
  if(!norm.length) return '';
  var cols=ORDER.filter(c=>avail.has(c));
  if(!cols.length) return '';
  var head='<th>Sr.</th>'+cols.map(c=>`<th>${LABELS[c]}</th>`).join('');
  var rows='',tots={};
  norm.forEach((r,i)=>{
    rows+=`<tr><td>${i+1}</td>${cols.map(c=>`<td>${esc(r[c]||'')}</td>`).join('')}</tr>`;
    ['total','ur','obc','sc','st','ews','women'].forEach(c=>{if(cols.includes(c)){try{tots[c]=(tots[c]||0)+parseInt(String(r[c]||'0').replace(/\D/g,'')||'0');}catch(e){}}});
  });
  if(Object.keys(tots).length){
    var tc='<td><strong>Total</strong></td>'+cols.map(c=>`<td>${c in tots?'<strong>'+tots[c]+'</strong>':''}</td>`).join('');
    rows+=`<tr class="vac-tot">${tc}</tr>`;
  }
  return card('linear-gradient(135deg,#15803d,#16a34a)','fa-chart-pie','Vacancy Details',`<div class="tbl-scroll"><table class="vac-table"><thead><tr>${head}</tr></thead><tbody>${rows}</tbody></table></div>`);
}

function renderCatVacancy(cwv){
  if(!cwv) return '';
  if(Array.isArray(cwv)) return renderVacancy(cwv);
  if(typeof cwv==='object'&&Object.keys(cwv).length){
    var rows=Object.entries(cwv).filter(([,v])=>safe(v)).map(([k,v])=>`<tr><td>${esc(k.replace(/_/g,' ').replace(/\b[a-z]/g,c=>c.toUpperCase()))}</td><td>${esc(safe(v))}</td></tr>`).join('');
    return rows?card('linear-gradient(135deg,#15803d,#16a34a)','fa-chart-bar','Category-wise Vacancy',`<div class="tbl-scroll"><table class="vac-table"><thead><tr><th>Category</th><th>Posts</th></tr></thead><tbody>${rows}</tbody></table></div>`):'';
  }
  return '';
}

function renderSalary(obj){
  if(!obj) return '';
  if(typeof obj==='string'&&obj.trim()) return card('linear-gradient(135deg,#15803d,#16a34a)','fa-indian-rupee-sign','Salary & Pay Scale',`<div style="padding:10px 14px;font-size:.83rem">${esc(obj)}</div>`);
  if(typeof obj==='object'){
    var pairs=[['Pay Scale',obj.pay_scale],['Basic Pay',obj.basic_pay],['Grade Pay',obj.grade_pay],['Salary',obj.salary],['Details',obj.details]];
    var rows=pairs.filter(([,v])=>safe(v)).map(([l,v])=>`<tr><th>${esc(l)}</th><td>${esc(safe(v))}</td></tr>`).join('');
    return rows?card('linear-gradient(135deg,#15803d,#16a34a)','fa-indian-rupee-sign','Salary & Pay Scale',`<table class="jd-table"><tbody>${rows}</tbody></table>`):'';
  }
  return '';
}

function renderSelection(sp){
  if(!sp) return '';
  var steps=Array.isArray(sp)?sp.map(safe).filter(Boolean):String(sp).split(/[,\n;\/]/).map(s=>s.trim()).filter(Boolean);
  if(!steps.length) return '';
  var items=steps.map((s,i)=>`<div class="sel-step"><span class="sel-num">${i+1}</span>${esc(s.slice(0,80))}</div>`).join('');
  return card('linear-gradient(135deg,#5b21b6,#7c3aed)','fa-list-check','Selection Process',`<div class="sel-steps">${items}</div>`);
}

function renderExamPattern(ep){
  if(!ep) return '';

    var cols=Object.keys(ep[0]);
    var head='<th>Sr.</th>'+cols.map(c=>`<th>${esc(c.replace(/_/g,' ').replace(/\b[a-z]/g,ch=>ch.toUpperCase()))}</th>`).join('');
    var rows=ep.map((r,i)=>`<tr><td>${i+1}</td>${cols.map(c=>`<td>${esc(safe(r[c]))}</td>`).join('')}</tr>`).join('');
    return card('linear-gradient(135deg,#0369a1,#0284c7)','fa-file-lines','Exam Pattern',`<div class="tbl-scroll"><table class="vac-table"><thead><tr>${head}</tr></thead><tbody>${rows}</tbody></table></div>`);
  }
  if(typeof ep==='object'&&!Array.isArray(ep)){
    var rows=Object.entries(ep).filter(([,v])=>safe(v)).map(([k,v])=>`<tr><th>${esc(k.replace(/_/g,' ').replace(/\b[a-z]/g,c=>c.toUpperCase()))}</th><td>${esc(safe(v))}</td></tr>`).join('');
    return rows?card('linear-gradient(135deg,#0369a1,#0284c7)','fa-file-lines','Exam Pattern',`<table class="jd-table"><tbody>${rows}</tbody></table>`):'';
  }
  if(typeof ep==='string'&&ep.trim()) return card('linear-gradient(135deg,#0369a1,#0284c7)','fa-file-lines','Exam Pattern',`<div style="padding:10px 14px;font-size:.83rem">${esc(ep)}</div>`);
  return '';
}

function renderSyllabus(syl){

    var items=syl.map(s=>`<div class="sel-step"><i class="fa-solid fa-book-open" style="font-size:.7rem"></i>${esc(safe(s).slice(0,100))}</div>`).join('');
    return items?card('linear-gradient(135deg,#4338ca,#6366f1)','fa-book','Syllabus',`<div class="sel-steps">${items}</div>`):'';
  }
  if(typeof syl==='string'&&syl.trim()) return card('linear-gradient(135deg,#4338ca,#6366f1)','fa-book','Syllabus',`<div style="padding:10px 14px;font-size:.83rem">${esc(syl)}</div>`);
  return '';
}

function renderPhysical(pe){

function renderHTA(steps){

function renderInstructions(insts){

var LINK_CFG={apply_online:['Apply Online','btn-blue','fa-paper-plane'],official_website:['Official Website','btn-green','fa-globe'],notification_pdf:['Download Notification','btn-red','fa-file-pdf'],download_notification:['Download Notification','btn-red','fa-file-pdf'],official_notification:['Official Notification','btn-red','fa-file-pdf'],registration_link:['Register Now','btn-orange','fa-user-plus'],login_link:['Login','btn-purple','fa-right-to-bracket'],admit_card:['Admit Card','btn-teal','fa-id-card'],answer_key:['Answer Key','btn-indigo','fa-key'],syllabus_pdf:['Syllabus PDF','btn-gray','fa-book'],result_link:['Result','btn-green','fa-trophy'],click_here:['Click Here','btn-blue','fa-link'],merit_list:['Merit List','btn-teal','fa-list']};

function renderLinks(il){
  if(!il||typeof il!=='object') return '';
  var btns='',seen=new Set();
  for(var [key,val] of Object.entries(il)){
    if(key==='structured_links'||key==='seo_tags') continue;
    var urls=Array.isArray(val)?val:[val];
    var [label,css,icon]=LINK_CFG[key]||['View','btn-gray','fa-link'];
    for(var url of urls){
      var u=safe(url);if(!u.startsWith('http')||isBlocked(u)||seen.has(u))continue;seen.add(u);
      var ic=u.toLowerCase().endsWith('.pdf')?'fa-file-pdf':icon;
      var cl=u.toLowerCase().endsWith('.pdf')?'btn-red':css;
      btns+=`<a href="${esc(u)}" class="link-btn ${cl}" target="_blank" rel="noopener noreferrer"><i class="fa-solid ${ic}"></i> ${esc(label)}</a>\n`;
    }
  }
  for(var item of (il.structured_links||[])){
    if(typeof item!=='object') continue;
    var u=safe(item.url||item.href||'');var lbl=safe(item.label||item.title||'View')||'View';
    if(!u.startsWith('http')||isBlocked(u)||seen.has(u))continue;seen.add(u);
    var ll=lbl.toLowerCase();
    var [ic,cl]=/apply/i.test(ll)?['fa-paper-plane','btn-blue']:/result/i.test(ll)?['fa-trophy','btn-green']:/admit/i.test(ll)?['fa-id-card','btn-teal']:u.endsWith('.pdf')?['fa-file-pdf','btn-red']:['fa-link','btn-blue'];
    btns+=`<a href="${esc(u)}" class="link-btn ${cl}" target="_blank" rel="noopener noreferrer"><i class="fa-solid ${ic}"></i> ${esc(lbl.slice(0,50))}</a>\n`;
  }
  // useful_links fallback
  var useful=il._useful_links||[];
  for(var ul of useful){
    if(typeof ul!=='object') continue;
    var href=safe(ul.links||ul.url||'');if(Array.isArray(ul.links)) href=safe(ul.links[0]||'');
    if(!href.startsWith('http')||isBlocked(href)||seen.has(href))continue;seen.add(href);
    var t=safe(ul.title||ul.name||'Link').toLowerCase();
    var [ic,cl]=/apply/i.test(t)?['fa-paper-plane','btn-blue']:/notif|pdf/i.test(t)?['fa-file-pdf','btn-red']:/result/i.test(t)?['fa-trophy','btn-green']:/admit/i.test(t)?['fa-id-card','btn-teal']:/official|website/i.test(t)?['fa-globe','btn-green']:['fa-link','btn-blue'];
    btns+=`<a href="${esc(href)}" class="link-btn ${cl}" target="_blank" rel="noopener noreferrer"><i class="fa-solid ${ic}"></i> ${esc(safe(ul.title||ul.name||'View').slice(0,50))}</a>\n`;
  }
  return btns?card('linear-gradient(135deg,#1e40af,#1e3a8a)','fa-link','Important Links',`<div class="links-grid">${btns}</div>`):'';
}

function renderFAQ(faq){
  if(!Array.isArray(faq)||!faq.length) return '';
  var items=faq.filter(f=>f.question&&f.answer).map(f=>`<div class="faq-item"><div class="faq-q" onclick="this.classList.toggle('open');this.nextElementSibling.style.display=this.classList.contains('open')?'block':'none'">${esc(f.question)} <i class="fa-solid fa-chevron-down" style="font-size:.7rem;color:#94a3b8"></i></div><div class="faq-a">${esc(f.answer)}</div></div>`).join('');
  return items?card('linear-gradient(135deg,#4338ca,#6366f1)','fa-circle-question','FAQs',items):'';
}

// ── Find job in data ─────────────────────────────────────────────
function findJob(data, slug){
  var clean = cleanSlug(slug);
  var slugify = s => s.toLowerCase().replace(/[^a-z0-9\s-]/g,'').replace(/[\s-]+/g,'-').replace(/^-|-$/g,'').slice(0,80);

  // 1. freejobalert_categories
  var fja = data.freejobalert_categories||{};
  for(var [cat,jobs] of Object.entries(fja)){
    if(!Array.isArray(jobs)) continue;
    for(var job of jobs){
      var bd=job.basic_details||{};
      var title=safe(bd.job_title||'');
      if(!title) continue;
      var jSlug=slugify(title);
      if(jSlug===slug||jSlug===clean){job.category=cat;return job;}
    }
  }

  // 2. sarkari_data
  var sd=(data.sarkari_data||{}).jobs||[];
  for(var job of sd){
    var jSlug=cleanSlug(safe(job.slug||''))||slugify(safe(job.title||''));
    if(jSlug===slug||jSlug===clean) return job;
  }

  // 3. state_jobs
  var sj=(data.state_jobs||{}).sections||[];
  for(var sec of sj){
    for(var item of (sec.items||[])){
      var jSlug=slugify(safe(item.name||''));
      if(jSlug===slug||jSlug===clean){
        var detail=item.detail||{};
        detail.source_url=safe(item.url||'');
        if(!detail.basic_details) detail.basic_details={job_title:safe(item.name||''),job_location:safe(sec.state||'India')};
        if(!detail.important_dates&&item.lastDate) detail.important_dates={last_date_to_apply:item.lastDate};
        return detail;
      }
    }
  }

  return null;
}

// ── Build page ───────────────────────────────────────────────────
function buildPage(slug, job){
  var bd=job.basic_details||{};
  var dates=job.important_dates||{};
  var fee=job.application_fee||{};
  var age=job.age_limit||{};
  var qual=job.qualification||null;
  var vac=job.vacancy_details||[];
  var cwv=job.category_wise_vacancy||{};
  var sal=job.salary_details||{};
  var sel=job.selection_process||[];
  var ep=job.exam_pattern||null;
  var syl=job.syllabus||null;
  var pe=job.physical_eligibility||{};
  var hta=job.how_to_apply||[];
  var insts=job.important_instructions||[];
  var faq=job.faq||[];
  var sourceUrl=safe(job.source_url||job.url||'');

  // Build important_links — merge all sources
  var il=Object.assign({},job.important_links||{});
  if(Array.isArray(job.useful_links)&&job.useful_links.length) il._useful_links=job.useful_links;

  var title=safe(bd.job_title||job.title||'Government Job');
  var org=safe(bd.organization_name||bd.post_name||job.organization||'Government of India');
  var vacancies=safe(bd.total_vacancies||bd.total_vacancy||job.total_post||'');
  var lastDate=safe(dates.last_date_to_apply||dates.last_date||job.last_date||'');
  var applyMode=safe(bd.application_mode||job.apply_mode||'Online');
  var location=safe(bd.job_location||job.state||'India');
  var shortInfo=safe(bd.short_information||job.short_information||job.jobs_info||'');
  var catLabel=safe(job.category||'').replace(/_/g,' ')||'Govt Job';
  var canonUrl=`${BASE}/jobs/${slug}/`;
  var today=new Date().toISOString().split('T')[0];

  // ── SEO ─────────────────────────────────────────────────────────
  var metaDesc=`${title}: ${vacancies?vacancies+' vacancies, ':''}${lastDate?'last date '+lastDate+'. ':''}Apply online – Top Sarkari Jobs.`;
  if(metaDesc.length>155) metaDesc=metaDesc.slice(0,152).replace(/\s\S+$/,'')+' …';

  document.title=title+' | Top Sarkari Jobs';
  document.getElementById('metaDesc').setAttribute('content',metaDesc);
  document.getElementById('canonicalTag').href=canonUrl;
  document.getElementById('ogTitle').setAttribute('content',title+' | Top Sarkari Jobs');
  document.getElementById('ogDesc').setAttribute('content',metaDesc);
  document.getElementById('ogUrl').setAttribute('content',canonUrl);
  // robots: index since this is the canonical
  document.querySelector('meta[name="robots"]').setAttribute('content','index, follow, max-snippet:-1, max-image-preview:large');

  // JobPosting schema
  var jobSchema={
    '@context':'https://schema.org','@type':'JobPosting',
    'title':title,'description':shortInfo||metaDesc,
    'datePosted':normDate(safe(bd.last_updated||dates.date_of_notification||''))||today,
    'url':canonUrl,
    'hiringOrganization':{'@type':'Organization','name':org,'sameAs':'https://www.india.gov.in'},
    'jobLocation':{'@type':'Place','address':{'@type':'PostalAddress','addressCountry':'IN','addressLocality':location}},
    'baseSalary':{'@type':'MonetaryAmount','currency':'INR','value':{'@type':'QuantitativeValue','minValue':15000,'maxValue':80000,'unitText':'MONTH'}},
  };
  var iso=normDate(lastDate);if(iso) jobSchema.validThrough=iso;
  var vn=String(vacancies||'').match(/\d+/);if(vn) jobSchema.totalJobOpenings=parseInt(vn[0]);
  document.getElementById('jobSchema').textContent=JSON.stringify(jobSchema);

  // BreadcrumbList schema
  document.getElementById('bcSchema').textContent=JSON.stringify({
    '@context':'https://schema.org','@type':'BreadcrumbList',
    'itemListElement':[
      {'@type':'ListItem','position':1,'name':'Home','item':BASE+'/'},
      {'@type':'ListItem','position':2,'name':'Latest Jobs','item':BASE+'/section/latest-jobs/'},
      {'@type':'ListItem','position':3,'name':title,'item':canonUrl}
    ]
  });

  // FAQ schema
  var validFAQ=(Array.isArray(faq)?faq:[]).filter(f=>f.question&&f.answer).slice(0,5);
  if(validFAQ.length){
    document.getElementById('faqSchema').textContent=JSON.stringify({
      '@context':'https://schema.org','@type':'FAQPage',
      'mainEntity':validFAQ.map(f=>({'@type':'Question','name':f.question,'acceptedAnswer':{'@type':'Answer','text':f.answer}}))
    });
  }

  // Canonical URL push
  try{history.replaceState(null,'',canonUrl);}catch(e){}

  // Heading structure (H1 in page, H2 in cards)
  var BD_FIELDS=[['Organization',bd.organization_name],['Post Name',bd.post_name],['Total Vacancies',bd.total_vacancies||vacancies],['Application Mode',bd.application_mode||applyMode],['Job Location',bd.job_location||location],['Job Type',bd.job_type],['Notification No.',bd.notification_number],['Advertisement No.',bd.advt_no],['Last Updated',bd.last_updated]];
  var hdrRows=BD_FIELDS.filter(([,v])=>safe(v)).map(([l,v])=>`<tr><th>${esc(l)}</th><td>${esc(safe(v))}</td></tr>`).join('');
  if(sourceUrl&&!isBlocked(sourceUrl)) hdrRows+=`<tr><th>Official Website</th><td><a href="${esc(sourceUrl)}" target="_blank" rel="noopener noreferrer">${esc(sourceUrl.slice(0,80))}</a></td></tr>`;

  var header=`<div class="jd-header">
  <div class="jd-badge-row">
    <span class="jd-badge"><i class="fa-solid fa-briefcase"></i> ${esc(catLabel)}</span>
    <span class="jd-badge" style="background:#dcfce7;color:#166534"><i class="fa-solid fa-map-pin"></i> ${esc(location.slice(0,30))}</span>
  </div>
  <h1 class="jd-title">${esc(title)}</h1>
  ${hdrRows?`<table class="jd-table" style="margin-bottom:0"><tbody>${hdrRows}</tbody></table>`:''}
  <div class="jd-stats">
    <div class="jd-stat"><div class="jd-stat-val">${esc(vacancies||'—')}</div><div class="jd-stat-lbl">Vacancies</div></div>
    <div class="jd-stat"><div class="jd-stat-val" style="color:#dc2626">${esc(lastDate||'—')}</div><div class="jd-stat-lbl">Last Date</div></div>
    <div class="jd-stat"><div class="jd-stat-val">${esc(applyMode||'—')}</div><div class="jd-stat-lbl">Apply Mode</div></div>
    <div class="jd-stat"><div class="jd-stat-val">${esc((location||'India').slice(0,18))}</div><div class="jd-stat-lbl">Location</div></div>
  </div>
</div>`;

  var sections='';
  if(shortInfo) sections+=`<div class="short-info-card"><i class="fa-solid fa-circle-info" style="color:#1d4ed8;margin-right:6px"></i>${esc(shortInfo)}</div>`;
  sections+=renderDates(dates);
  sections+=renderFee(fee);
  sections+=renderAge(age);
  sections+=renderQual(qual);
  sections+=renderVacancy(vac);
  sections+=renderCatVacancy(cwv);
  sections+=renderSalary(sal);
  sections+=renderSelection(sel);
  sections+=renderExamPattern(ep);
  sections+=renderSyllabus(syl);
  sections+=renderPhysical(pe);
  sections+=renderHTA(hta);
  sections+=renderInstructions(insts);
  sections+=renderLinks(il);
  sections+=renderFAQ(faq);

  if(!sections.trim()&&sourceUrl&&!isBlocked(sourceUrl)){
    sections=card('linear-gradient(135deg,#1e40af,#1e3a8a)','fa-link','Important Links',
      `<div class="links-grid"><a href="${esc(sourceUrl)}" class="link-btn btn-green" target="_blank" rel="noopener noreferrer"><i class="fa-solid fa-globe"></i> Official Website</a></div>`);
  }

  var breadcrumb=`<nav class="bc" aria-label="Breadcrumb">
  <a href="/">Home</a><i class="fa-solid fa-chevron-right"></i>
  <a href="/section/latest-jobs/">${esc(catLabel)}</a><i class="fa-solid fa-chevron-right"></i>
  <span>${esc(title.slice(0,60))}${title.length>60?'…':''}</span>
</nav>`;

  var noticeBar=`<div class="notice-bar"><i class="fa-solid fa-triangle-exclamation"></i>
  <span><strong>Important:</strong> Always verify details on the official website. Dates &amp; eligibility may change.</span>
</div>`;

  // Internal links section for SEO
  var internalLinks=`<div class="job-card" style="margin-top:8px">
  <div class="job-card-head" style="background:#475569"><i class="fa-solid fa-arrow-right"></i><h2>Related Categories</h2></div>
  <div class="job-card-body" style="padding:10px 14px;display:flex;flex-wrap:wrap;gap:8px">
    <a href="/section/latest-jobs/" class="link-btn btn-gray"><i class="fa-solid fa-briefcase"></i> Latest Jobs</a>
    <a href="/section/admit-card/" class="link-btn btn-teal"><i class="fa-solid fa-id-card"></i> Admit Cards</a>
    <a href="/section/results/" class="link-btn btn-green"><i class="fa-solid fa-trophy"></i> Results</a>
    <a href="/section/latest-notifications/" class="link-btn btn-blue"><i class="fa-solid fa-bell"></i> Notifications</a>
    <a href="/state/" class="link-btn btn-indigo"><i class="fa-solid fa-map-location-dot"></i> State Jobs</a>
  </div>
</div>`;

  document.getElementById('content').innerHTML=breadcrumb+noticeBar+header+sections+internalLinks;
  document.getElementById('content').style.display='';
  document.getElementById('loader').style.display='none';
}

// ── Main ─────────────────────────────────────────────────────────
var slug=getSlug();
if(!slug){
  document.getElementById('loader').innerHTML='<p>Job not found. <a href="/">Go Home</a></p>';
} else {
  // FIX-003: Try lightweight mini JSON first (42KB vs 53MB)
  var MINI_URL = '/data/sarkari-mini.json';
  var FULL_URL = '/data/Complete_Jobs_Full_Data.json';

  function tryFindJob(data, s) {
    return findJob(data, s) || findJob(data, cleanSlug(s));
  }

  function showNotFound() {
    document.getElementById('loader').innerHTML='';
    document.getElementById('content').innerHTML=`
      <div style="text-align:center;padding:60px 20px;max-width:600px;margin:0 auto">
        <div style="font-size:4rem;margin-bottom:16px">📋</div>
        <h1 style="font-size:1.4rem;color:#0f172a;margin-bottom:8px">Page Not Available</h1>
        <p style="color:#64748b;margin-bottom:20px">This job/notification may have been removed or the URL may have changed.</p>
        <a href="/" style="display:inline-block;background:#1d4ed8;color:#fff;padding:10px 24px;border-radius:8px;text-decoration:none;font-weight:700">← Go to Homepage</a>
        <span style="margin:0 12px;color:#e2e8f0">|</span>
        <a href="/section/latest-jobs/" style="display:inline-block;background:#f1f5f9;color:#374151;padding:10px 24px;border-radius:8px;text-decoration:none;font-weight:700">Latest Jobs</a>
      </div>`;
    document.getElementById('content').style.display='';
    document.getElementById('loader').style.display='none';
    document.title='Page Not Found | Top Sarkari Jobs';
  }

  fetch(MINI_URL)
    .then(function(r){ return r.ok ? r.json() : null; })
    .catch(function(){ return null; })
    .then(function(miniData) {
      if (miniData) {
        var job = tryFindJob(miniData, slug);
        if (job) { buildPage(cleanSlug(slug)||slug, job); return; }
      }
      // Mini not found or unavailable — fallback to full file
      return fetch(FULL_URL)
        .then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
        .then(function(data){
          var job = tryFindJob(data, slug);
          if (!job) { showNotFound(); return; }
          buildPage(cleanSlug(slug)||slug, job);
        });
    })
    .catch(function(err){
      // If full JSON fails to load, show not found (not a raw error)
      if(typeof showNotFound === 'function') {
        showNotFound();
      } else {
        document.getElementById('loader').innerHTML=`<p style="text-align:center;padding:40px">Job not found. <a href="/" style="color:#1d4ed8">← Go Home</a></p>`;
        document.getElementById('loader').style.display='';
      }
    });
}

})();
