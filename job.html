<script>
(function(){
'use strict';

// ── PERMANENT FIX: job.html?slug=X  →  /jobs/X/  (clean SEO URL) ──────────
// Any legacy job.html?slug= link (search results, Google index, bookmarks)
// instantly redirects to the real static /jobs/<slug>/ page. This removes the
// broken job.html?slug= experience entirely — no host-redirect dependency.
// The slug is normalised the SAME way generate_all.py builds page slugs
// (strip sr_ prefix, strip trailing hash, collapse dashes, cap at 80 chars)
// so even old long/legacy slugs resolve to the correct truncated page.
(function(){
  try {
    var onJobHtml = /\/job\.html$/i.test(location.pathname) || /\/job\.html\?/i.test(location.href);
    var qs = new URLSearchParams(location.search);
    var legacySlug = qs.get('slug') || '';
    if (onJobHtml && legacySlug && !qs.get('ref')) {
      var s = String(legacySlug).split('?')[0].split('#')[0].trim();
      s = s.toLowerCase();
      s = s.replace(/^sr_[a-z_]+-/, '');      // strip sr_latest_jobs- style prefix
      s = s.replace(/-[0-9a-f]{6,8}$/, '');    // strip trailing hash suffix
      s = s.replace(/[^a-z0-9\s-]/g, '');
      s = s.replace(/[\s-]+/g, '-');
      s = s.replace(/^-+|-+$/g, '');
      s = s.slice(0, 80).replace(/-+$/,'');    // SAME 80-char cap as generator
      if (s && !/^(index|job)$/i.test(s)) {
        location.replace('/jobs/' + s + '/');
        return; // stop executing the rest of job.html
      }
    }
  } catch(e){}
})();

// ── Handle ?ref= external redirect (dailyupdates.json items) ──
(function(){
  var ref = new URLSearchParams(location.search).get('ref') || '';
  if(ref && ref.startsWith('http')){
    document.getElementById('loader').innerHTML='<div style="text-align:center;padding:40px 20px">'
      +'<div style="font-size:2rem;margin-bottom:12px">&#128279;</div>'
      +'<p style="color:#374151;font-size:.9rem">Redirecting to official source...</p>'
      +'<a href="'+ref+'" style="display:inline-block;margin-top:12px;background:#1d4ed8;color:#fff;padding:8px 20px;border-radius:8px;text-decoration:none;font-weight:700" target="_blank" rel="noopener noreferrer">Open Link &#8594;</a>'
      +'</div>';
    setTimeout(function(){window.location.replace(ref);},1200);
    return;
  }
})();


const BASE = 'https://www.topsarkarijobs.com';
const BLOCKED = new Set(['sarkariresult.com','freejobalert.com','sarkariresultshine.com','sarkarinetwork.com']);

// ── Slug extraction ──────────────────────────────────────────────
function getSlug(){
  // 1. Clean path: /jobs/slug/
  var m = location.pathname.match(/\/jobs\/([^\/]+)\/?$/i);
  if(m && !/^(index\.html|job\.html)$/.test(m[1])) return decodeURIComponent(m[1]);
  // 2. ?_path= (GitHub Pages 404 redirect)
  var pp = new URLSearchParams(location.search).get('_path')||'';
  var m2 = pp.match(/\/jobs\/([^\/]+)\/?$/i);
  if(m2) return decodeURIComponent(m2[1]);
  // 3. ?slug= legacy
  var s = new URLSearchParams(location.search).get('slug')||'';
  if(s) return s;
  // 4. sessionStorage fallback
  try{ return sessionStorage.getItem('__tsj_slug')||''; }catch(e){ return ''; }
}

function cleanSlug(s){
  return s.replace(/^sr_[a-z_]+-/,'').replace(/-[0-9a-f]{6,8}$/,'').replace(/-+/g,'-').replace(/^-|-$/g,'');
}

// ── Helpers ──────────────────────────────────────────────────────
function safe(v){
  if(v==null) return '';
  if(typeof v==='string') return v.trim();
  if(typeof v==='number'||typeof v==='boolean') return String(v).trim();
  if(Array.isArray(v)) return v.map(safe).filter(Boolean).join(', ');
  if(typeof v==='object'){
    for(var k of ['text','value','name','description','details','qualification','eligibility','content'])
      if(typeof v[k]==='string'&&v[k].trim()) return v[k].trim();
    return Object.values(v).map(safe).filter(Boolean).join(' | ');
  }
  return String(v).trim();
}
function esc(s){ return safe(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function isBlocked(u){ return [...BLOCKED].some(d=>u.toLowerCase().includes(d)); }
function normDate(raw){
  if(!raw) return null;
  raw=String(raw).trim();
  if(/^\d{4}-\d{2}-\d{2}$/.test(raw)) return raw;
  var months={jan:1,feb:2,mar:3,apr:4,may:5,jun:6,jul:7,aug:8,sep:9,oct:10,nov:11,dec:12};
  var m1=raw.match(/(\d{1,2})[-\/](\d{1,2})[-\/](\d{4})/);
  if(m1) return m1[3]+'-'+String(m1[2]).padStart(2,'0')+'-'+String(m1[1]).padStart(2,'0');
  var m2=raw.match(/(\d{1,2})\s+([a-zA-Z]+)\s+(\d{4})/);
  if(m2){var mo=months[m2[2].slice(0,3).toLowerCase()];if(mo)return m2[3]+'-'+String(mo).padStart(2,'0')+'-'+String(m2[1]).padStart(2,'0');}
  return null;
}

// ── Section Renderers ────────────────────────────────────────────
function card(grad,icon,heading,body){
  if(!body||!body.trim()) return '';
  return `<div class="job-card"><div class="job-card-head" style="background:${grad}"><i class="fa-solid ${icon}"></i><h2>${esc(heading)}</h2></div><div class="job-card-body">${body}</div></div>`;
}

function renderDates(obj){
  if(!obj||typeof obj!=='object') return '';
  // _raw_list: extracted from job.sections as plain text items
  if(Array.isArray(obj._raw_list)&&obj._raw_list.length){
    var lis=obj._raw_list.map(s=>`<li class="val-item"><i class="fa-solid fa-calendar-day"></i><span>${esc(s)}</span></li>`).join('');
    return card('linear-gradient(135deg,#b91c1c,#dc2626)','fa-calendar-check','Important Dates',`<ul class="val-list">${lis}</ul>`);
  }
  var FIELDS=[['application_start_date','Application Start'],['application_begin','Application Begin'],['date_of_notification','Notification Date'],['notification_date','Notification Date'],['last_date_to_apply','Last Date to Apply'],['last_date_apply_online','Last Date Apply Online'],['last_date','Last Date'],['fee_payment_last_date','Fee Payment Last Date'],['exam_date','Exam Date'],['written_exam_date','Written Exam Date'],['online_exam_date','Online Exam Date'],['interview_date','Interview Date'],['admit_card_date','Admit Card Available'],['admit_card','Admit Card'],['result_date','Result Date'],['event','Event']];
  var seen=new Set(),rows='';
  for(var [k,lbl] of FIELDS){var v=safe(obj[k]);if(!v||seen.has(lbl))continue;seen.add(lbl);var red=/last|closing/i.test(k);rows+=`<tr><th>${esc(lbl)}</th><td${red?' style="color:#dc2626;font-weight:700"':''}>${esc(v)}</td></tr>`;}
  for(var [k,v] of Object.entries(obj)){var sv=safe(v);if(!sv)continue;var lbl=k.replace(/_/g,' ').replace(/\b[a-z]/g,c=>c.toUpperCase());if(seen.has(lbl))continue;seen.add(lbl);rows+=`<tr><th>${esc(lbl)}</th><td>${esc(sv)}</td></tr>`;}
  return rows?card('linear-gradient(135deg,#b91c1c,#dc2626)','fa-calendar-check','Important Dates',`<table class="jd-table"><tbody>${rows}</tbody></table>`):'';
}

function renderFee(obj){
  if(!obj||typeof obj!=='object') return '';
  // _raw_list: extracted from job.sections
  if(Array.isArray(obj._raw_list)&&obj._raw_list.length){
    var lis=obj._raw_list.map(s=>`<li class="val-item"><i class="fa-solid fa-indian-rupee-sign"></i><span>${esc(s)}</span></li>`).join('');
    return card('linear-gradient(135deg,#c2410c,#ea580c)','fa-indian-rupee-sign','Application Fee',`<ul class="val-list">${lis}</ul>`);
  }
  var FIELDS=[['General / UR','general'],['General / UR','general_fee'],['OBC','obc'],['OBC','obc_fee'],['SC','sc'],['SC','sc_fee'],['ST','st'],['EWS','ews'],['Female','female'],['PH / Divyang','ph'],['PH / Divyang','pwd'],['Ex-Serviceman','ex_serviceman_fee'],['All Categories','all'],['All Categories','all_category']];
  var seen=new Set(),items='';
  for(var [lbl,key] of FIELDS){var v=safe(obj[key]);if(!v||seen.has(lbl))continue;seen.add(lbl);var free=/nil|^0$|free|no fee/i.test(v);items+=`<div class="fee-item"><div class="fee-label">${esc(lbl)}</div><div class="fee-val ${free?'free':'paid'}">${esc(v)}</div></div>`;}
  var note=safe(obj.details||obj.fee_mode||obj.payment_mode||'');
  if(!items&&!note) return '';
  return card('linear-gradient(135deg,#c2410c,#ea580c)','fa-indian-rupee-sign','Application Fee',(items?`<div class="fee-grid">${items}</div>`:'')+( note?`<div class="fee-note"><i class="fa-solid fa-circle-info"></i> ${esc(note)}</div>`:''));
}

function renderAge(obj){
  if(!obj||typeof obj!=='object') return '';
  // _raw_list: extracted from job.sections
  if(Array.isArray(obj._raw_list)&&obj._raw_list.length){
    var lis=obj._raw_list.map(s=>`<li class="val-item"><i class="fa-solid fa-user-clock"></i><span>${esc(s)}</span></li>`).join('');
    return card('linear-gradient(135deg,#0f766e,#0891b2)','fa-user-clock','Age Limit',`<ul class="val-list">${lis}</ul>`);
  }
  var asOn=safe(obj.as_on_date||obj.as_on||'');
  var heading='Age Limit'+(asOn?' (as on '+asOn+')':'');
  var pairs=[
    ['Minimum Age',obj.minimum_age||obj.min_age],
    ['Maximum Age',obj.maximum_age||obj.max_age||obj.age_limit],
    ['Age Relaxation',obj.age_relaxation||obj.age_relax||obj.details],
    ['Age Details',obj.age_details]

// Detect if a row is a link row (e.g. ["Apply Online", "http..."] or ["Official Website", "UPSSSC Official Website"])
var LINK_ROW_PAT=/^(apply\s+online|official\s+website|notification|admit\s+card|result|answer\s+key|syllabus|login|register|click\s+here|download)/i;
var KNOWN_URLS={
  'apply online':'apply_online','official website':'official_website',
  'notification':'notification_pdf','admit card':'admit_card',
  'result':'result_link','answer key':'answer_key','syllabus':'syllabus_pdf',
  'login':'login_link','register':'registration_link'
};
function extractTableLinks(rows, ilRef){
  // Pull out link-like rows and inject into ilRef, return remaining rows
  var remaining=[];
  for(var r of rows){
    if(!Array.isArray(r)||r.length<1) continue;
    var c0=safe(r[0]).trim(), c1=safe(r[1]||'').trim();
    if(LINK_ROW_PAT.test(c0)){
      // c1 might be a URL or a text label (like "UPSSSC Official Website")
      var url='';
      if(c1.startsWith('http')) url=c1;
      // If c1 is a label, try to get URL from known map or skip (no URL to render)
      // We still skip this row from the table display
      if(url){
        var mapKey=c0.toLowerCase().replace(/\s+/g,' ');
        var ilKey=KNOWN_URLS[mapKey]||'click_here';
        if(!ilRef[ilKey]) ilRef[ilKey]=url;
      }
      continue; // Don't show link rows in table
    }
    remaining.push(r);
  }
  return remaining;
}

// Render raw tables from Complete_Jobs_Full_Data.json format
// Extracts links from table rows into ilRef, skips header/gb/short-info tables
function renderRawTables(tables, ilRef){
  if(!Array.isArray(tables)||!tables.length) return '';

  // Tables to ALWAYS skip (header, short-info, gb-headline junk)
  var SKIP_TBL=/^(gb\s+headline|gb\s+\w+\s+\w+|name\s+of\s+post|short\s+info)/i;
  // Also skip tables whose NAME contains age limit / recruitment rules (SR pattern)
  var SKIP_NAME_CONTAINS=/age\s+limit|recruitment\s+rules|minimum\s+age|maximum\s+age/i;
  // Table names that are already covered by structured sections
  var SKIP_COVERED=/age.?limit|application.?fee|how.?to.?apply|selection.?process|exam.?pattern|salary|pay.?scale|faq|vacancy|category.?wise|important.?date|post.?wise|overview/i;

  var result='';
  for(var t of tables){
    if(typeof t!=='object') continue;
    var tname=safe(t.table_name||'');

    // Skip gb/headline junk tables entirely
    if(SKIP_TBL.test(tname)) continue;
    if(SKIP_COVERED.test(tname)) continue;
    if(SKIP_NAME_CONTAINS.test(tname)) continue;

    var rows=t.rows||[];
    if(!Array.isArray(rows)||!rows.length) continue;

    // Extract link rows into ilRef, get remaining data rows
    var dataRows=extractTableLinks(rows, ilRef);

    // Filter garbage rows: timestamps, empty, single-cell non-data
    dataRows=dataRows.filter(function(r){
      if(!Array.isArray(r)||!r.length) return false;
      var joined=r.map(safe).join('').trim();
      if(!joined) return false;
      if(r.length===1){
        // Skip timestamp rows
        if(/^\d{1,2}\s+\w+\s+\d{4}/.test(joined)) return false;
        // Skip rows that are just the post title repeated
        if(joined.length>120) return false;
      }
      return true;
    });

    if(!dataRows.length) continue;

    // Decide: KV table (≤2 cols) or multi-col
    var isKV=dataRows.every(function(r){return r.length<=2;});
    var tableHtml;

    if(isKV){
      var trows=dataRows.map(function(r){
        var k=esc(safe(r[0])), v=esc(safe(r[1]||''));
        if(!k&&!v) return '';
        if(!v) return `<tr><td colspan="2" style="font-weight:700;color:#0f172a;padding:10px 12px">${k}</td></tr>`;
        return `<tr><th>${k}</th><td>${v}</td></tr>`;
      }).filter(Boolean).join('');
      if(!trows) continue;
      tableHtml=`<table class="jd-table"><tbody>${trows}</tbody></table>`;
    } else {
      // First row = header
      var thead=dataRows[0].map(function(c){return `<th>${esc(safe(c))}</th>`;}).join('');
      var tbody=dataRows.slice(1).map(function(r){
        return '<tr>'+r.map(function(c){return `<td>${esc(safe(c))}</td>`;}).join('')+'</tr>';
      }).join('');
      if(!tbody) continue;
      tableHtml=`<div class="tbl-scroll"><table class="vac-table"><thead><tr>${thead}</tr></thead><tbody>${tbody}</tbody></table></div>`;
    }

    result+=card('linear-gradient(135deg,#0369a1,#0ea5e9)','fa-table-list','Vacancy Details / Eligibility',tableHtml);
  }
  return result;
}

var LINK_CFG={apply_online:['Apply Online','btn-blue','fa-paper-plane'],official_website:['Official Website','btn-green','fa-globe'],notification_pdf:['Download Notification','btn-red','fa-file-pdf'],download_notification:['Download Notification','btn-red','fa-file-pdf'],official_notification:['Official Notification','btn-red','fa-file-pdf'],application_form:['Download Application Form','btn-red','fa-file-pdf'],registration_link:['Register Now','btn-orange','fa-user-plus'],login_link:['Login','btn-purple','fa-right-to-bracket'],admit_card:['Admit Card','btn-teal','fa-id-card'],answer_key:['Answer Key','btn-indigo','fa-key'],syllabus_pdf:['Syllabus PDF','btn-gray','fa-book'],result_link:['Result','btn-green','fa-trophy'],click_here:['Open Link','btn-blue','fa-link'],merit_list:['Merit List','btn-teal','fa-list']};

// Smart label from URL context
function smartLabel(u, fallbackLabel, fallbackCss, fallbackIcon, ctx){
  var ul=u.toLowerCase();
  var isGenericFb=/^(click here|view|link|here|open link|open|official notification pdf|official pdf document)$/i.test((fallbackLabel||'').trim());
  var c=ctx||'';
  // PDF by extension or encoded filename — always detect
  if(/\.pdf$|%2F[^/]*\.pdf|\.pdf\?|application%20form/i.test(u)){
    var fname=ul.split('/').pop().replace(/%20/g,' ');
    if(/application|form/.test(fname)) return [c?'Download '+c+' Application Form PDF':'Download Application Form PDF','btn-red','fa-file-pdf'];
    if(/syllabus/.test(fname)) return [c?'Download '+c+' Syllabus PDF':'Download Syllabus PDF','btn-gray','fa-book'];
    if(/admit|hallticket/.test(fname)) return [c?'Download '+c+' Admit Card':'Download Admit Card','btn-teal','fa-id-card'];
    if(/result|merit/.test(fname)) return [c?c+' Result PDF':'Result PDF','btn-green','fa-trophy'];
    if(/answer|anskey/.test(fname)) return [c?c+' Answer Key PDF':'Answer Key PDF','btn-indigo','fa-key'];
    if(!isGenericFb) return [fallbackLabel,'btn-red','fa-file-pdf'];
    return [c?'Download '+c+' Notification PDF':'Download Notification PDF','btn-red','fa-file-pdf'];
  }
  if(ul.includes('admit')||ul.includes('hallticket')) return [c?'Download '+c+' Admit Card':'Admit Card','btn-teal','fa-id-card'];
  if(ul.includes('answer')||ul.includes('anskey')) return [c?c+' Answer Key':'Answer Key','btn-indigo','fa-key'];
  if(ul.includes('syllabus')) return [c?'Download '+c+' Syllabus':'Syllabus','btn-gray','fa-book'];
  if(ul.includes('result')||ul.includes('merit')) return [c?'Check '+c+' Result':'Result / Merit List','btn-green','fa-trophy'];
  if(ul.includes('notification')||ul.includes('advertisement')||ul.includes('advt'))
    return [c?c+' Official Notification':'Official Notification','btn-red','fa-file-pdf'];
  if(ul.includes('login')||ul.includes('signin')||ul.includes('candidate')) return [c?c+' Candidate Login':'Candidate Login','btn-purple','fa-right-to-bracket'];
  if(ul.includes('register')||ul.includes('signup')||ul.includes('sign-up')) return [c?'Register for '+c:'Register Now','btn-orange','fa-user-plus'];
  if(ul.includes('apply')||ul.includes('career')||ul.includes('recruit')||ul.includes('applic')||ul.includes('ibpsreg'))
    return [c?'Apply Online for '+c:'Apply Online','btn-blue','fa-paper-plane'];
  if(ul.includes('apprenticeshipindia')||ul.includes('nats.edu')) return ['Apprenticeship Portal','btn-teal','fa-link'];
  // Exam / online-application portals (parity with generator _EXAM_PORTAL_HOSTS)
  if(/digialm\.com|ibpsonline\.ibps\.in|tcsion\.com|onlineapplication|onlinereg|onlineapp/.test(ul)) return ['Online Application Portal','btn-blue','fa-link'];
  // Root domain or short path → Official Website
  try{var _p=new URL(u);if(_p.pathname==='/'||_p.pathname==='') return [c?c+' Official Website':'Official Website','btn-green','fa-globe'];}catch(e){}
  // Short page path
  if(isGenericFb&&c&&(ul.match(/\/page\/\d+/)||ul.split('/').filter(Boolean).length<=2)) return [c+' Official Recruitment Page','btn-blue','fa-link'];
  // NEVER leak a generic label ("Open Link"/"Click Here"): fall back to Official Website
  if(isGenericFb) return [c?c+' Official Website':'Official Website','btn-green','fa-globe'];
  return [fallbackLabel, fallbackCss, fallbackIcon];
}

function renderLinks(il,ctx){
  if(!il||typeof il!=='object') return '';
  // Handle Format A: array of {label, url} — merge into structured_links for rendering
  if(Array.isArray(il)){
    var _tmpIl={structured_links:[]};
    for(var _ai of il){
      if(_ai&&_ai.url) _tmpIl.structured_links.push({url:_ai.url,label:_ai.label||'Open Link'});
    }
    il=_tmpIl;
  }
  var btns='',seen=new Set();
  var _labels=(il._labels&&typeof il._labels==='object')?il._labels:{};
  for(var [key,val] of Object.entries(il)){
    if(key==='structured_links'||key==='seo_tags'||key==='_useful_links'||key==='_labels') continue;
    var urls=Array.isArray(val)?val:[val];
    var urlCount=urls.filter(function(u){return safe(u).startsWith('http');}).length;
    var [defLabel,defCss,defIcon]=LINK_CFG[key]||['Open Link','btn-blue','fa-link'];
    var _labelOverride=(_labels[key]||'').trim();
    // _labels wins only for single-URL keys; multi-URL → per-URL smartLabel detection
    if(urlCount===1&&_labelOverride&&!/^(click here|view|link|here|open)$/i.test(_labelOverride)) defLabel=_labelOverride;
    var urlCount=urls.filter(u=>safe(u).startsWith('http')).length;
    for(var url of urls){
      var u=safe(url);if(!u.startsWith('http')||isBlocked(u)||seen.has(u))continue;seen.add(u);
      // For click_here arrays or single-url keys, use smart labels
      var [label,cl,ic]=smartLabel(u, defLabel, defCss, defIcon, ctx);
      btns+=`<a href="${esc(u)}" class="link-btn ${cl}" target="_blank" rel="noopener noreferrer"><i class="fa-solid ${ic}"></i> ${esc(label)}</a>\n`;
    }
  }
  for(var item of (il.structured_links||[])){
    if(typeof item!=='object') continue;
    var u=safe(item.url||item.href||'');var lbl=safe(item.label||item.title||'View')||'View';
    if(!u.startsWith('http')||isBlocked(u)||seen.has(u))continue;seen.add(u);
    var [slbl,scl,sic]=smartLabel(u, lbl, 'btn-blue', 'fa-link', ctx);
    if(!/^(click here|view|link|here|open link|open)$/i.test(lbl.trim())) slbl=lbl;
    btns+=`<a href="${esc(u)}" class="link-btn ${scl}" target="_blank" rel="noopener noreferrer"><i class="fa-solid ${sic}"></i> ${esc(slbl.slice(0,50))}</a>\n`;
  }
  // useful_links fallback
  var useful=il._useful_links||[];
  for(var ul of useful){
    if(typeof ul!=='object') continue;
    var href=safe(ul.links||ul.url||'');if(Array.isArray(ul.links)) href=safe(ul.links[0]||'');
    if(!href.startsWith('http')||isBlocked(href)||seen.has(href))continue;seen.add(href);
    var ulTitle=safe(ul.title||ul.name||'Link');
    var [ulLbl,ulCl,ulIc]=smartLabel(href, ulTitle, 'btn-blue', 'fa-link', ctx);
    if(ulTitle&&!/^(click here|view|link|here|open link|open)$/i.test(ulTitle.trim())) ulLbl=ulTitle;
    btns+=`<a href="${esc(href)}" class="link-btn ${ulCl}" target="_blank" rel="noopener noreferrer"><i class="fa-solid ${ulIc}"></i> ${esc(ulLbl.slice(0,50))}</a>\n`;
  }
  // all_official_links — scraper's extracted link table
  for(var _aol of (il._all_official_links||[])){
    if(typeof _aol!=='object') continue;
    var _au=safe(_aol.url||_aol.href||'');var _al=safe(_aol.label||_aol.title||'Open Link');
    if(!_au.startsWith('http')||isBlocked(_au)||seen.has(_au)) continue;seen.add(_au);
    var [_ll,_lc,_li]=smartLabel(_au,_al,'btn-blue','fa-link',_linkCtx);
    if(_al&&!/^(click here|view|link|here|open|official pdf document)$/i.test(_al.trim())) _ll=_al;
    btns+=`<a href="${esc(_au)}" class="link-btn ${_lc}" target="_blank" rel="noopener noreferrer"><i class="fa-solid ${_li}"></i> ${esc(_ll.slice(0,70))}</a>\n`;
  }
  return btns?card('linear-gradient(135deg,#1e40af,#1e3a8a)','fa-link','Important Links',`<div class="links-grid">${btns}</div>`):'';
}

function renderFAQ(faq){
  if(!Array.isArray(faq)||!faq.length) return '';
  // Fix swapped Q/A (SarkariResult pattern: date in question, label in answer)
  var arr=faq.filter(f=>f.question&&f.answer).map(f=>{
    var q=safe(f.question),a=safe(f.answer);
    var ansIsLabel=/:\s*$/.test(a.trim())||/^(application|last date|exam date|admit card|fee|age|minimum|maximum|eligibility|vacancy|result|notification|start|end|begin|close)/i.test(a.trim());
    var qIsValue=/^\d{1,2}\/\d{1,2}\/\d{4}|^\d{2,4}$|^\d+\s*(years?|posts?|vacancies|rs\.?|rupees?|\/-)/i.test(q.trim());
    if(ansIsLabel&&qIsValue) return {question:a.replace(/:\s*$/,'').trim(),answer:q};
    return f;
  });
  // Dedup — strip "Q1. " prefix before comparing
  var seen={};
  arr=arr.filter(f=>{
    var k=safe(f.question).toLowerCase().trim().replace(/^q\d+[\.\)]\s*/i,'');
    if(seen[k]) return false; seen[k]=true; return true;
  });
  var items=arr.map(function(f,i){
    var q=esc(safe(f.question)),a=esc(safe(f.answer));
    return '<div class="faq-item">'+
      '<div class="faq-q" onclick="this.classList.toggle(\'open\');this.nextElementSibling.style.display=this.classList.contains(\'open\')?\'block\':\'none\'">'+
        '<span class="faq-num">'+(i+1)+'</span>'+
        '<span class="faq-qtext">'+q+'</span>'+
        '<i class="fa-solid fa-chevron-down faq-chev"></i>'+
      '</div>'+
      '<div class="faq-a">'+a+'</div>'+
    '</div>';
  }).join('');
  return items?card('linear-gradient(135deg,#4338ca,#6366f1)','fa-circle-question','FAQs',items):'';
}

// ── Find job in data ─────────────────────────────────────────────
function findJob(data, slug){
  var clean = cleanSlug(slug);
  var slugify = s => s.toLowerCase().replace(/[^a-z0-9\s-]/g,'').replace(/[\s-]+/g,'-').replace(/^-|-$/g,'').slice(0,80);

  // 1. freejobalert_categories
  var fja = data.freejobalert_categories||{};
  for(var [cat,jobs] of Object.entries(fja)){
    if(!Array.isArray(jobs)) continue;
    for(var job of jobs){
      var bd=job.basic_details||{};
      var title=safe(bd.job_title||'');
      if(!title) continue;
      var jSlug=slugify(title);
      if(jSlug===slug||jSlug===clean){job.category=cat;return job;}
    }
  }

  // 2. sarkari_data
  var sd=(data.sarkari_data||{}).jobs||[];
  for(var job of sd){
    var jSlug=cleanSlug(safe(job.slug||''))||slugify(safe(job.title||''));
    if(jSlug===slug||jSlug===clean) return job;
  }

  // 3. state_jobs
  var sj=(data.state_jobs||{}).sections||[];
  for(var sec of sj){
    for(var item of (sec.items||[])){
      var jSlug=slugify(safe(item.name||''));
      if(jSlug===slug||jSlug===clean){
        var detail=item.detail||{};
        detail.source_url=safe(item.url||'');
        if(!detail.basic_details) detail.basic_details={job_title:safe(item.name||''),job_location:safe(sec.state||'India')};
        if(!detail.important_dates&&item.lastDate) detail.important_dates={last_date_to_apply:item.lastDate};
        return detail;
      }
    }
  }

  return null;
}

// ── Build page ───────────────────────────────────────────────────
function buildPage(slug, job){

  // ── FIX: map sarkari_data camelCase master keys → snake_case ─────────────
  // Complete_Jobs_Full_Data.json SR_*/OFFLINE_FORM/*_JOBS/ADMISSIONS records
  // use camelCase. The renderer below expects snake_case. Alias so no field
  // (dates, fee, links, tables, text) is silently missed.
  (function(){
    function _hc(v){ if(v==null)return false; if(typeof v==='string')return v.trim()!==''; if(Array.isArray(v))return v.length>0; if(typeof v==='object')return Object.keys(v).length>0; return !!v; }
    var MAP={importantDates:'important_dates',applicationFee:'application_fee',applicationFees:'application_fees',
      importantLinks:'important_links',shortInfo:'short_information',shortInformation:'short_information',
      postDate:'post_date',lastDate:'last_date',ageLimit:'age_limit',vacancyDetails:'vacancy_details',
      howToApply:'how_to_apply',usefulLinks:'useful_links',textSections:'text_sections',
      nameOfPost:'name_of_post',postName:'post_name',totalVacancy:'total_vacancy'};
    for(var c in MAP){ if(_hc(job[c])&&!_hc(job[MAP[c]])) job[MAP[c]]=job[c]; }
    if(job.additionalData&&typeof job.additionalData==='object'){
      if(!_hc(job.how_to_apply)&&_hc(job.additionalData.howToApply)) job.how_to_apply=job.additionalData.howToApply;
    }
    // snake-ify inner keys of important_dates / application_fee (replace, no dup)
    ['important_dates','application_fee'].forEach(function(key){
      var o=job[key];
      if(o&&typeof o==='object'&&!Array.isArray(o)){
        var out={};
        for(var k in o){ var sk=k.replace(/([a-z0-9])([A-Z])/g,'$1_$2').toLowerCase(); if(!(sk in out)) out[sk]=o[k]; }
        job[key]=out;
      }
    });
    // Build important_dates from FLAT fields (STATE/UPCOMING/CENTRAL/ADMISSIONS)
    if(!_hc(job.important_dates)){
      var FD=['application_start','application_begin','notification_date','last_date',
        'fee_payment_last_date','exam_date','written_exam_date','admit_card_date',
        'interview_date','result_date','counselling_date','joining_date'];
      var idA={};
      FD.forEach(function(f){ if(_hc(job[f])) idA[f]=job[f]; });
      if(Object.keys(idA).length) job.important_dates=idA;
    }
    // Build application_fee from FLAT fee_* fields
    if(!_hc(job.application_fee)){
      var FF={fee_general:'general',fee_ur:'ur',fee_obc:'obc',fee_ews:'ews',fee_sc:'sc',
        fee_st:'st',fee_sc_st:'sc_st',fee_female:'female',fee_ph:'ph',fee_pwd:'pwd',
        fee_general_obc:'general_obc',fee_all:'all'};
      var feA={};
      for(var ff in FF){ if(_hc(job[ff])) feA[FF[ff]]=job[ff]; }
      if(_hc(job.fee_payment_mode)) feA.payment_mode=job.fee_payment_mode;
      if(Object.keys(feA).length) job.application_fee=feA;
    }
  })();

  // ── DATA NORMALIZATION (handles SR/FJA scraper quirks) ───────────────────

  // 1. Extract Important Dates from reversed FAQ (SR pattern: q=date, a=label ending with ':')
  if(Array.isArray(job.faq)&&job.faq.length&&(!job.important_dates||!Object.keys(job.important_dates).length)){
    var faqDates={};
    var reversedCount=job.faq.filter(f=>/:\s*$/.test(safe(f.answer).trim())).length;
    if(reversedCount>job.faq.length/2){
      // Most FAQs are reversed label:value pairs - extract as dates
      var DATE_LABELS={
        'application begin':'application_begin',
        'application start':'application_start_date',
        'last date for apply online':'last_date_apply_online',
        'last date to apply':'last_date_to_apply',
        'last date pay exam fee':'fee_payment_last_date',
        'correction window':'correction_window',
        'exam date':'exam_date',
        'exam city available':'exam_city_available',
        'admit card available':'admit_card_date',
        'answer key available':'answer_key_date',
        'result':'result_date',
        'result / score card available':'result_date',
        'result score card available':'result_date',
      };
      job.faq.forEach(function(f){
        var lbl=safe(f.answer).replace(/:\s*$/,'').trim().toLowerCase();
        var val=safe(f.question).trim();
        if(!val) return;
        var mapKey=Object.keys(DATE_LABELS).find(k=>lbl.includes(k));
        if(mapKey) faqDates[DATE_LABELS[mapKey]]=val;
        // Also store fee/age info from FAQ into fee/age objects
        var FEE_MAP={'general / obc / ews':'general_obc_ews','sc / st':'sc_st','ph / divyang':'ph_divyang','ur/obc/ews fee refund':'after_appear_the_stage_i_exam_ur_obc_ews'};
        var feeKey=Object.keys(FEE_MAP).find(k=>lbl.includes(k));
        if(feeKey&&!job.application_fee) job.application_fee={};
        if(feeKey&&job.application_fee&&!job.application_fee[FEE_MAP[feeKey]]) job.application_fee[FEE_MAP[feeKey]]=val;
      });
      if(Object.keys(faqDates).length) job.important_dates=faqDates;
      // Clear faq so it doesn't render as actual FAQ accordion
      job.faq=[];
    }
  }

  // 2. Clean vacancy_details.post_wise - remove garbage rows (post date, short info etc.)
  if(job.vacancy_details&&Array.isArray(job.vacancy_details.post_wise)){
    var GARBAGE_PW=/^(post\s+date|short\s+info|post\s+name\s*$|name\s+of\s+post)/i;
    var TEXT_HEAVY=/^.{100,}$/; // rows with very long text (short_information dumped in)
    job.vacancy_details.post_wise=job.vacancy_details.post_wise.filter(function(r){
      var pn=safe(r.post_name||'');
      if(GARBAGE_PW.test(pn.trim())) return false;
      // If all values are long text blobs, skip
      var vals=Object.values(r).map(safe).join(' ');
      if(vals.length>200&&!r.total&&!r.total_post) return false;
      return true;
    });
  }

  // 3. Normalize age_limit - handle both nested {minimum_age,maximum_age} and flat {age_limit,as_on_date}
  if(job.age_limit&&typeof job.age_limit==='object'){
    if(!job.age_limit.minimum_age&&job.age_limit.min_age) job.age_limit.minimum_age=job.age_limit.min_age;
    if(!job.age_limit.maximum_age&&job.age_limit.max_age) job.age_limit.maximum_age=job.age_limit.max_age;
  }

  // 4. Build how_to_apply from text_sections if empty
  if((!job.how_to_apply||!job.how_to_apply.length)&&Array.isArray(job.text_sections)){
    job.text_sections.forEach(function(ts){
      if(!ts||!ts.content) return;
      var steps=ts.content.split('|').map(function(s){return s.trim();}).filter(Boolean);
      if(steps.length) job.how_to_apply=(job.how_to_apply||[]).concat(steps);
    });
  }

  // ── END NORMALIZATION ─────────────────────────────────────────────────────

  // 5. For STATE_JOBS/CENTRAL_JOBS/ADMISSIONS: extract structured data from job.sections
  //    when top-level important_dates/application_fee/age_limit are null/empty
  if(Array.isArray(job.sections)&&job.sections.length){
    var _TMAP={
      'important dates':'dates','application fees':'fee','application fee':'fee',
      'age limit':'age','age limit details':'age',
      'selection process':'sel','pay scale details':'sal','salary details':'sal',
      'how to apply':'hta','qualification details':'qual_items',
    };
    var _extracted={dates:[],fee:[],age:[],sel:[],sal:[],hta:[],qual_items:[]};
    var _structuredFound=false;
    job.sections.forEach(function(sec){
      var t=(sec.title||sec.heading||'').trim().toLowerCase();
      var bucket=_TMAP[t];
      if(!bucket) return;
      _structuredFound=true;
      (sec.content||[]).forEach(function(b){
        if(b.type==='list') _extracted[bucket]=_extracted[bucket].concat(b.items||[]);
        else if(b.type==='paragraph'&&b.text) _extracted[bucket].push(b.text);
      });
    });
    if(_structuredFound){
      // Inject into job object only if top-level fields are empty
      if(!Object.keys(job.important_dates||{}).length&&_extracted.dates.length)
        job.important_dates={'_raw_list':_extracted.dates};
      if(!Object.keys(job.application_fee||{}).length&&_extracted.fee.length)
        job.application_fee={'_raw_list':_extracted.fee};
      if(!Object.keys(job.age_limit||{}).length&&_extracted.age.length)
        job.age_limit={'_raw_list':_extracted.age};
      if(!(job.selection_process||[]).length&&_extracted.sel.length)
        job.selection_process=_extracted.sel;
      if(!Object.keys(job.salary_details||{}).length&&_extracted.sal.length)
        job.salary_details={'_raw_list':_extracted.sal};
      if(!(job.how_to_apply||[]).length&&_extracted.hta.length)
        job.how_to_apply=_extracted.hta;
    }
  }

  var bd=job.basic_details||{};
  var dates=job.important_dates||{};
  var fee=job.application_fee||{};
  var age=job.age_limit||{};
  var qual=job.qualification||null;
  // Extract category-wise vacancy from post_wise rows that have col_1..col_N pattern (SR scraper)
  if(job.vacancy_details&&Array.isArray(job.vacancy_details.post_wise)&&!job.category_wise_vacancy){
    var headerRow=null, dataRows=[];
    job.vacancy_details.post_wise.forEach(function(r){
      if(r.col_1!==undefined||r.col_2!==undefined){
        if(!headerRow){ headerRow=r; } // first col_N row = header
        else dataRows.push(r); // subsequent = data
      }
    });
    if(headerRow&&dataRows.length){
      // Build category_wise_vacancy as array for renderVacancy
      var hkeys=Object.keys(headerRow);
      var cwvArr=dataRows.map(function(r){
        var row={post_name:safe(r.post_name||'')};
        hkeys.forEach(function(hk){
          var label=safe(headerRow[hk]);
          var val=safe(r[hk]||r.total_post||'');
          if(label&&val) row[label.toLowerCase().replace(/\/.*$/,'').trim()]=val;
        });
        // Also map total_post 
        if(r.total_post) row['total']=safe(r.total_post);
        return row;
      });
      if(cwvArr.length) job.category_wise_vacancy=cwvArr;
      // Remove header+data rows from post_wise so they don't duplicate
      job.vacancy_details.post_wise=job.vacancy_details.post_wise.filter(function(r){
        return r!==headerRow&&dataRows.indexOf(r)===-1;
      });
    }
  }

  // Normalize vacancy_details: handle both array format and {total_post, post_wise:[]} format
  var _vacRaw=job.vacancy_details||[];
  var vac=Array.isArray(_vacRaw)?_vacRaw:
    (Array.isArray(_vacRaw.post_wise)?_vacRaw.post_wise:
    (typeof _vacRaw==='object'&&Object.keys(_vacRaw).length?[_vacRaw]:[]));
  // If vacancy_details is object with total_post only (no array), wrap it
  if(!Array.isArray(job.vacancy_details)&&job.vacancy_details&&job.vacancy_details.total_post&&!Array.isArray(job.vacancy_details.post_wise)){
    vac=[{post_name:safe(job.vacancy_details.post_name||'Total'),total:safe(job.vacancy_details.total_post)}];
  }
  var cwv=job.category_wise_vacancy||{};
  var sal=job.salary_details||{};
  var sel=job.selection_process||[];
  var ep=job.exam_pattern||null;
  var syl=job.syllabus||null;
  var pe=job.physical_eligibility||{};
  var hta=job.how_to_apply||[];
  var insts=job.important_instructions||[];
  var faq=job.faq||[];
  var rawTables=job.tables||[];
  var sourceUrl=safe(job.source_url||job.url||'');

  // Build important_links — merge all sources
  // Build il from important_links (dict) or importantLinks (SR array)
  var _rawIl=job.important_links;
  var il;
  if(Array.isArray(_rawIl)&&_rawIl.length){
    // Format A: array of {label, url} — pass directly; renderLinks handles it
    il=_rawIl;
  } else {
    il=Object.assign({},_rawIl||{});
    // Merge SR-format importantLinks array into structured_links
    if(Array.isArray(job.importantLinks)&&job.importantLinks.length){
      if(!il.structured_links) il.structured_links=[];
      for(var _sItem of job.importantLinks){
        if(_sItem&&_sItem.url&&_sItem.label){
          il.structured_links.push({url:_sItem.url,label:_sItem.label});
        }
      }
    }
  }
  // Array format: [{title, links}]
  if(Array.isArray(job.useful_links)&&job.useful_links.length) il._useful_links=job.useful_links;
  // Object format with _all array: {apply_online:..., _all:[{title,links}]}
  var ulObj=job.useful_links;
  if(ulObj&&typeof ulObj==='object'&&!Array.isArray(ulObj)){
    // Merge known keys
    for(var k of ['apply_online','notification','notification_pdf','official_website','admit_card','result_link','answer_key','login_link']){
      if(ulObj[k]&&!il[k]) il[k]=ulObj[k];
    }
    if(Array.isArray(ulObj._all)&&ulObj._all.length) il._useful_links=ulObj._all;
  }
  // OFFLINE_FORM: pick up dedicated link fields from raw job object
  var _offlineMap=[
    ['form_pdf_free_link','application_form'],
    ['application_form_pdf_link','application_form'],
    ['form_pdf_link','notification_pdf'],
    ['official_notification_pdf_link','notification_pdf'],
    ['apply_online_link','apply_online'],
    ['official_website_link','official_website'],
  ];
  for(var _om of _offlineMap){
    var _v=safe(job[_om[0]]||'');
    if(_v&&_v.startsWith('http')&&!il[_om[1]]) il[_om[1]]=_v;
  }

  var title=safe(bd.job_title||job.title||'Government Job');
  var org=safe(bd.organization_name||bd.post_name||job.organization||'Government of India');
  var vacancies=safe(bd.total_vacancies||bd.total_vacancy||job.total_post||'');
  var lastDate=safe(dates.last_date_to_apply||dates.last_date_apply_online||dates.last_date||job.last_date||'');
  var applyMode=safe(bd.application_mode||job.apply_mode||'Online');
  var location=safe(bd.job_location||job.state||'India');
  var shortInfo=safe(bd.short_information||job.short_information||job.jobs_info||'');
  var catLabel=safe(job.category||'').replace(/_/g,' ')||'Govt Job';
  var canonUrl=`${BASE}/jobs/${slug}/`;
  var today=new Date().toISOString().split('T')[0];

  // ── SEO ─────────────────────────────────────────────────────────
  var metaDesc=`${title}: ${vacancies?vacancies+' vacancies, ':''}${lastDate?'last date '+lastDate+'. ':''}Apply online – Top Sarkari Jobs.`;
  if(metaDesc.length>155) metaDesc=metaDesc.slice(0,152).replace(/\s\S+$/,'')+' …';

  document.title=title+' | Top Sarkari Jobs';
  document.getElementById('metaDesc').setAttribute('content',metaDesc);
  document.getElementById('canonicalTag').href=canonUrl;
  document.getElementById('ogTitle').setAttribute('content',title+' | Top Sarkari Jobs');
  document.getElementById('ogDesc').setAttribute('content',metaDesc);
  document.getElementById('ogUrl').setAttribute('content',canonUrl);
  // robots: index since this is the canonical
  document.querySelector('meta[name="robots"]').setAttribute('content','index, follow, max-snippet:-1, max-image-preview:large');

  // JobPosting schema
  var jobSchema={
    '@context':'https://schema.org','@type':'JobPosting',
    'title':title,'description':shortInfo||metaDesc,
    'datePosted':normDate(safe(bd.last_updated||dates.date_of_notification||''))||today,
    'url':canonUrl,
    'hiringOrganization':{'@type':'Organization','name':org,'sameAs':'https://www.india.gov.in'},
    'jobLocation':{'@type':'Place','address':{'@type':'PostalAddress','addressCountry':'IN','addressLocality':location}},
    'baseSalary':{'@type':'MonetaryAmount','currency':'INR','value':{'@type':'QuantitativeValue','minValue':15000,'maxValue':80000,'unitText':'MONTH'}},
  };
  var iso=normDate(lastDate);if(iso) jobSchema.validThrough=iso;
  var vn=String(vacancies||'').match(/\d+/);if(vn) jobSchema.totalJobOpenings=parseInt(vn[0]);
  document.getElementById('jobSchema').textContent=JSON.stringify(jobSchema);

  // BreadcrumbList schema
  document.getElementById('bcSchema').textContent=JSON.stringify({
    '@context':'https://schema.org','@type':'BreadcrumbList',
    'itemListElement':[
      {'@type':'ListItem','position':1,'name':'Home','item':BASE+'/'},
      {'@type':'ListItem','position':2,'name':'Latest Jobs','item':BASE+'/section/latest-jobs/'},
      {'@type':'ListItem','position':3,'name':title,'item':canonUrl}
    ]
  });

  // FAQ schema
  var validFAQ=(Array.isArray(faq)?faq:[]).filter(f=>f.question&&f.answer).slice(0,5);
  if(validFAQ.length){
    document.getElementById('faqSchema').textContent=JSON.stringify({
      '@context':'https://schema.org','@type':'FAQPage',
      'mainEntity':validFAQ.map(f=>({'@type':'Question','name':f.question,'acceptedAnswer':{'@type':'Answer','text':f.answer}}))
    });
  }

  // Canonical URL push
  try{history.replaceState(null,'',canonUrl);}catch(e){}

  // Heading structure (H1 in page, H2 in cards)
  var BD_FIELDS=[['Organization',bd.organization_name],['Post Name',bd.post_name],['Total Vacancies',bd.total_vacancies||vacancies],['Application Mode',bd.application_mode||applyMode],['Job Location',bd.job_location||location],['Job Type',bd.job_type],['Notification No.',bd.notification_number],['Advertisement No.',bd.advt_no],['Last Updated',bd.last_updated]];
  var hdrRows=BD_FIELDS.filter(([,v])=>safe(v)).map(([l,v])=>`<tr><th>${esc(l)}</th><td>${esc(safe(v))}</td></tr>`).join('');
  if(sourceUrl&&!isBlocked(sourceUrl)) hdrRows+=`<tr><th>Official Website</th><td><a href="${esc(sourceUrl)}" target="_blank" rel="noopener noreferrer">${esc(sourceUrl.slice(0,80))}</a></td></tr>`;

  var header=`<div class="jd-header">
  <div class="jd-badge-row">
    <span class="jd-badge"><i class="fa-solid fa-briefcase"></i> ${esc(catLabel)}</span>
    <span class="jd-badge" style="background:#dcfce7;color:#166534"><i class="fa-solid fa-map-pin"></i> ${esc(location.slice(0,30))}</span>
  </div>
  <h1 class="jd-title">${esc(title)}</h1>
  ${hdrRows?`<table class="jd-table" style="margin-bottom:0"><tbody>${hdrRows}</tbody></table>`:''}
  <div class="jd-stats">
    <div class="jd-stat"><div class="jd-stat-val">${esc(vacancies||'—')}</div><div class="jd-stat-lbl">Vacancies</div></div>
    <div class="jd-stat"><div class="jd-stat-val" style="color:#dc2626">${esc(lastDate||'—')}</div><div class="jd-stat-lbl">Last Date</div></div>
    <div class="jd-stat"><div class="jd-stat-val">${esc(applyMode||'—')}</div><div class="jd-stat-lbl">Apply Mode</div></div>
    <div class="jd-stat"><div class="jd-stat-val">${esc((location||'India').slice(0,18))}</div><div class="jd-stat-lbl">Location</div></div>
  </div>
</div>`;

  var sections='';
  // 1. Job Overview (short info)
  if(shortInfo) sections+=`<div class="short-info-card"><i class="fa-solid fa-circle-info" style="color:#1d4ed8;margin-right:6px"></i>${esc(shortInfo)}</div>`;
  // 2. Vacancy Details
  sections+=renderVacancy(vac);
  // 3. Important Dates + Application Fee side-by-side (like image layout)
  var datesHtml=renderDates(dates);
  var feeHtml=renderFee(fee);
  if(datesHtml && feeHtml){
    sections+=`<div class="two-col-sections">${datesHtml}${feeHtml}</div>`;
  } else {
    sections+=datesHtml;
    sections+=feeHtml;
  }
  // 4. Age Limit
  sections+=renderAge(age);
  // 6. Category-wise Vacancy
  sections+=renderCatVacancy(cwv);
  // 7. Qualification / Eligibility
  sections+=renderQual(qual);
  // 8. Salary
  sections+=renderSalary(sal);
  // 9. Selection Process
  sections+=renderSelection(sel);
  sections+=renderExamPattern(ep);
  sections+=renderSyllabus(syl);
  sections+=renderPhysical(pe);
  // Extract table links into il FIRST, then render remaining table data (no duplicates)
  sections+=renderRawTables(rawTables, il);
  // 10. How to Apply
  sections+=renderHTA(hta);
  sections+=renderInstructions(insts);
  // 11. Useful Links
  var _linkCtx=(title+' '+org).trim();
  // Attach all_official_links into il for renderLinks to process
  if(Array.isArray(job.all_official_links)&&job.all_official_links.length)
    il._all_official_links=job.all_official_links;
  sections+=renderLinks(il,_linkCtx);
  // 12. FAQs
  sections+=renderFAQ(faq);

  if(!sections.trim()&&sourceUrl&&!isBlocked(sourceUrl)){
    sections=card('linear-gradient(135deg,#1e40af,#1e3a8a)','fa-link','Important Links',
      `<div class="links-grid"><a href="${esc(sourceUrl)}" class="link-btn btn-green" target="_blank" rel="noopener noreferrer"><i class="fa-solid fa-globe"></i> Official Website</a></div>`);
  }

  var breadcrumb=`<nav class="bc" aria-label="Breadcrumb">
  <a href="/">Home</a><i class="fa-solid fa-chevron-right"></i>
  <a href="/section/latest-jobs/">${esc(catLabel)}</a><i class="fa-solid fa-chevron-right"></i>
  <span>${esc(title.slice(0,60))}${title.length>60?'…':''}</span>
</nav>`;

  var noticeBar=`<div class="notice-bar"><i class="fa-solid fa-triangle-exclamation"></i>
  <span><strong>Important:</strong> Always verify details on the official website. Dates &amp; eligibility may change.</span>
</div>`;

  // Internal links section for SEO
  var internalLinks=`<div class="job-card" style="margin-top:8px">
  <div class="job-card-head" style="background:#475569"><i class="fa-solid fa-arrow-right"></i><h2>Related Categories</h2></div>
  <div class="job-card-body" style="padding:10px 14px;display:flex;flex-wrap:wrap;gap:8px">
    <a href="/section/latest-jobs/" class="link-btn btn-gray"><i class="fa-solid fa-briefcase"></i> Latest Jobs</a>
    <a href="/section/admit-card/" class="link-btn btn-teal"><i class="fa-solid fa-id-card"></i> Admit Cards</a>
    <a href="/section/results/" class="link-btn btn-green"><i class="fa-solid fa-trophy"></i> Results</a>
    <a href="/section/latest-notifications/" class="link-btn btn-blue"><i class="fa-solid fa-bell"></i> Notifications</a>
    <a href="/state/" class="link-btn btn-indigo"><i class="fa-solid fa-map-location-dot"></i> State Jobs</a>
  </div>
</div>`;

  document.getElementById('content').innerHTML=breadcrumb+noticeBar+header+sections+internalLinks;
  document.getElementById('content').style.display='';
  document.getElementById('loader').style.display='none';
  
  // SCHEMA FIX: Generate and inject JobPosting schema with fallback handling
  if (typeof JobPostingSchemaGenerator !== 'undefined') {
    try {
      var schemaGenerator = new JobPostingSchemaGenerator({
        siteUrl: 'https://www.topsarkarijobs.com',
        defaultPostalCode: '110001',
        defaultLocation: 'Delhi'
      });
      var schema = schemaGenerator.generateSchema(jobData);
      if (schema && schemaGenerator.validateSchema(schema)) {
        schemaGenerator.injectSchema(schema);
      }
    } catch (err) {
      console.error('Schema generation error:', err);
    }
  }
}

// ── Main ─────────────────────────────────────────────────────────
var slug=getSlug();
if(!slug){
  document.getElementById('loader').innerHTML='<p>Job not found. <a href="/">Go Home</a></p>';
} else {
  // FIX-003: Try lightweight mini JSON first (42KB vs 53MB)
  var MINI_URL = '/data/sarkari-mini.json';
  var FULL_URL = '/data/Complete_Jobs_Full_Data.json';

  function tryFindJob(data, s) {
    return findJob(data, s) || findJob(data, cleanSlug(s));
  }

  function showNotFound() {
    document.getElementById('loader').innerHTML='';
    document.getElementById('content').innerHTML=`
      <div style="text-align:center;padding:60px 20px;max-width:600px;margin:0 auto">
        <div style="font-size:4rem;margin-bottom:16px">📋</div>
        <h1 style="font-size:1.4rem;color:#0f172a;margin-bottom:8px">Page Not Available</h1>
        <p style="color:#64748b;margin-bottom:20px">This job/notification may have been removed or the URL may have changed.</p>
        <a href="/" style="display:inline-block;background:#1d4ed8;color:#fff;padding:10px 24px;border-radius:8px;text-decoration:none;font-weight:700">← Go to Homepage</a>
        <span style="margin:0 12px;color:#e2e8f0">|</span>
        <a href="/section/latest-jobs/" style="display:inline-block;background:#f1f5f9;color:#374151;padding:10px 24px;border-radius:8px;text-decoration:none;font-weight:700">Latest Jobs</a>
      </div>`;
    document.getElementById('content').style.display='';
    document.getElementById('loader').style.display='none';
    document.title='Page Not Found | Top Sarkari Jobs';
  }

  fetch(MINI_URL)
    .then(function(r){ return r.ok ? r.json() : null; })
    .catch(function(){ return null; })
    .then(function(miniData) {
      if (miniData) {
        var job = tryFindJob(miniData, slug);
        if (job) { buildPage(cleanSlug(slug)||slug, job); return; }
      }
      // Mini not found or unavailable — fallback to full file
      // FIX: Add timeout so page doesn't spin forever for state-wise items with no internal data
      var fetchTimeout = setTimeout(function() {
        // Check sessionStorage for external fallback URL (set by script.js for state-wise items)
        var extUrl = '';
        try { extUrl = sessionStorage.getItem('__tsj_ext_' + slug) || ''; } catch(e) {}
        if (extUrl && extUrl.startsWith('http')) {
          document.getElementById('loader').innerHTML='<div style="text-align:center;padding:40px 20px">'
            +'<div style="font-size:2rem;margin-bottom:12px">&#128279;</div>'
            +'<p style="color:#374151;font-size:.9rem">Redirecting to official source...</p>'
            +'<a href="'+extUrl+'" style="display:inline-block;margin-top:12px;background:#1d4ed8;color:#fff;padding:8px 20px;border-radius:8px;text-decoration:none;font-weight:700" target="_blank" rel="noopener noreferrer">Open Official Link &#8594;</a>'
            +'</div>';
          setTimeout(function(){window.location.replace(extUrl);},1500);
        } else {
          showNotFound();
        }
      }, 8000);
      return fetch(FULL_URL)
        .then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
        .then(function(data){
          clearTimeout(fetchTimeout);
          var job = tryFindJob(data, slug);
          if (!job) { showNotFound(); return; }
          buildPage(cleanSlug(slug)||slug, job);
        });
    })
    .catch(function(err){
      // If full JSON fails to load, show not found (not a raw error)
      if(typeof showNotFound === 'function') {
        showNotFound();
      } else {
        document.getElementById('loader').innerHTML=`<p style="text-align:center;padding:40px">Job not found. <a href="/" style="color:#1d4ed8">← Go Home</a></p>`;
        document.getElementById('loader').style.display='';
      }
    });
}

})();
</script>
</body>
</html>
