              if (oldScript.defer) s.defer = true;
              if (oldScript.async) s.async = true;
            } else {
              s.textContent = oldScript.textContent;
            }
            oldScript.setAttribute('data-executed', '1');
            oldScript.parentNode.replaceChild(s, oldScript);
          });
        }
