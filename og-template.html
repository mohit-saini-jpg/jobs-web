<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{width:1200px;height:630px;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(135deg,#0d2257 0%,#1e3a8a 50%,#1e40af 100%)}
  .container{width:1200px;height:630px;display:flex;flex-direction:column;justify-content:center;align-items:flex-start;padding:60px 80px;position:relative;overflow:hidden}
  .logo-area{display:flex;align-items:center;gap:16px;margin-bottom:40px}
  .logo-text{font-size:26px;font-weight:900;color:#fff;letter-spacing:.5px}
  .logo-dot{width:10px;height:10px;background:#f59e0b;border-radius:50%;display:inline-block;margin-left:4px}
  .domain{font-size:18px;color:rgba(255,255,255,.7);font-weight:400}
  .main-title{font-size:68px;font-weight:900;color:#fff;line-height:1.1;margin-bottom:20px;max-width:800px}
  .sub-title{font-size:28px;color:rgba(255,255,255,.85);font-weight:500;letter-spacing:.5px;margin-bottom:48px}
  .tags{display:flex;gap:12px;flex-wrap:wrap}
  .tag{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;padding:8px 20px;border-radius:100px;font-size:16px;font-weight:600}
  .bottom-strip{position:absolute;bottom:0;left:0;right:0;height:70px;background:#f59e0b;display:flex;align-items:center;padding:0 80px;gap:16px}
  .bottom-text{font-size:22px;font-weight:800;color:#0d2257}
  .bottom-badge{background:#0d2257;color:#f59e0b;padding:6px 18px;border-radius:100px;font-size:15px;font-weight:700}
  .decor{position:absolute;right:-60px;top:50%;transform:translateY(-50%);width:380px;height:380px;opacity:.08}
  .decor svg{width:100%;height:100%}
  .year-badge{display:inline-block;background:linear-gradient(135deg,#f59e0b,#d97706);color:#0d2257;font-size:22px;font-weight:900;padding:6px 20px;border-radius:8px;margin-bottom:16px}
</style>
</head>
<body>
<div class="container">
  <div class="year-badge" id="yearBadge">2026</div>
  <div class="logo-area">
    <div class="logo-text">TOP SARKARI JOBS<span class="logo-dot"></span></div>
    <div class="domain">topsarkarijobs.com</div>
  </div>
  <div class="main-title" id="mainTitle">Latest Sarkari Jobs 2026</div>
  <div class="sub-title" id="subTitle">SSC · Railway · Bank · Police · UPSC · State Jobs</div>
  <div class="tags">
    <span class="tag">10,000+ Jobs</span>
    <span class="tag">All India</span>
    <span class="tag">Daily Updates</span>
    <span class="tag">Free Alerts</span>
  </div>
  <div class="bottom-strip">
    <div class="bottom-text">🇮🇳 India's No.1 Sarkari Jobs Portal</div>
    <div class="bottom-badge">Updated Daily</div>
  </div>
  <div class="decor">
    <svg viewBox="0 0 100 100" fill="white" xmlns="http://www.w3.org/2000/svg">
      <path d="M20 30h60v10H20zM20 45h60v10H20zM20 60h40v10H20z" opacity=".6"/>
      <rect x="10" y="20" width="80" height="70" rx="8" fill="none" stroke="white" stroke-width="4"/>
      <path d="M35 15v10M65 15v10" stroke="white" stroke-width="4" stroke-linecap="round"/>
    </svg>
  </div>
</div>
</body>
</html>
