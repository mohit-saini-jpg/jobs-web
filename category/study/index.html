<html lang="en">

  <script type="application/ld+json">
  {"@context":"https://schema.org","@type":"BreadcrumbList","itemListElement":[
    {"@type":"ListItem","position":1,"name":"Home","item":"https://www.topsarkarijobs.com/"},
    {"@type":"ListItem","position":2,"name":"Qualification Wise Jobs","item":"https://www.topsarkarijobs.com/category/study/"}
  ]}
  </script>

  <style>
    .study-wrap { max-width: 960px; margin: 0 auto; padding: 12px 10px 40px; }

    /* Breadcrumb */
    .study-bc { font-size:.75rem; color:var(--muted); margin-bottom:14px; display:flex; flex-wrap:wrap; gap:4px; align-items:center; }
    .study-bc a { color:var(--blue); text-decoration:none; }
    .study-bc a:hover { text-decoration:underline; }
    .study-bc i { font-size:.6rem; color:#9ca3af; }

    /* Page hero */
    .study-hdr { background:linear-gradient(135deg,#1a56db,#1e40af); border-radius:12px; padding:18px 20px; color:#fff; margin-bottom:18px; }
    .study-hdr h1 { font-size:1.1rem; font-weight:800; margin-bottom:6px; }
    .study-hdr p  { font-size:.8rem; opacity:.88; line-height:1.55; }

    /* Section card */
    .study-sec-card { background:#fff; border-radius:12px; box-shadow:var(--shadow); margin-bottom:16px; overflow:hidden; }
    .study-sec-hdr  { background:linear-gradient(135deg,#1a56db,#1e40af); color:#fff; padding:10px 16px; font-size:.85rem; font-weight:700; display:flex; align-items:center; gap:8px; }

    /* Qualification grid */
    .study-qual-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap:1px; background:#f1f5f9; }
    .study-qual-item { background:#fff; padding:14px 10px; display:flex; flex-direction:column; align-items:center; gap:6px; text-decoration:none; color:inherit; transition:background .15s; }
    .study-qual-item:hover { background:#f0f9ff; }
    .study-qual-icon { width:48px; height:48px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:.82rem; font-weight:800; color:#fff; }
    .study-qual-name { font-size:.75rem; font-weight:700; color:#1e293b; text-align:center; line-height:1.3; }
    .study-qual-count { font-size:.67rem; color:var(--muted); text-align:center; }

    /* Loading / Error */
    .study-loading { text-align:center; padding:40px 16px; color:var(--muted); font-size:.85rem; }
    .study-error   { background:#fef2f2; border:1px solid #fca5a5; border-radius:10px; padding:14px 16px; color:#991b1b; font-size:.82rem; margin:14px 0; }

    @media(max-width:480px){
      .study-qual-grid { grid-template-columns: repeat(3, 1fr); }
      .study-hdr h1 { font-size:.95rem; }
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div id="siteHeader"></div>

  <div class="study-wrap">

    <!-- Breadcrumb -->
    <nav class="study-bc" aria-label="Breadcrumb">
      <a href="/"><i class="fa-solid fa-house"></i> Home</a>
      <i class="fa-solid fa-angle-right"></i>
      <span>Qualification Wise Jobs</span>
    </nav>

    <!-- Hero -->
    <div class="study-hdr">
      <h1><i class="fa-solid fa-graduation-cap"></i> Qualification Wise Government Jobs 2026</h1>
      <p>Find latest Sarkari Naukri by your educational qualification — from 5th Pass to Ph.D. Updated daily with new vacancies.</p>
    </div>

    <!-- Loading -->
    <div id="studyLoading" class="study-loading">
      <i class="fa-solid fa-spinner fa-spin" style="font-size:1.4rem;color:var(--blue);display:block;margin-bottom:10px;"></i>
      Loading qualification categories…
    </div>

    <!-- Error -->
    <div id="studyError" class="study-error" style="display:none;">
      <i class="fa-solid fa-circle-exclamation"></i> <span id="studyErrMsg">Failed to load data.</span>
    </div>

    <!-- Content rendered here -->
    <div id="studyContent" style="display:none;"></div>

  </div>

  <!-- Footer -->
  <div id="siteFooter"></div>

  <!-- Header/Footer loader -->
  <script>
    var _hp = fetch('/header.html',{cache:'no-store'}).then(function(r){return r.ok?r.text():null;}).catch(function(){return null;});
    _hp.then(function(h){ if(h){ var d=document.getElementById('siteHeader'); if(d) d.innerHTML=h; } });
    fetch('/footer.html',{cache:'no-store'}).then(function(r){return r.ok?r.text():null;}).catch(function(){return null;})
      .then(function(h){ if(h){ var d=document.getElementById('siteFooter'); if(d) d.innerHTML=h; }});
  </script>

  <script>
  (function(){
    'use strict';

    var loadingEl = document.getElementById('studyLoading');
    var errorEl   = document.getElementById('studyError');
    var contentEl = document.getElementById('studyContent');

    function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function safe(v){ return v==null?'':String(v).trim(); }

    // ── Icon & color config per qualification ──────────────────────
    var QUAL_CONFIG = {
      '5th-pass'   : { icon:'5th',  bg:'#64748b' },
      '7th-pass'   : { icon:'7th',  bg:'#475569' },
      'intermediate': { icon:'Inter',bg:'#0891b2' },
      '10th-pass'  : { icon:'10th', bg:'#1d4ed8' },
      '12th-pass'  : { icon:'12th', bg:'#7c3aed' },
      'iti'        : { icon:'ITI',  bg:'#b45309' },
      'diploma'    : { icon:'Dip',  bg:'#0f766e' },
      'gnm'        : { icon:'GNM',  bg:'#be185d' },
      'anm'        : { icon:'ANM',  bg:'#db2777' },
      'dpharm'     : { icon:'DPh',  bg:'#9333ea' },
      'dmlt'       : { icon:'MLT',  bg:'#06b6d4' },
      'deled'      : { icon:'DElEd',bg:'#16a34a' },
      'vhse'       : { icon:'VHSE', bg:'#ca8a04' },
      'bsc'        : { icon:'B.Sc', bg:'#2563eb' },
      'bca'        : { icon:'BCA',  bg:'#7c3aed' },
      'ba--ma'     : { icon:'BA/MA',bg:'#ea580c' },
      'llb'        : { icon:'LLB',  bg:'#dc2626' },
      'bed'        : { icon:'B.Ed', bg:'#15803d' },
      'mbbs'       : { icon:'MBBS', bg:'#b91c1c' },
      'bpharma'    : { icon:'BPhm', bg:'#0369a1' },
      'bams'       : { icon:'BAMS', bg:'#4f46e5' },
      'bds'        : { icon:'BDS',  bg:'#0891b2' },
      'mba--pgdm'  : { icon:'MBA',  bg:'#9333ea' },
      'ma'         : { icon:'M.A',  bg:'#c2410c' },
      'mcom'       : { icon:'MCom', bg:'#0f766e' },
      'msc'        : { icon:'M.Sc', bg:'#1d4ed8' },
      'me--mtech'  : { icon:'MTech',bg:'#6d28d9' },
      'mca'        : { icon:'MCA',  bg:'#0369a1' },
      'med'        : { icon:'M.Ed', bg:'#047857' },
      'ms--md'     : { icon:'MS/MD',bg:'#b91c1c' },
      'mpharma'    : { icon:'MPh',  bg:'#7c3aed' },
      'ca'         : { icon:'CA',   bg:'#1e40af' },
      'cs'         : { icon:'CS',   bg:'#0f766e' },
      'icwa'       : { icon:'ICWA', bg:'#92400e' },
      'mphil--phd' : { icon:'Ph.D', bg:'#374151' },
    };

    // ── Group sections by level ────────────────────────────────────
    var GROUPS = [
      { label:'Below Graduation', icon:'fa-school', ids:['5th-pass','7th-pass','10th-pass','12th-pass','intermediate','iti'] },
      { label:'Diploma / Certificate', icon:'fa-certificate', ids:['diploma','gnm','anm','dpharm','dmlt','deled','vhse'] },
      { label:'Graduation', icon:'fa-graduation-cap', ids:['bsc','bca','ba--ma','llb','bed','mbbs','bpharma','bams','bds'] },
      { label:'Post Graduation', icon:'fa-user-graduate', ids:['mba--pgdm','ma','mcom','msc','me--mtech','mca','med','ms--md','mpharma'] },
      { label:'Professional / Research', icon:'fa-briefcase', ids:['ca','cs','icwa','mphil--phd'] },
    ];

    // ── Render ─────────────────────────────────────────────────────
    function render(sections) {
      // Build lookup
      var byId = {};
      sections.forEach(function(s){ byId[s.id] = s; });

      var html = '';

      GROUPS.forEach(function(grp){
        var grpSections = grp.ids.map(function(id){ return byId[id]; }).filter(Boolean);
        // Also add any sections not in any group (safety net)
        if (!grpSections.length) return;

        html += '<div class="study-sec-card">';
        html += '<div class="study-sec-hdr"><i class="fa-solid ' + grp.icon + '"></i>' + esc(grp.label) + '</div>';
        html += '<div class="study-qual-grid">';

        grpSections.forEach(function(sec){
          var cfg   = QUAL_CONFIG[sec.id] || { icon: sec.qualification.slice(0,4), bg:'#374151' };
          var count = (sec.items||[]).length;
          var url   = '/category/study/' + encodeURIComponent(sec.id) + '/';
          html += '<a href="' + url + '" class="study-qual-item">';
          html += '<div class="study-qual-icon" style="background:' + cfg.bg + ';">' + esc(cfg.icon) + '</div>';
          html += '<div class="study-qual-name">' + esc(sec.qualification) + '</div>';
          html += '<div class="study-qual-count">' + count + ' Jobs</div>';
          html += '</a>';
        });

        html += '</div></div>';
      });

      // Orphan sections (not in any group)
      var allGrouped = GROUPS.reduce(function(a,g){ return a.concat(g.ids); }, []);
      var orphans = sections.filter(function(s){ return allGrouped.indexOf(s.id)===-1; });
      if (orphans.length) {
        html += '<div class="study-sec-card">';
        html += '<div class="study-sec-hdr"><i class="fa-solid fa-layer-group"></i> Other Qualifications</div>';
        html += '<div class="study-qual-grid">';
        orphans.forEach(function(sec){
          var cfg = QUAL_CONFIG[sec.id] || { icon: sec.qualification.slice(0,4), bg:'#374151' };
          var count = (sec.items||[]).length;
          var url   = '/category/study/' + encodeURIComponent(sec.id) + '/';
          html += '<a href="' + url + '" class="study-qual-item">';
          html += '<div class="study-qual-icon" style="background:' + cfg.bg + ';">' + esc(cfg.icon) + '</div>';
          html += '<div class="study-qual-name">' + esc(sec.qualification) + '</div>';
          html += '<div class="study-qual-count">' + count + ' Jobs</div>';
          html += '</a>';
        });
        html += '</div></div>';
      }

      loadingEl.style.display  = 'none';
      contentEl.style.display  = '';
      contentEl.innerHTML = html;
    }

    // ── Fetch JSON ─────────────────────────────────────────────────
    fetch('/Qualification_Wise_Jobs.json')
      .then(function(r){
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      })
      .then(function(data){
        var sections = data.sections || [];
        if (!sections.length) throw new Error('No qualification sections found.');
        render(sections);
      })
      .catch(function(err){
        loadingEl.style.display = 'none';
        errorEl.style.display   = '';
        document.getElementById('studyErrMsg').textContent = 'Failed to load data: ' + err.message;
      });

  })();
  </script>
</body>
</html>
