  <style>
    /* ── Layout ── */
    .qs-wrap { max-width: 900px; margin: 0 auto; padding: 12px 10px 40px; }

    /* ── Breadcrumb ── */
    .qs-bc { font-size:.75rem; color:var(--muted); margin-bottom:12px; display:flex; flex-wrap:wrap; gap:4px; align-items:center; }
    .qs-bc a { color:var(--blue); text-decoration:none; }
    .qs-bc a:hover { text-decoration:underline; }
    .qs-bc i { font-size:.6rem; color:#9ca3af; }

    /* ── Job List ── */
    .qs-list-card { background:#fff; border-radius:12px; box-shadow:var(--shadow); margin-bottom:10px; overflow:hidden; }
    .qs-list-head { background:linear-gradient(135deg,#1a56db,#1e40af); color:#fff; padding:10px 14px; font-size:.85rem; font-weight:700; display:flex; align-items:center; gap:8px; }
    .qs-list-item { display:flex; align-items:flex-start; gap:10px; padding:10px 14px; border-bottom:1px solid #f1f5f9; text-decoration:none; color:inherit; transition:background .15s; cursor:pointer; }
    .qs-list-item:last-child { border-bottom:none; }
    .qs-list-item:hover { background:#f8faff; }
    .qs-list-num { background:var(--blue); color:#fff; border-radius:50%; width:22px; height:22px; min-width:22px; display:flex; align-items:center; justify-content:center; font-size:.65rem; font-weight:700; flex-shrink:0; margin-top:1px; }
    .qs-list-body { flex:1; min-width:0; }
    .qs-list-title { font-size:.82rem; font-weight:600; color:#1e293b; line-height:1.4; }
    .qs-list-date  { font-size:.7rem; color:var(--muted); margin-top:2px; }
    .qs-list-qual  { font-size:.62rem; background:#eff6ff; color:#1d4ed8; border-radius:4px; padding:1px 5px; font-weight:600; margin-top:4px; display:inline-block; }

    /* ── Back btn ── */
    .qs-back { display:inline-flex; align-items:center; gap:6px; font-size:.78rem; color:var(--blue); text-decoration:none; background:#eff6ff; padding:6px 12px; border-radius:8px; margin-bottom:12px; font-weight:600; }
    .qs-back:hover { background:#dbeafe; }

    /* ── Detail: Page header ── */
    .qs-hdr { background:linear-gradient(135deg,#1a56db,#1e40af); border-radius:12px; padding:16px; color:#fff; margin-bottom:14px; }
    .qs-hdr-title { font-size:1rem; font-weight:800; line-height:1.4; margin-bottom:6px; }
    .qs-hdr-meta  { font-size:.72rem; opacity:.85; display:flex; flex-wrap:wrap; gap:10px; }
    .qs-hdr-meta span { display:flex; align-items:center; gap:4px; }

    /* ── Short info ── */
    .qs-short { background:#f0f9ff; border-left:4px solid #0891b2; border-radius:0 8px 8px 0; padding:12px 14px; font-size:.82rem; color:#1e293b; line-height:1.65; margin-bottom:14px; }

    /* ── Apply CTA ── */
    .qs-cta { border-radius:10px; padding:12px 16px; margin-bottom:14px; display:flex; align-items:center; gap:10px; font-weight:700; font-size:.85rem; text-decoration:none; justify-content:center; }
    .qs-cta-apply  { background:linear-gradient(135deg,#166534,#15803d); color:#fff; }
    .qs-cta-apply:hover { opacity:.92; }

    /* ── Stat grid ── */
    .qs-stats { display:grid; grid-template-columns:repeat(4,1fr); border-top:1px solid #e2e8f0; }
    .qs-stat  { padding:10px 8px; text-align:center; border-right:1px solid #e2e8f0; }
    .qs-stat:last-child { border-right:none; }
    .qs-stat-lab { font-size:.6rem; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:var(--muted); margin-bottom:3px; }
    .qs-stat-val { font-size:.82rem; font-weight:800; color:#0f172a; word-break:break-word; }
    @media(max-width:540px){ .qs-stats{grid-template-columns:repeat(2,1fr);} .qs-stat:nth-child(2){border-right:none;} .qs-stat:nth-child(3){border-top:1px solid #e2e8f0;} .qs-stat:nth-child(4){border-top:1px solid #e2e8f0;border-right:none;} }

    /* ── Cards ── */
    .qs-card { background:#fff; border-radius:12px; box-shadow:var(--shadow); margin-bottom:12px; overflow:hidden; }
    .qs-card-hdr { padding:10px 14px; color:#fff; font-size:.82rem; font-weight:700; display:flex; align-items:center; gap:8px; }
    .qs-card-body { padding:12px 14px; }

    /* ── Table ── */
    .qs-table { width:100%; border-collapse:collapse; font-size:.78rem; }
    .qs-table th { background:#f8faff; color:#374151; font-weight:700; padding:8px 10px; text-align:left; border-bottom:1px solid #e5e7eb; width:42%; }
    .qs-table td { padding:8px 10px; border-bottom:1px solid #f3f4f6; color:#1e293b; vertical-align:top; }
    .qs-table tr:last-child th, .qs-table tr:last-child td { border-bottom:none; }

    /* ── Links / Buttons ── */
    .qs-links-row { display:flex; flex-wrap:wrap; gap:8px; padding:12px 14px; }
    .qs-link-btn  { display:inline-flex; align-items:center; gap:5px; padding:6px 13px; border-radius:7px; font-size:.73rem; font-weight:700; text-decoration:none; transition:opacity .15s; white-space:nowrap; background:#1d4ed8; color:#fff; }
    .qs-link-btn:hover { opacity:.85; }
    .qs-link-btn.green { background:#15803d; }
    .qs-link-btn.red   { background:#dc2626; }
    .qs-link-btn.gray  { background:#475569; }

    /* ── Important dates table ── */
    .qs-dates-item { display:flex; justify-content:space-between; align-items:center; padding:6px 14px; border-bottom:1px solid #f3f4f6; font-size:.78rem; }
    .qs-dates-item:last-child { border-bottom:none; }
    .qs-dates-label { color:#374151; font-weight:600; }
    .qs-dates-val   { color:#dc2626; font-weight:700; }

    /* ── Vacancy table ── */
    .qs-vac-table { width:100%; border-collapse:collapse; font-size:.75rem; }
    .qs-vac-table th { background:#1d4ed8; color:#fff; padding:7px 8px; text-align:left; }
    .qs-vac-table td { padding:6px 8px; border-bottom:1px solid #f3f4f6; }
    .qs-vac-table tr:last-child td { border-bottom:none; }

    /* ── FAQ accordion ── */
    .qs-faq-item { border-bottom:1px solid #f3f4f6; }
    .qs-faq-item:last-child { border-bottom:none; }
    .qs-faq-q { padding:10px 14px; font-size:.8rem; font-weight:700; color:#1e293b; cursor:pointer; display:flex; justify-content:space-between; align-items:center; gap:8px; }
    .qs-faq-q:hover { background:#f8faff; }
    .qs-faq-a { padding:0 14px 10px; font-size:.78rem; color:#374151; line-height:1.6; display:none; }
    .qs-faq-a.open { display:block; }
    .qs-faq-icon { flex-shrink:0; transition:transform .2s; }
    .qs-faq-q.open .qs-faq-icon { transform:rotate(180deg); }

    /* ── Tags ── */
    .qs-tags-wrap { display:flex; flex-wrap:wrap; gap:6px; padding:12px 14px; }
    .qs-tag { font-size:.68rem; background:#eff6ff; color:#1d4ed8; border-radius:20px; padding:3px 10px; font-weight:600; }

    /* ── How to apply ── */
    .qs-steps { counter-reset:step; padding:12px 14px; }
    .qs-step  { display:flex; gap:10px; margin-bottom:8px; font-size:.8rem; color:#1e293b; line-height:1.55; }
    .qs-step:last-child { margin-bottom:0; }
    .qs-step-num { background:#1d4ed8; color:#fff; border-radius:50%; width:20px; height:20px; min-width:20px; display:flex; align-items:center; justify-content:center; font-size:.65rem; font-weight:700; flex-shrink:0; margin-top:2px; }

    /* ── Notice ── */
    .qs-notice { background:#fef3c7; border:1px solid #fbbf24; border-radius:8px; padding:10px 14px; font-size:.75rem; color:#78350f; margin-bottom:14px; display:flex; gap:8px; align-items:flex-start; }

    /* ── Fee badge ── */
    .qs-fee-free { color:#15803d; font-weight:800; font-size:.9rem; padding:10px 14px; }

    /* ── Loading/Error ── */
    .qs-loading { text-align:center; padding:40px 16px; color:var(--muted); font-size:.85rem; }
    .qs-error   { background:#fef2f2; border:1px solid #fca5a5; border-radius:10px; padding:14px 16px; color:#991b1b; font-size:.82rem; }
  </style>
</head>

  <script>
  (function(){
    'use strict';

    var loadingEl = document.getElementById('qsLoading');
    var errorEl   = document.getElementById('qsError');
    var contentEl = document.getElementById('qsContent');
    var bcSection = document.getElementById('bcSection');

    function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function safe(v){ 
      if(v==null) return '';
      if(typeof v==='string') return v.trim();
      if(Array.isArray(v)) return v.map(function(x){return safe(x);}).filter(Boolean).join(', ');
      if(typeof v==='object'){
        for(var k of ['text','value','name','details','description']){ if(typeof v[k]==='string'&&v[k].trim()) return v[k].trim(); }
        return Object.values(v).filter(Boolean).map(function(x){return safe(x);}).join(' | ');
      }
      return String(v).trim();
    }

    // Read qualId from URL path /category/study/{qualId}/
    var pathMatch = location.pathname.match(/\/category\/study\/([^\/]+)\/?$/);
    var qualId    = pathMatch ? decodeURIComponent(pathMatch[1]) : '';
    var slugArg   = new URLSearchParams(location.search).get('slug') || '';

    function makeSlug(title){
      return safe(title).toLowerCase().replace(/[^\w\s-]/g,'').replace(/\s+/g,'-').replace(/-+/g,'-').replace(/^-|-$/g,'').slice(0,120);
    }

    // ── Render section list (no slug) ─────────────────────────────
    function renderList(section){
      var title = section.title || section.qualification || qualId;
      var items = section.items || [];

      document.title = title + ' Government Jobs 2026 | Top Sarkari Jobs';
      document.getElementById('metaDesc').content = 'Latest government jobs for ' + section.qualification + ' candidates 2026. ' + items.length + ' vacancies updated daily on Top Sarkari Jobs.';
      document.getElementById('canonicalTag').href = 'https://www.topsarkarijobs.com/category/study/' + encodeURIComponent(qualId) + '/';
      document.getElementById('ogTitle').content = title + ' Govt Jobs 2026 | Top Sarkari Jobs';
      document.getElementById('ogUrl').content   = 'https://www.topsarkarijobs.com/category/study/' + encodeURIComponent(qualId) + '/';
      bcSection.textContent = section.qualification || title;

      var html = '<h1 style="font-size:1rem;font-weight:800;color:#1e293b;margin-bottom:14px;padding-left:2px;">'
               + '<i class="fa-solid fa-graduation-cap" style="color:var(--blue);"></i> ' + esc(title) + '</h1>';
      html += '<div class="qs-notice"><i class="fa-solid fa-circle-info" style="flex-shrink:0;"></i>'
            + '<span>Click any job to view full details — eligibility, dates, fees, how to apply and more.</span></div>';

      html += '<div class="qs-list-card">';
      html += '<div class="qs-list-head"><i class="fa-solid fa-list"></i> ' + esc(title) + ' (' + items.length + ' Jobs)</div>';

      items.forEach(function(item, idx){
        var slug = makeSlug(item.name || '');
        var url  = '/category/study/' + encodeURIComponent(qualId) + '/' + encodeURIComponent(slug) + '/';
        var date = safe(item.date || item.lastDate || item.postDate || '');
        var qual = safe(item.qualification || section.qualification || '');
        html += '<a class="qs-list-item" href="' + url + '">';
        html += '<div class="qs-list-num">' + (idx+1) + '</div>';
        html += '<div class="qs-list-body">';
        html += '<div class="qs-list-title">' + esc(item.name||'') + '</div>';
        if(date) html += '<div class="qs-list-date"><i class="fa-regular fa-calendar"></i> ' + esc(date) + '</div>';
        if(qual) html += '<span class="qs-list-qual">' + esc(qual) + '</span>';
        html += '</div></a>';
      });

      html += '</div>';
      showContent(html);
    }

    // ── Render job detail ─────────────────────────────────────────
    function renderDetail(item, section){
      var d   = item.detail || {};
      var bd  = d.basic_details || {};
      var imp = d.important_dates || {};
      var fee = d.application_fee || {};
      var age = d.age_limit || {};
      var sal = d.salary_details || {};
      var lnk = d.important_links || {};
      var qual= d.qualification || {};

      var title     = safe(bd.job_title || item.name || '');
      var org       = safe(bd.organization_name || item.board || '');
      var postName  = safe(bd.post_name || '');
      var totalVac  = safe(bd.total_vacancies || '');
      var lastDate  = safe(imp.last_date_to_apply || item.lastDate || '');
      var appMode   = safe(bd.application_mode || '');
      var shortInfo = safe(bd.short_information || '');
      var applyUrl  = safe(lnk.apply_online || lnk.official_website || item.url || '');
      var sectionQual = safe(section.qualification || '');
      var sal_pay    = safe(sal.pay_scale || sal.salary || bd.salary || bd.salary_pay_scale || '');
      var minAge     = safe(age.minimum_age || '');
      var maxAge     = safe(age.maximum_age || age.age_limit || age.age_details || '');
      var ageRelax   = safe(age.age_relaxation || age.details || '');
      var eduQual    = safe(qual.education_qualification || qual.eligibility || item.qualification || '');
      var qualDet    = safe(qual.details || '');
      var selProc    = d.selection_process || [];
      var vacRows    = d.vacancy_details || [];
      var howTo      = d.how_to_apply || [];
      var insts      = d.important_instructions || [];
      var faqs       = d.faq || [];
      var appBegin   = safe(imp.application_begin || imp.start_date || '');
      var examDate   = safe(imp.exam_date || '');
      var admitDate  = safe(imp.admit_card_date || imp.admit_card || '');
      var feeLastDt  = safe(imp.fee_payment_last_date || imp.fee_last_date || '');
      var resultDt   = safe(imp.result_date || '');
      var feeText    = '';
      if(typeof fee === 'string') feeText = fee;
      else if(fee.details) feeText = safe(fee.details);
      else if(fee.all) feeText = safe(fee.all);
      else {
        var feeParts = [];
        if(fee.general) feeParts.push('General: ' + safe(fee.general));
        if(fee.obc)     feeParts.push('OBC: '     + safe(fee.obc));
        if(fee.sc)      feeParts.push('SC/ST: '   + safe(fee.sc));
        if(fee.ph)      feeParts.push('PH: '      + safe(fee.ph));
        feeText = feeParts.join(' | ');
      }
      // All links
      var allLinks = [];
      var _seen = new Set();
      function addLink(href, label, icon, cls){
        href = safe(href);
        if(!href || href==='#' || _seen.has(href)) return;
        _seen.add(href);
        allLinks.push({href:href, label:label, icon:icon, cls:cls});
      }
      var IL_MAP = [
        ['apply_online','Apply Online','fa-paper-plane','ib-gr'],
        ['apply_link','Apply Online','fa-paper-plane','ib-gr'],
        ['notification_pdf','Notification PDF','fa-file-pdf','ib-bl'],
        ['download_pdf','Download PDF','fa-file-pdf','ib-bl'],
        ['official_website','Official Website','fa-globe','ib-rd'],
        ['result','Result','fa-trophy','ib-or'],
        ['admit_card','Admit Card','fa-id-card','ib-or'],
        ['answer_key','Answer Key','fa-key','ib-bl'],
        ['syllabus','Syllabus','fa-book-open','ib-bl'],
        ['click_here','Click Here','fa-link','ib-bl'],
      ];
      IL_MAP.forEach(function(km){
        var val = lnk[km[0]];
        if(!val) return;
        var arr = Array.isArray(val) ? val : [val];
        arr.forEach(function(u,i){ addLink(u, i===0?km[1]:km[1]+' '+(i+1), km[2], km[3]); });
      });
      if(applyUrl) addLink(applyUrl,'Official Website','fa-globe','ib-rd');

      // Page meta
      document.title = title + ' | Top Sarkari Jobs';
      document.getElementById('metaDesc').content = 'Apply for ' + title + '. Last Date: ' + lastDate + '. Qualification: ' + sectionQual + '. Full details, eligibility and apply link on Top Sarkari Jobs.';
      var cleanUrl = 'https://www.topsarkarijobs.com/category/study/' + encodeURIComponent(qualId) + '/' + encodeURIComponent(makeSlug(item.name||'')) + '/';
      document.getElementById('canonicalTag').href = cleanUrl;
      document.getElementById('ogTitle').content   = title + ' | Top Sarkari Jobs';
      document.getElementById('ogDesc').content    = shortInfo.slice(0,155);
      document.getElementById('ogUrl').content     = cleanUrl;
      document.getElementById('twTitle').content   = title + ' | Top Sarkari Jobs';
      document.getElementById('twDesc').content    = shortInfo.slice(0,155);
      bcSection.innerHTML = '<a href="/category/study/' + encodeURIComponent(qualId) + '/">' + esc(sectionQual||qualId) + '</a>';

      var html = '';

      // ── Back button ──
      html += '<a href="/category/study/' + encodeURIComponent(qualId) + '/" class="qs-back"><i class="fa-solid fa-arrow-left"></i> Back to ' + esc(sectionQual||qualId) + ' Jobs</a>';

      // ── Hero ──
      html += '<div style="background:linear-gradient(125deg,#0c4a6e,#1a6b8a);border-radius:1.2rem;padding:1.5rem 1.6rem;color:#fff;margin-bottom:1.2rem;">'
            + '<div style="display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:.7rem;">'
            + (sectionQual ? '<span style="background:rgba(255,255,255,.18);border-radius:60px;padding:.25rem .8rem;font-size:.72rem;font-weight:600;">'+esc(sectionQual)+'</span>' : '')
            + (appMode ? '<span style="background:rgba(255,255,255,.18);border-radius:60px;padding:.25rem .8rem;font-size:.72rem;font-weight:600;">'+esc(appMode)+'</span>' : '')
            + '</div>'
            + '<h1 style="font-size:1.25rem;font-weight:800;line-height:1.4;margin-bottom:.5rem;">'+esc(title)+'</h1>'
            + '<div style="display:flex;flex-wrap:wrap;gap:.5rem;">'
            + (org       ? '<span style="background:rgba(255,255,255,.12);border-radius:60px;padding:.28rem .8rem;font-size:.75rem;display:inline-flex;align-items:center;gap:5px;"><i class=\"fa-solid fa-building\"></i>'+esc(org)+'</span>' : '')
            + (totalVac  ? '<span style="background:rgba(255,255,255,.12);border-radius:60px;padding:.28rem .8rem;font-size:.75rem;display:inline-flex;align-items:center;gap:5px;"><i class=\"fa-solid fa-users\"></i>'+esc(totalVac)+' Posts</span>' : '')
            + (lastDate  ? '<span style="background:rgba(255,255,255,.12);border-radius:60px;padding:.28rem .8rem;font-size:.75rem;display:inline-flex;align-items:center;gap:5px;"><i class=\"fa-solid fa-hourglass-end\"></i>Last Date: '+esc(lastDate)+'</span>' : '')
            + '</div></div>';

      // ── Short info ──
      if(shortInfo) html += '<div style="background:#eef4fa;border-left:4px solid #1e7e9f;padding:.85rem 1.1rem;border-radius:.8rem;font-size:.84rem;line-height:1.75;color:#165e7c;margin-bottom:1.1rem;"><i class=\"fa-solid fa-info-circle\" style=\"margin-right:7px;\"></i>'+esc(shortInfo)+'</div>';

      // ── Dates + Fee + Age grid ──
      html += '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem;margin-bottom:1.1rem;">';

      // Dates card
      html += '<div class="qs-card" style="margin:0;">'
            + '<div style="background:#1d4ed8;color:#fff;padding:.7rem 1rem;font-weight:700;font-size:.88rem;display:flex;align-items:center;gap:7px;"><i class=\"fa-regular fa-calendar-alt\"></i> Important Dates</div>'
            + '<div style="padding:.8rem 1rem;">';
      var dateRows = [['App Begin',appBegin],['Last Date to Apply',lastDate],['Fee Last Date',feeLastDt],['Exam Date',examDate],['Admit Card',admitDate],['Result',resultDt]];
      var hasDate = false;

      html += '</div></div>';

      // Fee card
      html += '<div class="qs-card" style="margin:0;">'
            + '<div style="background:#15803d;color:#fff;padding:.7rem 1rem;font-weight:700;font-size:.88rem;display:flex;align-items:center;gap:7px;"><i class=\"fa-solid fa-indian-rupee-sign\"></i> Application Fee</div>'
            + '<div style="padding:.8rem 1rem;font-size:.83rem;">'
            + '<div style="display:flex;justify-content:space-between;padding:.5rem 0;gap:8px;"><span style="font-weight:600;color:#2c4f6e;">Fee</span><span>'+(feeText?'✅ '+esc(feeText):'✅ No fee / See notification')+'</span></div>'
            + '</div></div>';

      // Age card
      html += '<div class="qs-card" style="margin:0;">'
            + '<div style="background:#ea580c;color:#fff;padding:.7rem 1rem;font-weight:700;font-size:.88rem;display:flex;align-items:center;gap:7px;"><i class=\"fa-solid fa-user-clock\"></i> Age Limit</div>'
            + '<div style="padding:.8rem 1rem;">';
      var ageRows = [['Min Age',minAge],['Max Age',maxAge],['Relaxation',ageRelax]];
      var hasAge = false;
      ageRows.forEach(function(r){ if(r[1]){ hasAge=true; html += '<div style="display:flex;justify-content:space-between;padding:.5rem 0;border-bottom:1px dashed #e9edf2;font-size:.82rem;gap:8px;"><span style="font-weight:600;color:#2c4f6e;flex-shrink:0;">'+esc(r[0])+'</span><span style="text-align:right;">'+esc(r[1])+'</span></div>'; } });
      if(!hasAge) html += '<div style="font-size:.82rem;color:#64748b;">As per notification</div>';
      html += '</div></div>';

      html += '</div>'; // end grid

      // ── Highlights + Qualification ──
      html += '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:1rem;margin-bottom:1.1rem;">';

      // Highlights
      html += '<div class="qs-card" style="margin:0;">'
            + '<div style="background:#f8fafc;color:#0f172a;padding:.7rem 1rem;font-weight:700;font-size:.88rem;display:flex;align-items:center;gap:7px;border-bottom:2px solid #e2e8f0;"><i class=\"fa-solid fa-bullhorn\" style=\"color:#1d4ed8;\"></i> Job Highlights</div>'
            + '<div style="padding:.8rem 1rem;">';
      var hlRows = [['Post Name',title],['Organization',org],['Total Posts',totalVac],['Salary',sal_pay],['Apply Mode',appMode]];
      hlRows.forEach(function(r){ if(r[1]) html += '<div style="display:flex;justify-content:space-between;padding:.5rem 0;border-bottom:1px dashed #e9edf2;font-size:.82rem;gap:8px;"><span style="font-weight:600;color:#2c4f6e;flex-shrink:0;min-width:90px;">'+esc(r[0])+'</span><span style="text-align:right;word-break:break-word;color:'+(r[0]==='Salary'?'#16a34a':'#1e293b')+';">'+esc(r[1])+'</span></div>'; });
      html += '</div></div>';

      // Qualification
      html += '<div class="qs-card" style="margin:0;">'
            + '<div style="background:#4338ca;color:#fff;padding:.7rem 1rem;font-weight:700;font-size:.88rem;display:flex;align-items:center;gap:7px;"><i class=\"fa-solid fa-graduation-cap\"></i> Qualification</div>'
            + '<div style="padding:.8rem 1rem;font-size:.84rem;line-height:1.75;color:#374151;">'
            + (eduQual ? esc(eduQual) : 'See official notification.')
            + (qualDet ? '<p style=\"margin-top:.5rem;color:#64748b;font-size:.82rem;\">'+esc(qualDet)+'</p>' : '')
            + '</div></div>';

      html += '</div>'; // end grid

      // ── Vacancy Table ──
      if(vacRows && vacRows.length > 0){
        var cols = Object.keys(vacRows[0]).filter(function(k){ return vacRows.some(function(r){ return String(r[k]||'').trim(); }); });
        if(cols.length){
          html += '<div class="qs-card" style="margin-bottom:1.1rem;">'
                + '<div style="background:#0f766e;color:#fff;padding:.7rem 1rem;font-weight:700;font-size:.88rem;display:flex;align-items:center;gap:7px;"><i class=\"fa-solid fa-table-list\"></i> Vacancy Details</div>'
                + '<div style="padding:.6rem .8rem;overflow-x:auto;-webkit-overflow-scrolling:touch;">'
                + '<table style="width:100%;border-collapse:collapse;font-size:.82rem;min-width:360px;">'
                + '<thead><tr>'+cols.map(function(c){ return '<th style=\"background:#f4fafe;padding:.7rem .9rem;font-weight:700;color:#1c5a78;border-bottom:2px solid #dee8f0;text-align:left;white-space:nowrap;\">'+esc(c)+'</th>'; }).join('')+'</tr></thead>'
                + '<tbody>'+vacRows.map(function(row){ return '<tr>'+cols.map(function(c,ci){ return '<td style=\"padding:.7rem .9rem;border-bottom:1px solid #eef2f8;word-break:break-word;\">'+(ci===0?'<strong>':'')+esc(String(row[c]||''))+(ci===0?'</strong>':'')+'</td>'; }).join('')+'</tr>'; }).join('')+'</tbody>'
                + '</table>'
                + '<p style=\"font-size:.68rem;color:#94a3b8;text-align:right;padding:3px 0;\">← Scroll to see all columns →</p>'
                + '</div></div>';
        }
      }

      // ── Selection Process ──
      if(selProc && selProc.length){
        var selArr = Array.isArray(selProc) ? selProc : String(selProc).split(/[,\/;\n]/).map(function(s){ return s.trim(); }).filter(Boolean);
        if(selArr.length){
          html += '<div class="qs-card" style="margin-bottom:1.1rem;">'
                + '<div style="background:#f8fafc;color:#0f172a;padding:.7rem 1rem;font-weight:700;font-size:.88rem;display:flex;align-items:center;gap:7px;border-bottom:2px solid #e2e8f0;"><i class=\"fa-solid fa-tasks\" style=\"color:#1d4ed8;\"></i> Selection Process</div>'
                + '<div style="padding:.8rem 1rem;display:flex;flex-wrap:wrap;gap:7px;">'
                + selArr.map(function(s){ return '<span style=\"background:#f0f7ff;border:1px solid #bfdbfe;border-radius:8px;padding:5px 11px;font-size:.79rem;font-weight:600;color:#1e40af;display:inline-flex;align-items:center;gap:5px;\"><i class=\"fa-solid fa-check-circle\"></i>'+esc(String(s).slice(0,60))+'</span>'; }).join('')
                + '</div></div>';
        }
      }

      // ── How To Apply ──
      if(howTo && howTo.length){
        html += '<div class="qs-card" style="margin-bottom:1.1rem;">'
              + '<div style="background:#0f766e;color:#fff;padding:.7rem 1rem;font-weight:700;font-size:.88rem;display:flex;align-items:center;gap:7px;"><i class=\"fa-solid fa-mouse-pointer\"></i> How To Apply</div>'
              + '<div style="padding:.8rem 1rem;"><ol style=\"list-style:none;padding:0;margin:0;\">'
              + howTo.map(function(s,i){ return '<li style=\"display:flex;align-items:flex-start;gap:10px;padding:.55rem 0;border-bottom:1px solid #f1f5f9;font-size:.83rem;line-height:1.65;\"><span style=\"flex-shrink:0;width:22px;height:22px;background:#0f766e;color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:800;margin-top:2px;\">'+(i+1)+'</span>'+esc(String(s))+'</li>'; }).join('')
              + '</ol></div></div>';
      }

      // ── Important Links ──
      if(allLinks.length){
        var COLORS = {
          'ib-gr':'background:#f0fdf4;color:#15803d;border-color:#bbf7d0;',
          'ib-bl':'background:#eff6ff;color:#1d4ed8;border-color:#bfdbfe;',
          'ib-rd':'background:#fff5f5;color:#dc2626;border-color:#fecaca;',
          'ib-or':'background:#fff7ed;color:#ea580c;border-color:#fed7aa;'
        };
        html += '<div class="qs-card" style="margin-bottom:1.1rem;">'
              + '<div style="background:#1d4ed8;color:#fff;padding:.7rem 1rem;font-weight:700;font-size:.88rem;display:flex;align-items:center;gap:7px;"><i class=\"fa-solid fa-link\"></i> Important Links</div>'
              + '<div style="padding:.8rem 1rem;display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:9px;">'
              + allLinks.map(function(lk){ var cs = COLORS[lk.cls]||COLORS['ib-bl']; return '<a href=\"'+esc(lk.href)+'\" target=\"_blank\" rel=\"noopener\" style=\"display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;padding:10px 7px;border-radius:10px;'+cs+'text-decoration:none;font-weight:700;font-size:.72rem;text-align:center;min-height:68px;border:1px solid;transition:.18s;\"><i class=\"fa-solid '+esc(lk.icon)+'\" style=\"font-size:1rem;\"></i>'+esc(lk.label.slice(0,24))+'</a>'; }).join('')
              + '</div></div>';
      }

      // ── Job Header ──
      html += '<div class="qs-card">';
      html += '<div style="padding:14px 14px 0;">';
      if(sectionQual) html += '<span style="font-size:.7rem;font-weight:700;background:#eff6ff;color:#1d4ed8;border-radius:4px;padding:2px 8px;display:inline-block;margin-bottom:8px;">' + esc(sectionQual) + ' JOBS</span>';
      if(appMode) html += '<span style="font-size:.7rem;font-weight:700;background:#f0fdf4;color:#15803d;border-radius:4px;padding:2px 8px;display:inline-block;margin-bottom:8px;margin-left:6px;">' + esc(appMode) + '</span>';
      html += '<h1 style="font-size:1rem;font-weight:800;color:#1e293b;line-height:1.45;margin-bottom:8px;">' + esc(title) + '</h1>';
      // Meta row
      html += '<div style="font-size:.72rem;color:var(--muted);display:flex;flex-wrap:wrap;gap:10px;margin-bottom:10px;">';
      if(lastDate) html += '<span style="color:#dc2626;font-weight:700;"><i class="fa-solid fa-hourglass-end"></i> Last Date: ' + esc(lastDate) + '</span>';
      if(org)      html += '<span><i class="fa-solid fa-building"></i> ' + esc(org) + '</span>';
      html += '</div>';
      html += '</div>';

      // ── Stat grid ──
      html += '<div class="qs-stats">';
      var stats = [
        ['ORGANISATION', org||'—'],
        ['TOTAL POSTS', totalVac||'Various'],
        ['LAST DATE', lastDate||'—'],
        ['APPLY MODE', appMode||'Online'],
      ];
      stats.forEach(function(s){
        html += '<div class="qs-stat"><div class="qs-stat-lab">' + esc(s[0]) + '</div><div class="qs-stat-val" style="' + (s[0]==='LAST DATE'?'color:#dc2626;':'') + '">' + esc(s[1]) + '</div></div>';
      });
      html += '</div></div>';

      // ── Apply CTA ──
      if(applyUrl){
        html += '<a href="' + esc(applyUrl) + '" target="_blank" rel="noopener" class="qs-cta qs-cta-apply">'
              + '<i class="fa-solid fa-up-right-from-square"></i> Apply Online / Official Website पर जाएं</a>';
      }

      // ── Short Information ──
      if(shortInfo){
        html += '<div class="qs-short">' + esc(shortInfo) + '</div>';
      }

      // ── Basic Info card ──
      var basicRows = [
        ['Post Name',       safe(bd.post_name||'')],
        ['Category',        safe(d.category||sectionQual||'')],
        ['Total Vacancies', totalVac],
        ['Job Type',        safe(bd.job_type||'')],
        ['Job Location',    safe(bd.job_location||'')],
        ['Notification No', safe(bd.notification_number||'')],
        ['Official Website',safe(bd.official_website||'')],
        ['Application Mode',appMode],
      ].filter(function(r){ return r[1]; });

      if(basicRows.length){
        html += card('#0f172a','fa-circle-info','Basic Information', tableRows(basicRows));
      }

      // ── Important Dates ──
      var dateRows = [
        ['Application Start Date', safe(imp.application_start_date||'')],
        ['Last Date to Apply',     safe(imp.last_date_to_apply||'')],
        ['Exam Date',              safe(imp.exam_date||'')],
        ['Admit Card Date',        safe(imp.admit_card_date||'')],
        ['Result Date',            safe(imp.result_date||'')],
        ['Notification Date',      safe(imp.notification_date||'')],
      ].filter(function(r){ return r[1]; });

      if(dateRows.length){
        var dHtml = dateRows.map(function(r){
          return '<div class="qs-dates-item"><span class="qs-dates-label">' + esc(r[0]) + '</span><span class="qs-dates-val">' + esc(r[1]) + '</span></div>';
        }).join('');
        html += card('#dc2626','fa-calendar-days','Important Dates', dHtml);
      }

      // ── Age Limit ──
      var ageStr = safe(age.age_details || age.minimum_age && ('Min: ' + age.minimum_age) || age.maximum_age || age.details || '');
      if(ageStr){
        html += card('#0891b2','fa-person','Age Limit', '<div style="padding:10px 14px;font-size:.82rem;color:#1e293b;">' + esc(ageStr) + '</div>');
      }

      // ── Qualification ──
      var eduQual = safe(qual.education_qualification || qual.details || '');
      if(eduQual){
        html += card('#4338ca','fa-graduation-cap','Educational Qualification',
          '<div style="padding:10px 14px;font-size:.82rem;color:#1e293b;line-height:1.65;">' + esc(eduQual.slice(0,600)) + '</div>');
      }

      // ── Application Fee ──
      var feeRows = [
        ['General / OBC Fee', safe(fee.general_fee||'')],
        ['SC / ST Fee',       safe(fee.sc_fee||'')],
        ['EWS Fee',           safe(fee.ews_fee||'')],
        ['PwD Fee',           safe(fee.pwd_fee||'')],
        ['Female Fee',        safe(fee.female_fee||'')],
        ['Details',           safe(fee.details||'')],
      ].filter(function(r){ return r[1]; });

      var feeBody = '';
      if(!feeRows.length){
        feeBody = '<div class="qs-fee-free"><i class="fa-solid fa-check-circle" style="color:#15803d;"></i> No Fee / Free</div>';
      } else {
        feeBody = tableRows(feeRows);
      }
      html += card('#be185d','fa-indian-rupee-sign','Application Fee', feeBody);

      // ── Vacancy Details ──
      var vacRows = d.vacancy_details || [];
      if(vacRows.length){
        var vHtml = '<div style="overflow-x:auto;"><table class="qs-vac-table"><thead><tr>';
        var headers = Object.keys(vacRows[0]).filter(function(k){ return vacRows[0][k]; });
        if(!headers.length) headers = ['Post Name','Total Posts'];
        headers.forEach(function(h){ vHtml += '<th>' + esc(h) + '</th>'; });
        vHtml += '</tr></thead><tbody>';
        vacRows.forEach(function(row){
          vHtml += '<tr>';
          headers.forEach(function(h){ vHtml += '<td>' + esc(safe(row[h]||'')) + '</td>'; });
          vHtml += '</tr>';
        });
        vHtml += '</tbody></table></div>';
        html += card('#0f766e','fa-table','Vacancy Details', vHtml);
      }

      // ── Salary ──
      var salStr = safe(sal.salary || sal.pay_scale || sal.details || '');
      if(salStr){
        html += card('#15803d','fa-sack-dollar','Salary & Pay Scale',
          '<div style="padding:10px 14px;">'
          + '<div style="font-size:.75rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px;">PAY SCALE</div>'
          + '<div style="font-size:.95rem;font-weight:800;color:#15803d;">' + esc(salStr) + '</div></div>');
      }

      // ── Selection Process ──
      var selArr = d.selection_process || [];
      if(selArr.length){
        var sHtml = '<div style="padding:10px 14px;">' + selArr.map(function(s,i){
          return '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:.8rem;">'
               + '<span style="background:#1d4ed8;color:#fff;border-radius:50%;width:20px;height:20px;min-width:20px;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;">' + (i+1) + '</span>'
               + esc(safe(s)) + '</div>';
        }).join('') + '</div>';
        html += card('#7c3aed','fa-list-check','Selection Process', sHtml);
      }

      // ── How To Apply ──
      var howArr = d.how_to_apply || [];
      if(howArr.length){
        var hHtml = '<div class="qs-steps">' + howArr.map(function(step, i){
          return '<div class="qs-step"><div class="qs-step-num">' + (i+1) + '</div><div>' + esc(safe(step)) + '</div></div>';
        }).join('') + '</div>';
        html += card('#0369a1','fa-clipboard-list','How To Apply', hHtml);
      }

      // ── Important Links ──
      var clicks = lnk.click_here || [];
      var linkBtns = [];
      if(lnk.apply_online) linkBtns.push({text:'Apply Online',url:lnk.apply_online,cls:'green'});
      if(lnk.notification_pdf) linkBtns.push({text:'Notification PDF',url:lnk.notification_pdf,cls:''});
      clicks.forEach(function(c){
        if(c.url && c.text) linkBtns.push({text:c.text,url:c.url,cls:'gray'});
      });
      if(lnk.official_website) linkBtns.push({text:'Official Website',url:lnk.official_website,cls:''});

      if(linkBtns.length){
        var lHtml = '<div class="qs-links-row">' + linkBtns.map(function(b){
          return '<a href="' + esc(b.url) + '" target="_blank" rel="noopener" class="qs-link-btn ' + b.cls + '"><i class="fa-solid fa-link"></i>' + esc(b.text) + '</a>';
        }).join('') + '</div>';
        html += card('#0f766e','fa-link','Important Links', lHtml);
      }

      // ── FAQ ──
      var faqs = d.faq || [];
      if(faqs.length){
        var fHtml = faqs.map(function(f, i){
          return '<div class="qs-faq-item">'
               + '<div class="qs-faq-q" onclick="var a=this.nextElementSibling;var open=a.classList.toggle(\'open\');this.classList.toggle(\'open\',open);">'
               + '<span>Q. ' + esc(safe(f.question||'')) + '</span>'
               + '<i class="fa-solid fa-chevron-down qs-faq-icon"></i></div>'
               + '<div class="qs-faq-a">' + esc(safe(f.answer||'')) + '</div>'
               + '</div>';
        }).join('');
        html += card('#374151','fa-circle-question','FAQ', fHtml);
      }

      // ── SEO Tags ──
      var tags = d.seo_tags || [];
      if(tags.length){
        var tHtml = '<div class="qs-tags-wrap">' + tags.map(function(t){
          return '<span class="qs-tag">' + esc(safe(t)) + '</span>';
        }).join('') + '</div>';
        html += card('#64748b','fa-tags','SEO Tags', tHtml);
      }

      // ── Disclaimer ──
      html += '<div class="qs-notice" style="margin-top:4px;">'
            + '<i class="fa-solid fa-triangle-exclamation" style="flex-shrink:0;"></i>'
            + '<span><strong>Important:</strong> Always verify all details on the official website before applying. Dates &amp; eligibility may change without notice.</span></div>';

      showContent(html);
    }

    // ── Helpers ──────────────────────────────────────────────────
    function card(color, icon, title, body){
      return '<div class="qs-card"><div class="qs-card-hdr" style="background:' + color + ';">'
           + '<i class="fa-solid ' + icon + '"></i>' + esc(title) + '</div>'
           + '<div class="qs-card-body" style="padding:0;">' + body + '</div></div>';
    }
    function tableRows(rows){
      var html = '<table class="qs-table">';
      rows.forEach(function(r){
        html += '<tr><th>' + esc(r[0]) + '</th><td>' + esc(r[1]) + '</td></tr>';
      });
      return html + '</table>';
    }
    function showContent(html){
      loadingEl.style.display = 'none';
      contentEl.style.display = '';
      contentEl.innerHTML = html;
    }
    function showError(msg){
      loadingEl.style.display = 'none';
      errorEl.style.display   = '';
      document.getElementById('qsErrMsg').textContent = msg;
    }

    // ── Main: fetch JSON ─────────────────────────────────────────
    if(!qualId){ showError('Invalid URL — qualification not found.'); return; }

    fetch('/Qualification_Wise_Jobs.json')
      .then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
      .then(function(data){
        var sections = data.sections || [];
        var section  = sections.find(function(s){ return s.id === qualId; });
        if(!section){ throw new Error('Qualification "' + qualId + '" not found.'); }

        if(slugArg){
          // Find matching item by slug
          var items = section.items || [];
          var matched = items.find(function(item){
            return makeSlug(item.name||'') === slugArg;
          });
          if(matched){ renderDetail(matched, section); }
          else { renderList(section); } // fallback to list
        } else {
          renderList(section);
        }
      })
      .catch(function(err){ showError('Failed to load: ' + err.message); });

  })();
  </script>
</body>
</html>
