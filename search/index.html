  <script>
  (function () {
    const form = document.getElementById("site-search");
    const input = document.getElementById("q");
    const wrap = document.getElementById("search-results");
    const status = document.getElementById("search-status");
    const list = document.getElementById("search-list");
    const clearBtn = document.getElementById("clear-search");

    function escapeHtml(s) {
      return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
    }

    function getSearchableLinks() {
      const anchors = Array.from(document.querySelectorAll("a[href]"));
      const out = [], seen = new Set();
      for (const a of anchors) {
        const href = a.getAttribute("href") || "";
        if (!href || href.startsWith("#") || href.startsWith("mailto:") || href.startsWith("tel:")) continue;
        if (/^https?:\/\//i.test(href) && !href.includes(location.hostname)) continue;
        const text = (a.textContent || "").trim();
        const key = href + "|" + text;
        if (!text || text.length < 2 || seen.has(key)) continue;
        seen.add(key);
        out.push({ href, text });
      }
      return out;
    }

    function renderResults(query, results) {
      wrap.classList.remove("hidden");
      if (!results.length) {
        status.textContent = `No results found for "${query}". Try SSC, Railway, Bank, Police, Admit Card, Result.`;
        list.innerHTML = "";
        return;
      }
      status.textContent = `Showing ${results.length} result(s) for "${query}".`;
      list.innerHTML = results.slice(0, 30).map(r =>
        `<li class="border border-slate-200 rounded-md p-3 hover:bg-slate-50 transition">
          <a class="font-semibold text-sky-700 underline underline-offset-2" href="${escapeHtml(r.href)}">${escapeHtml(r.text)}</a>
          <div class="text-xs text-slate-500 mt-1">${escapeHtml(r.href)}</div>
        </li>`
      ).join("");
    }

    function clearResults() {
      input.value = "";
      wrap.classList.add("hidden");
      status.textContent = "";
      list.innerHTML = "";
      input.focus();
    }

    form.addEventListener("submit", function (e) {
      e.preventDefault();
      const q = input.value.trim().toLowerCase();
      if (!q) return;
      const matches = getSearchableLinks().filter(l => (l.text + " " + l.href).toLowerCase().includes(q));
      renderResults(input.value, matches);
    });

    clearBtn.addEventListener("click", clearResults);

    let t = null;
    input.addEventListener("input", function () {
      clearTimeout(t);
      t = setTimeout(() => {
        if (input.value.trim().length >= 2) {
          const q = input.value.trim().toLowerCase();
          const matches = getSearchableLinks().filter(l => (l.text + " " + l.href).toLowerCase().includes(q));
          renderResults(input.value, matches);
        }
        if (!input.value.trim()) wrap.classList.add("hidden");
      }, 250);
    });

    // Pre-fill from URL ?q=
    const params = new URLSearchParams(location.search);
    const qParam = params.get('q') || params.get('query');
    if (qParam) { input.value = qParam; setTimeout(() => form.dispatchEvent(new Event('submit')), 800); }
  })();
  </script>
