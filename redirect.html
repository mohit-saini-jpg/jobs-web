<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirecting...</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/x-icon" href="image.ico" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header" id="site-header"></header>

  <main id="main" class="container page">
    <section class="seo-block" style="max-width: 760px; margin: 16px auto;">
      <h2 id="redirectHeading">Redirecting in <span id="countdown">5</span> seconds...</h2>
      <p id="redirectLabel" style="font-weight: 700; color: var(--text); margin-top: 10px;"></p>
      <p style="margin-top: 6px;">
        Destination:
        <a id="redirectTarget" href="#" rel="noopener" style="word-break: break-all; color: #0369a1; text-decoration: underline;"></a>
      </p>
      <p style="margin-top: 14px;">
        If redirect does not happen, click
        <a id="redirectNow" href="#" rel="noopener" style="color: #0369a1; text-decoration: underline;">Continue now</a>.
      </p>
    </section>
  </main>

  <footer class="site-footer" id="site-footer"></footer>

  <script>
    (() => {
      "use strict";

      const params = new URLSearchParams(window.location.search || "");
      const rawTo = (params.get("to") || "").trim();
      const label = (params.get("label") || "").trim();

      const countdownEl = document.getElementById("countdown");
      const labelEl = document.getElementById("redirectLabel");
      const targetEl = document.getElementById("redirectTarget");
      const nowEl = document.getElementById("redirectNow");

      function setInvalidState() {
        if (countdownEl) countdownEl.textContent = "0";
        if (labelEl) labelEl.textContent = "Invalid redirect link.";
        if (targetEl) {
          targetEl.textContent = window.location.origin + "/index.html";
          targetEl.href = "index.html";
        }
        if (nowEl) nowEl.href = "index.html";
      }

      if (!rawTo) {
        setInvalidState();
        return;
      }

      let destination;
      try {
        destination = new URL(rawTo, window.location.href);
      } catch (_) {
        setInvalidState();
        return;
      }

      const allowed = ["http:", "https:", "mailto:", "tel:"];
      if (!allowed.includes(destination.protocol)) {
        setInvalidState();
        return;
      }

      const finalUrl = destination.href;

      if (labelEl && label) labelEl.textContent = label;
      if (targetEl) {
        targetEl.href = finalUrl;
        targetEl.textContent = finalUrl;
      }
      if (nowEl) nowEl.href = finalUrl;

      let secondsLeft = 5;
      if (countdownEl) countdownEl.textContent = String(secondsLeft);

      const timer = setInterval(() => {
        secondsLeft -= 1;
        if (countdownEl) countdownEl.textContent = String(Math.max(0, secondsLeft));
        if (secondsLeft <= 0) {
          clearInterval(timer);
          window.location.href = finalUrl;
        }
      }, 1000);
    })();
  </script>
  <script src="script.js?v=20260331"></script>
</body>
</html>
