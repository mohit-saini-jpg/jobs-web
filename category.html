<!DOCTYPE html>
<html lang="en">
<head>
  <script type="application/ld+json">
{
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "Organization",
        "@id": "https://www.topsarkarijobs.com/#organization",
        "name": "Top Sarkari Jobs",
        "url": "https://www.topsarkarijobs.com/",
        "logo": "https://www.topsarkarijobs.com/logo.png", 
        "description": "Latest Government Jobs, Sarkari Results, Admit Cards, Answer Keys and Online Forms in India",
        "sameAs": [
          "https://www.facebook.com/topsarkarijobs",
          "https://twitter.com/topsarkarijobs",
          "https://www.instagram.com/topsarkarijobs"
        ],
        "contactPoint": {
          "@type": "ContactPoint",
          "contactType": "customer support",
          "email": "info@topsarkarijobs.com"
        }
      },
      {
        "@type": "WebSite",
        "@id": "https://www.topsarkarijobs.com/#website",
        "url": "https://www.topsarkarijobs.com/",
        "name": "Top Sarkari Jobs",
        "description": "Latest Sarkari Jobs 2026, Government Jobs, Results, Admit Cards & Application Forms",
        "publisher": {
          "@id": "https://www.topsarkarijobs.com/#organization"
        },
        "inLanguage": "en-IN",
        "potentialAction": {
          "@type": "SearchAction",
          "target": {
            "@type": "EntryPoint",
            "urlTemplate": "https://www.topsarkarijobs.com/?s={search_term_string}"
          },
          "query-input": "required name=search_term_string"
        }
      },
      {
        "@type": "BreadcrumbList",
        "@id": "https://www.topsarkarijobs.com/#breadcrumb",
        "itemListElement": [
          {
            "@type": "ListItem",
            "position": 1,
            "name": "Home",
            "item": "https://www.topsarkarijobs.com/"
          }
        ]
      },
      {
        "@type": "FAQPage",
        "@id": "https://www.topsarkarijobs.com/#faq",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "How to find latest government jobs?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "You can check the latest sarkari jobs, results, admit cards and application forms on Top Sarkari Jobs website."
            }
          },
          {
            "@type": "Question",
            "name": "Are these jobs updated daily?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes, we update latest government jobs, results and admit cards on a daily basis."
            }
          }
        ]
      }
    ]
  }
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sarkari Jobs by Category – Study, State, Popular & More | Top Sarkari Jobs</title>
  <meta name="description" content="Browse Top Sarkari Jobs categories with official links. Study-wise, state-wise, popular jobs, admissions, results, admit cards and more." />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://www.topsarkarijobs.com/category.html" id="categoryCanonical"/>
  <script>
  // Set canonical to clean URL when served as /state/ hub
  (function(){
    var p = location.pathname, q = location.search;
    var el = document.getElementById('categoryCanonical');
    if (!el) return;
    if (p === '/state/' || p === '/state' || q.indexOf('group=state') !== -1) {
      el.href = 'https://www.topsarkarijobs.com/state/';
    }
  })();
  </script>
  <link rel="icon" type="image/x-icon" href="image.ico">

  <!-- Open Graph / WhatsApp / Social Share -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://www.topsarkarijobs.com/category.html" />
  <meta property="og:title" content="Job Categories - Top Sarkari Jobs" />
  <meta property="og:description" content="Browse government job categories by study level, state, admissions, results and more." />

  <meta name="twitter:image" content="https://www.topsarkarijobs.com/image.png" />

  <!-- REQUIRED for injected header/footer -->
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="fonts/fa/all.min.css">

  <!-- ✅ Category subpages: hide Search UI inside injected header (same as tools/helpdesk) -->
  <style>
    #site-header a[href*="search" i],
    #site-header button[onclick*="search" i],
    #site-header a[onclick*="search" i],
    #site-header form[role="search" i],
    #site-header form[id*="search" i],
    #site-header form[class*="search" i],
    #site-header input[type="search" i],
    #site-header input[id*="search" i],
    #site-header input[name*="search" i],
    #site-header input[name="q" i],
    #site-header button[id*="search" i],
    #site-header button[class*="search" i],
    #site-header [id*="search" i],
    #site-header [class*="search" i]{
      display: none !important;
    }
  </style>
  <!-- Header: fetch + inject immediately before script.js defer loads -->
  <script>
  (function(){
    var _hp=fetch("/header.html",{cache:"no-store"}).then(function(r){return r.ok?r.text():null;}).catch(function(){return null;});
    window.__headerPromise=_hp;
    function _inj(){var h=document.getElementById("site-header");if(!h||h.innerHTML.trim())return;_hp.then(function(html){if(!html||h.innerHTML.trim())return;h.innerHTML=html;if(typeof window.__TSJ_INIT_HEADER==="function")window.__TSJ_INIT_HEADER();});}
    document.readyState==="loading"?document.addEventListener("DOMContentLoaded",_inj):_inj();
  })();
  </script>
  <!-- GA4: Centralized Analytics -->
  <script src="/analytics.js" defer></script>
</head>

<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <!-- ✅ Injected homepage header -->
  <div id="site-header"></div>

  <!-- ✅ NOTE: Removed the big "Search across Top Sarkari Jobs" section from this page -->

  <main id="main" class="container page">
    <section class="seo-block">
      <p class="mini-links">
        <a href="index.html">Home</a>

      <!-- ✅ Removed the mini filter bar:
           input#categoryFilter + button#clearCategoryFilter
      -->
    </section>

    <section style="margin-top:14px;">
      <div id="categoryGrid" class="cat-grid"></div>

      <div id="categoryEmpty" class="seo-block" style="display:none;margin-top:12px;">
        <strong>No results found.</strong>
        <div style="margin-top:6px;color:var(--muted);">Try a different keyword.</div>
      </div>
    </section>
  </main>

  <!-- ✅ Injected homepage footer -->
  <div id="site-footer"></div>

  <!-- Mobile menu elements required by script.js -->
  <div id="menuOverlay" class="overlay" hidden></div>
  <aside id="mobileMenu" class="offcanvas" aria-label="Mobile menu" hidden>
    <div class="offcanvas-head">
      <div class="offcanvas-title">Menu</div>
      <button id="closeMenuBtn" class="icon-btn" type="button" aria-label="Close menu">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>

    <nav class="offcanvas-nav" aria-label="Mobile primary">
      <div id="header-links-mobile"></div>
    </nav>
  </aside>

  <script src="script.js" defer></script>
</body>
