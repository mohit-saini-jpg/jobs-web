  <script>
  // SEO-5: Dynamic H1 based on URL segment
  (function(){
    var CATEGORY_MAP = {
      'railway-jobs':    { h1: 'Railway Jobs 2026 — Latest Vacancies',        desc: 'Latest Railway Recruitment 2026: RRB, RRC, RPF notifications, vacancies, eligibility and apply links.' },
      'bank-jobs':       { h1: 'Bank Jobs 2026 — Latest Banking Vacancies',    desc: 'Latest Bank Recruitment 2026: IBPS, SBI, RBI, Nationalized Banks — PO, Clerk, SO and more.' },
      'ssc-jobs':        { h1: 'SSC Jobs 2026 — Latest Staff Selection Commission Vacancies', desc: 'SSC CGL, CHSL, MTS, GD Constable 2026 notifications and apply links.' },
      'upsc-jobs':       { h1: 'UPSC Jobs 2026 — Latest UPSC Vacancies',       desc: 'UPSC Civil Services, NDA, CDS, CAPF 2026 — latest exam notifications and eligibility.' },
      'police-jobs':     { h1: 'Police Jobs 2026 — Latest Police Vacancies',   desc: 'Latest Police Recruitment 2026: SSC GD, State Police Constable, SI and Inspector posts.' },
      'teaching-jobs':   { h1: 'Teaching Jobs 2026 — Latest Teacher Vacancies',desc: 'Latest Teacher Recruitment 2026: CTET, DSSSB, KVS, NVS and State TET notifications.' },
      'defence-jobs':    { h1: 'Defence Jobs 2026 — Latest Army/Navy/Air Force Vacancies', desc: 'Indian Army, Navy, Air Force, CISF, BSF recruitment 2026 — apply online links.' },
      'state-jobs':      { h1: 'State Government Jobs 2026 — Latest Vacancies',desc: 'State PSC, RPSC, UPPSC, MPPSC and other State Government Job notifications 2026.' },
      'results':         { h1: 'Sarkari Results 2026 — Latest Exam Results',   desc: 'Latest government exam results 2026 — Railway, SSC, Bank, Police, UPSC and more.' },
      'admit-cards':     { h1: 'Admit Cards 2026 — Hall Ticket Download',      desc: 'Download latest Admit Cards 2026 — Railway, SSC, Bank, Police, UPSC hall tickets.' },
      'answer-keys':     { h1: 'Answer Keys 2026 — Official Answer Keys',      desc: 'Download latest official Answer Keys 2026 — SSC, Railway, Bank, Police and more.' },
      'admissions':      { h1: 'Admissions 2026 — Latest Admission Notifications', desc: 'Latest University, College and Institute Admissions 2026 — UG, PG, Diploma courses.' },
    };
    var DEFAULT = { h1: 'Government Job Categories 2026', desc: 'Browse government job categories — Railway, Bank, SSC, UPSC, Police, Teaching and more.' };

    var path = location.pathname; // e.g. /category/railway-jobs/
    var seg = path.replace(/^\/category\/|\/$/g,'').toLowerCase().trim();
    var data = CATEGORY_MAP[seg] || DEFAULT;

    var h1El   = document.getElementById('categoryTitle');
    var descEl = document.getElementById('categoryDesc');
    var crumb  = document.getElementById('crumbText');

    if (h1El)   h1El.textContent  = data.h1;
    if (descEl) descEl.textContent = data.desc;
    if (crumb)  crumb.textContent  = data.h1.split(' — ')[0];

    // Also update page title
    if (seg && CATEGORY_MAP[seg]) document.title = data.h1 + ' | Top Sarkari Jobs';
  })();
  </script>
