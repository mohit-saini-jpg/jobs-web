# ══════════════════════════════════════════════════════════════
# netlify.toml — Top Sarkari Jobs
# SEO Clean URL Architecture — All routes configured
# ══════════════════════════════════════════════════════════════

[build]
  publish = "."

# No build command — pure static HTML site

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Content-Type = "application/manifest+json; charset=utf-8"

[[headers]]
  for = "/pwa-install.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"


[[headers]]
  for = "/data/*.json"
  [headers.values]
    Cache-Control = "public, max-age=600, stale-while-revalidate=3600"
    Access-Control-Allow-Origin = "*"

# ═══════════════════════════════════════════════════════════════
# ═══════════════════════════════════════════════════════════════
# ISSUE-005 FIX: Force canonical www — must be FIRST (highest priority)
# ═══════════════════════════════════════════════════════════════
[[redirects]]
  from   = "https://topsarkarijobs.com/*"
  to     = "https://www.topsarkarijobs.com/:splat"
  status = 301
  force  = true

[[redirects]]
  from   = "http://topsarkarijobs.com/*"
  to     = "https://www.topsarkarijobs.com/:splat"
  status = 301
  force  = true

[[redirects]]
  from   = "http://www.topsarkarijobs.com/*"
  to     = "https://www.topsarkarijobs.com/:splat"
  status = 301
  force  = true

# ═══════════════════════════════════════════════════════════════
# ISSUE-011 FIX: view.html → homepage (query params handled by inline JS)
# ═══════════════════════════════════════════════════════════════
[[redirects]]
  from   = "/view.html"
  to     = "/"
