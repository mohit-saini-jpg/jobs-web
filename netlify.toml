# ══════════════════════════════════════════════════════════════
# netlify.toml — Top Sarkari Jobs
# Static HTML site — NO build command needed
# ══════════════════════════════════════════════════════════════

[build]
  publish = "."

# No build command — ye pure static HTML site hai

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Content-Type = "application/manifest+json; charset=utf-8"

[[headers]]
  for = "/pwa-install.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/.well-known/assetlinks.json"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Content-Type = "application/json"
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/.well-known/apple-app-site-association"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Content-Type = "application/json"
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"

# ── Section URL routing ──────────────────────────────────────────────────────
# /section/* served by static section/[slug]/index.html files
# Fallback: any unmatched /section/* → view.html (200, not 302)
[[redirects]]
  from = "/section/*"
  to   = "/view.html"
  status = 200
  force  = false   # Only applies if static file not found

# /jobs/* static pages
[[redirects]]
  from = "/jobs/*"
  to   = "/job.html"
  status = 200
  force  = false

# /state-jobs/* routing
[[redirects]]
  from = "/state-jobs/*"
  to   = "/view.html"
  status = 200
  force  = false
