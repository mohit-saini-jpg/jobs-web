# ═══════════════════════════════════════════════════════════════
# ISSUE-019 FIX: Vary: Accept-Encoding for JS/CSS + JSON data files
# ═══════════════════════════════════════════════════════════════
[[headers]]
  for = "/*.js"
  [headers.values]
    Vary = "Accept-Encoding"

[[headers]]
  for = "/*.css"
  [headers.values]
    Vary = "Accept-Encoding"

[[headers]]
  for = "/Complete_Jobs_Full_Data.json"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
    Vary = "Accept-Encoding"

[[headers]]
  for = "/data/*.json"
  [headers.values]
    Vary = "Accept-Encoding"
