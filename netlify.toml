# ═══════════════════════════════════════════════════════════════
# 200 REWRITES — Clean URLs served by SPA templates
# Static files take priority (force = false)
# ═══════════════════════════════════════════════════════════════

# /section/* — served by static section/[slug]/index.html first,
#              falls back to view.html if no static file found
[[redirects]]
  from   = "/section/*"
  to     = "/view.html"
  status = 200
  force  = false

# /jobs/* — job detail pages
[[redirects]]
  from   = "/jobs/*"
  to     = "/job.html"
  status = 200
  force  = false

# /state/* — state job pages (served by static state/[slug]/index.html)
[[redirects]]
  from   = "/state/*"
  to     = "/state-jobs.html"
  status = 200
  force  = false

# /education/* — education pages (served by static education/[slug]/index.html)
[[redirects]]
  from   = "/education/*"
  to     = "/education-detail.html"
  status = 200
  force  = false

# /category/study/{slug}/ — qualification listing pages (static files, force=false)
[[redirects]]
  from   = "/category/study/:slug/"
  to     = "/category/study/:slug/index.html"
  status = 200
  force  = false

# /category/* — category hub pages (fallback to category.html)
[[redirects]]
  from   = "/category/*"
  to     = "/category.html"
  status = 200
  force  = false

# /search/* — search pages
[[redirects]]
  from   = "/search/*"
  to     = "/search.html"
  status = 200
  force  = false

# Static clean URL pages
[[redirects]]
  from = "/about/"
  to   = "/about.html"
  status = 200

[[redirects]]
  from = "/contact/"
  to   = "/contact.html"
  status = 200

[[redirects]]
  from = "/terms/"
