    }

    grid.innerHTML = services.map((s, i) => {
      const name = (s.name || s.service || "").trim();
      const icon = s.icon || "fa-solid fa-file-alt";
      const docs = Array.isArray(s.documents) ? s.documents : [];
      const color = COLORS[i % COLORS.length];
      return `
        <div class="csc-card" onclick="openCscModal(${i})" role="button" tabindex="0"
             onkeydown="if(event.key==='Enter'||event.key===' ')openCscModal(${i})">
          <div class="csc-card-head ${color}">
            <div class="csc-card-icon"><i class="${icon}"></i></div>
            <div class="csc-card-name">${name}</div>
          </div>
          <div class="csc-card-body">
            ${docs.length ? `<div class="csc-card-docs"><strong>Required docs:</strong> ${docs.join(", ")}</div>` : ""}
            <button class="csc-req-btn" onclick="event.stopPropagation();openCscModal(${i})">
              <i class="fa-solid fa-paper-plane"></i> Request करें
            </button>
          </div>
        </div>`;
    }).join("");

    // Store services globally for modal
    window.__cscServices = services;
  }

  // ── Open modal ──
  window.openCscModal = function(idx) {
    const services = window.__cscServices || [];
    const s = services[idx];
    if (!s) return;
    currentService = s;

    document.getElementById("modalServiceName").textContent = s.name || s.service || "";

    const docs = Array.isArray(s.documents) ? s.documents : [];
    document.getElementById("modalBody").innerHTML = `
      ${docs.length ? `
        <div class="csc-docs-hint">
          <div class="csc-docs-hint-title">📄 Required Documents:</div>
          <ul class="csc-docs-hint-list">${docs.map(d => `<li>${d}</li>`).join("")}</ul>
        </div>` : ""}
      <form id="cscForm" onsubmit="submitCscRequest(event)">
        <div class="csc-form-row">
          <label>Full Name <span style="color:#ef4444">*</span></label>
          <input type="text" id="cscName" placeholder="अपना पूरा नाम" required autocomplete="name" />
        </div>
        <div class="csc-form-row">
          <label>Phone Number <span style="color:#ef4444">*</span></label>
          <input type="tel" id="cscPhone" placeholder="10 अंकों का मोबाइल नंबर" required autocomplete="tel" maxlength="10" />
        </div>
        <div class="csc-form-row">
          <label>Village / City</label>
          <input type="text" id="cscCity" placeholder="गाँव / शहर का नाम" autocomplete="address-level2" />
        </div>
        <div class="csc-form-row">
          <label>Additional Details</label>
          <textarea id="cscDetails" placeholder="कोई जरूरी जानकारी (optional)"></textarea>
        </div>
        <div class="csc-modal-actions">
          <button type="button" class="csc-btn-cancel" onclick="closeCscModal()">Cancel</button>
          <button type="submit" class="csc-btn-submit" id="cscSubmitBtn">
            <i class="fa-solid fa-paper-plane"></i>&nbsp; Submit Request
          </button>
        </div>
      </form>`;

    document.getElementById("cscOverlay").classList.add("open");
    document.body.style.overflow = "hidden";
    setTimeout(() => { const el = document.getElementById("cscName"); if(el) el.focus(); }, 80);
  };

  window.closeCscModal = function() {
    document.getElementById("cscOverlay").classList.remove("open");
    document.body.style.overflow = "";
    currentService = null;
  };

  // ── Submit to Supabase ──
  window.submitCscRequest = async function(e) {
    e.preventDefault();
    const name    = (document.getElementById("cscName")?.value || "").trim();
    const phone   = (document.getElementById("cscPhone")?.value || "").trim();
    const city    = (document.getElementById("cscCity")?.value || "").trim();
    const details = (document.getElementById("cscDetails")?.value || "").trim();

    if (!name || !phone || phone.length < 8) {
      alert("कृपया नाम और सही मोबाइल नंबर भरें।");
      return;
    }

    const btn = document.getElementById("cscSubmitBtn");
    btn.disabled = true;
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>&nbsp; Submitting…';

    const serviceText = [
      currentService?.name || currentService?.service || "Unknown",
      city ? `City: ${city}` : "",
      details ? `Details: ${details}` : ""
    ].filter(Boolean).join(" | ");

    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "apikey": SUPABASE_ANON,
          "Authorization": `Bearer ${SUPABASE_ANON}`,
          "Prefer": "return=minimal"
        },
        body: JSON.stringify({ name, phone, service: serviceText })
      });

      if (!res.ok) {
        const err = await res.text();
        console.error("Supabase error:", err);
        throw new Error("Supabase insert failed");
      }

      // Success screen
      document.getElementById("modalBody").innerHTML = `
        <div class="csc-success-msg">
          <div class="csc-success-icon"><i class="fa-solid fa-check-circle"></i></div>
          <div class="csc-success-title">Request Submitted! ✅</div>
          <p class="csc-success-sub">
            <strong>${name}</strong> जी, आपकी request मिल गई।<br/>
            हम जल्द ही <strong>${phone}</strong> पर contact करेंगे।
          </p>
          <button class="csc-req-btn" style="margin:18px auto 0;display:flex" onclick="closeCscModal()">
            <i class="fa-solid fa-times"></i>&nbsp; Close
          </button>
        </div>`;

    } catch(err) {
      console.error("Submit error:", err);
      btn.disabled = false;
      btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i>&nbsp; Submit Request';
      alert("Request submit नहीं हो सकी। Internet check करें और फिर try करें।");
    }
  };

  // ESC key close
  document.addEventListener("keydown", function(e) {
    if (e.key === "Escape") closeCscModal();
  });

  // Init
  document.addEventListener("DOMContentLoaded", renderGrid);
  if (document.readyState !== "loading") renderGrid();
})();
</script>

<div id="footer-placeholder"></div>
</body>
</html>
