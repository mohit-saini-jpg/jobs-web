<!--
  AGE LIMIT DETAILS TABLE FIX
  ════════════════════════════════════════════════════════════════
  
  ISSUE: Age Limit table breaks content into individual characters
         (shows each letter on separate row)
  
  ROOT CAUSE:
  - CSS rule: .jp-table { table-layout: fixed; }
  - Combined with word-break: break-word
  - Creates excessive wrapping in narrow 2-column table
  
  FIX: Replace the Age Limit HTML table block with wrapped version
  
  ════════════════════════════════════════════════════════════════
-->

<!-- REMOVE THIS: Old Age Limit section ─────────────────────────── -->
<!--
  <div class="jp-card" id="ageCard" style="display:none;">
    <div class="jp-sec-head" style="background:linear-gradient(135deg,#0f766e,#0891b2);"><i class="fa-solid fa-user-clock"></i> Age Limit</div>
    <table class="jp-table"><tbody id="ageTableBody"></tbody></table>
  </div>
-->

<!-- REPLACE WITH THIS: New Age Limit section ────────────────────── -->
<div class="jp-card" id="ageCard" style="display:none;">
  <div class="jp-sec-head" style="background:linear-gradient(135deg,#0f766e,#0891b2);"><i class="fa-solid fa-user-clock"></i> Age Limit</div>
  <!-- WRAPPER: Prevents table-layout:fixed from breaking content -->
  <div class="jp-table-wrap-fixed">
    <table class="jp-table"><tbody id="ageTableBody"></tbody></table>
  </div>
</div>

<!-- ════════════════════════════════════════════════════════════ -->
<!-- OPTIONAL: Also apply to other similar 2-column tables -->
<!-- ════════════════════════════════════════════════════════════ -->

<!-- ════════════════════════════════════════════════════════════ -->
<!-- CSS REQUIRED: Add this to your <style> section in <head> -->
<!-- ════════════════════════════════════════════════════════════ -->

<style>
/* Fix for 2-column tables with fixed layout issues */
.jp-table-wrap-fixed {
  width: 100%;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  min-width: 0;
}

.jp-table-wrap-fixed .jp-table {
  table-layout: auto !important;
  min-width: 300px;
  width: 100%;
}

.jp-table-wrap-fixed .jp-table th {
  width: auto !important;
  min-width: 140px;
  max-width: 45%;
}

.jp-table-wrap-fixed .jp-table td {
  width: auto !important;
  min-width: 150px;
  max-width: 55%;
  word-break: normal !important;
  overflow-wrap: normal !important;
  white-space: normal;
}

/* Apply to Age Limit, Dates, and Fee cards */
#ageCard .jp-table,
#datesDetailCard .jp-table,
#feeCard .jp-table {
  table-layout: auto !important;
  min-width: 300px;
}

#ageCard .jp-table th,
#ageCard .jp-table td,
#datesDetailCard .jp-table th,
#datesDetailCard .jp-table td,
#feeCard .jp-table th,
#feeCard .jp-table td {
  width: auto !important;
  min-width: 140px;
  word-break: normal !important;
  overflow-wrap: normal !important;
}

@media (max-width: 600px) {
  #ageCard .jp-table,
  #datesDetailCard .jp-table,
  #feeCard .jp-table {
    font-size: 0.78rem;
  }

  #ageCard .jp-table th,
  #ageCard .jp-table td,
  #datesDetailCard .jp-table th,
  #datesDetailCard .jp-table td,
  #feeCard .jp-table th,
  #feeCard .jp-table td {
    padding: 8px 10px;
  }
}
</style>

<!-- ════════════════════════════════════════════════════════════ -->
<!-- EXPLANATION: Why This Works -->
<!-- ════════════════════════════════════════════════════════════ -->

<!--
BEFORE (BROKEN):
- .jp-table { table-layout: fixed; width: 35%; }
- Browser tries to fit content in fixed column widths
- word-break: break-word breaks at any character
- Narrow width + aggressive wrapping = each character on own row

AFTER (FIXED):
- Wrapper div with .jp-table-wrap-fixed
- Override: table-layout: auto !important;
- table-layout: auto lets columns size to content
- word-break: normal allows browser to wrap at word boundaries
- min-width ensures minimum column sizes
- Result: Proper multi-line text wrapping, not character wrapping

COMPATIBILITY:
- Works in all modern browsers (Chrome, Firefox, Safari, Edge)
- Gracefully degrades in older IE (but only uses table-layout:auto)
- Mobile responsive with proper padding adjustments
- Uses CSS !important to override inline + stylesheet rules
-->
