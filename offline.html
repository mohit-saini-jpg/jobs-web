    .dot {
      width: 8px; height: 8px; border-radius: 50%;

      margin-top: 20px; text-align: left;

    }
    .cached-link:last-child { border-bottom: none; }
    .cached-link:hover { color: #f5a623; }
    .cached-link::before { content: '📄'; font-size: 16px; }

<body>
  <div class="container">
    <div class="icon-wrap">📡</div>
    <h1>You're Offline</h1>

    <div class="status">
      <div class="dot" id="status-dot"></div>
      <span id="status-text">No internet connection</span>
    </div>

    <p>
      Don't worry! Previously visited pages are available.<br/>
      Check your connection and try refreshing.
    </p>

    <button class="btn-primary" onclick="tryReload()">
      🔄 Try Again
    </button>

    <div id="cached-pages" style="display:none" class="cached-section">
      <h3>📚 Available Offline</h3>
      <div id="cached-list"></div>
    </div>

    <div class="tips">
      💡 Install our app for a better offline experience<br/>
      — works like a native app on your device!
    </div>
  </div>

  <script>
    // Check connection status
    function updateStatus() {
      const dot  = document.getElementById('status-dot');
      const text = document.getElementById('status-text');
      if (navigator.onLine) {
        dot.className = 'dot online';
        text.textContent = 'Connection restored! Reloading…';
        setTimeout(() => { window.location.href = document.referrer || '/'; }, 1500);
      }
    }

    window.addEventListener('online', updateStatus);
    updateStatus();

    function tryReload() {
      if (navigator.onLine) {
        window.location.href = document.referrer || '/';
      } else {
        document.getElementById('status-text').textContent = 'Still offline. Please check your Wi-Fi or mobile data.';
        setTimeout(() => {
          document.getElementById('status-text').textContent = 'No internet connection';
        }, 3000);
      }
    }

    // Show cached pages from service worker
    if ('caches' in window) {
      caches.keys().then(function(names) {
        const pageCacheName = names.find(n => n.includes('tsj-pages'));
        if (!pageCacheName) return;
        return caches.open(pageCacheName).then(c => c.keys());
      }).then(function(keys) {
        if (!keys || !keys.length) return;

        const container = document.getElementById('cached-pages');
        const list      = document.getElementById('cached-list');
        const labels = {
          '/': '🏠 Home – Top Sarkari Jobs',
          '/index.html': '🏠 Home – Top Sarkari Jobs',
          '/result.html': '📊 Results 2026',
          '/admit-card.html': '🎫 Admit Cards',
          '/search.html': '🔍 Search Jobs',
          '/category.html': '📁 Job Categories',
          '/about.html': 'ℹ️ About Us',
          '/contact.html': '📞 Contact',
        };

        const links = keys
          .map(k => k.url.replace(location.origin, ''))
          .filter(path => !path.includes('?') && path !== location.pathname)
          .slice(0, 8)
          .map(path => {
            const label = labels[path] || path;
            return `<a class="cached-link" href="${path}">${label}</a>`;
          });

        if (links.length) {
          list.innerHTML = links.join('');
          container.style.display = 'block';
        }
      }).catch(() => {});
    }
  </script>
