<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="theme-color" content="#0d2257"/>
<title>Offline — Top Sarkari Jobs</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f4fb;color:#0f172a;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center}
.card{background:#fff;border-radius:16px;padding:32px 24px;box-shadow:0 4px 24px rgba(13,34,87,.12);max-width:380px;width:100%}
.icon{font-size:3rem;margin-bottom:16px}
h1{font-size:1.25rem;font-weight:800;color:#0d2257;margin-bottom:8px}
p{font-size:.85rem;color:#64748b;line-height:1.6;margin-bottom:20px}
.btn{display:inline-block;background:#1a56db;color:#fff;padding:10px 24px;border-radius:8px;font-weight:700;font-size:.85rem;text-decoration:none;cursor:pointer;border:none}
.btn:hover{background:#0d2257}
.cached{margin-top:16px;font-size:.75rem;color:#94a3b8}
</style>
</head>
<body>
<div class="card">
  <div class="icon">📶</div>
  <h1>You're Offline</h1>
  <p>No internet connection. Cached pages are still available. Reconnect to see the latest Sarkari Jobs.</p>
  <button class="btn" onclick="window.location.reload()">Try Again</button>
  <p class="cached">Some pages may be available from cache</p>
</div>
</body>
</html>
