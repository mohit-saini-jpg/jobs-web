// ============================================================
//  APPLY PAGE SEO — Call this on view.html page load
// ============================================================
function applyViewPageSEO() {
  const params = new URLSearchParams(window.location.search);
  const rawSection = params.get('section') || '';
  if (!rawSection) return;

  const key = rawSection.toLowerCase().trim();
  const meta = SECTION_META[key] || {
    title:     `${rawSection} 2026 – Latest Sarkari Jobs | Top Sarkari Jobs`,
    desc:      `Latest ${rawSection} government job notifications 2026. Check vacancies, eligibility, last date and apply online at Top Sarkari Jobs.`,
    h1:        `${rawSection} 2026`,
    canonical: `https://www.topsarkarijobs.com/view.html?section=${encodeURIComponent(rawSection)}`,
    faq:       []
  };

  // Update <title>
  document.title = meta.title;

  // Update meta description
  const descEl = document.querySelector('meta[name="description"]');
  if (descEl) descEl.content = meta.desc;

  // Update canonical
  const canonEl = document.getElementById('canonicalTag');
  if (canonEl) canonEl.href = meta.canonical;

  // Update OG tags
  const ogTitle = document.querySelector('meta[property="og:title"]');
  const ogDesc  = document.querySelector('meta[property="og:description"]');
  const ogUrl   = document.querySelector('meta[property="og:url"]');
  if (ogTitle) ogTitle.content = meta.title;
  if (ogDesc)  ogDesc.content  = meta.desc;
  if (ogUrl)   ogUrl.content   = meta.canonical;

  // Update Twitter tags
  const twTitle = document.querySelector('meta[name="twitter:title"]');
  const twDesc  = document.querySelector('meta[name="twitter:description"]');
  if (twTitle) twTitle.content = meta.title;
  if (twDesc)  twDesc.content  = meta.desc;

  // Inject H1 if element exists
  let h1El = document.getElementById('section-h1');
  if (!h1El) {
    h1El = document.createElement('h1');
    h1El.id = 'section-h1';
    h1El.style.cssText = 'font-size:1.4rem;font-weight:900;color:#0d2257;margin:0 0 4px;line-height:1.3;';
    const pageHero = document.getElementById('section-page-hero') || document.querySelector('.view-header');
    if (pageHero) pageHero.prepend(h1El);
  }
  h1El.textContent = meta.h1 || rawSection;

  // Inject intro paragraph
  if (meta.intro) {
    let introEl = document.getElementById('section-intro');
    if (!introEl) {
      introEl = document.createElement('p');
      introEl.id = 'section-intro';
      introEl.style.cssText = 'font-size:.84rem;color:#64748b;margin:6px 0 12px;line-height:1.6;max-width:780px;';
      if (h1El && h1El.parentNode) h1El.parentNode.insertBefore(introEl, h1El.nextSibling);
    }
    introEl.textContent = meta.intro;
  }

  // Inject Breadcrumb JSON-LD
  injectBreadcrumbSchema(meta.h1 || rawSection, meta.canonical);

  // Inject FAQ schema if available
  if (meta.faq && meta.faq.length > 0) {
    injectFAQSchema(meta.faq);
  }
}

function injectBreadcrumbSchema(sectionName, sectionUrl) {
  const schema = {
    "@context": "https://schema.org",
    "@type": "BreadcrumbList",
    "itemListElement": [
      {"@type":"ListItem","position":1,"name":"Home","item":"https://www.topsarkarijobs.com/"},
      {"@type":"ListItem","position":2,"name":sectionName,"item":sectionUrl}
    ]
  };
  let el = document.getElementById('breadcrumbSchema');
  if (!el) {
    el = document.createElement('script');
    el.type = 'application/ld+json';
    el.id = 'breadcrumbSchema';
    document.head.appendChild(el);
  }
  el.textContent = JSON.stringify(schema);
}

function injectFAQSchema(faqItems) {
  const schema = {
    "@context": "https://schema.org",
    "@type": "FAQPage",
    "mainEntity": faqItems.map(f => ({
      "@type": "Question",
      "name": f.q,
      "acceptedAnswer": {"@type":"Answer","text":f.a}
    }))
  };
  let el = document.getElementById('faqSchema');
  if (!el) {
    el = document.createElement('script');
    el.type = 'application/ld+json';
    el.id = 'faqSchema';
    document.head.appendChild(el);
  }
  el.textContent = JSON.stringify(schema);
}

function enhancedJobLink(name, url, date, location, sectionKey, buildRedirectUrl, normalizeUrl) {
  const a = document.createElement('a');
  a.className = 'section-link';
  a.href = buildRedirectUrl(url, name, sectionKey) || normalizeUrl(url);
  a.setAttribute('data-redirect-label', name);

  // Parse date urgency
  let dateBadge = '';
  if (date) {
    const lastDate = new Date(date);
    const today    = new Date();
    const daysLeft = Math.ceil((lastDate - today) / (1000*60*60*24));
    let badgeClass = 'safe';
    let label = date;
    if (daysLeft <= 7  && daysLeft > 0)  badgeClass = 'urgent';
    else if (daysLeft <= 15 && daysLeft > 0) badgeClass = 'normal';
    else if (daysLeft <= 0)              { badgeClass = 'urgent'; label = 'Last date passed'; }
    dateBadge = `<span class="last-date-badge ${badgeClass}">📅 ${label}</span>`;
  }

  const locBadge = location
    ? `<span style="font-size:.71rem;color:#475569;display:flex;align-items:center;gap:3px;"><i class="fa-solid fa-location-dot" style="color:#94a3b8;font-size:.68rem;"></i>${location}</span>`
    : '';

  a.innerHTML = `
    <div class="t">${name}</div>
    <div class="d">
      ${dateBadge}
      ${locBadge}
      ${!dateBadge && !locBadge ? '<span>View Details →</span>' : ''}
    </div>`;
  return a;
}

function renderSkeletons(container, count = 3) {
  container.innerHTML = '';
  for (let i = 0; i < count; i++) {
    container.innerHTML += `
      <div class="skeleton-card">
        <div class="skeleton skeleton-head"></div>
        <div class="skeleton skeleton-title"></div>
        <div class="skeleton skeleton-line"></div>
        <div class="skeleton skeleton-line"></div>
        <div class="skeleton skeleton-line short"></div>
      </div>`;
  }
}

// ============================================================
//  RELATED SECTIONS — Internal linking widget
// ============================================================
const RELATED_SECTIONS = {
  "railway jobs":    ["Bank Jobs","Police Jobs","Central jobs","Indian ARMY jobs"],
  "bank jobs":       ["Railway Jobs","Graduation jobs","Central jobs","Latest Govt Jobs"],
  "police jobs":     ["Indian ARMY jobs","Railway Jobs","10th Pass jobs","12th Pass jobs"],
  "teacher jobs":    ["Graduation jobs","Post Graduation jobs","Central jobs","12th Pass jobs"],
  "10th pass jobs":  ["12th Pass jobs","Railway Jobs","Police Jobs","Indian ARMY jobs"],
  "12th pass jobs":  ["10th Pass jobs","Graduation jobs","Bank Jobs","NDA jobs"],
  "graduation jobs": ["Post Graduation jobs","Bank Jobs","SSC CGL","Central jobs"],
  "indian army jobs":["Police Jobs","10th Pass jobs","12th Pass jobs","Railway Jobs"],
  "haryana all state jobs": ["State jobs","Police Jobs","Teacher Jobs","12th Pass jobs"],
  "latest jobs":     ["Jobs with Last date","Top 20 Jobs","Central jobs","State jobs"]
};

function renderRelatedSections(currentSection) {
  const key = (currentSection || '').toLowerCase().trim();
  const related = RELATED_SECTIONS[key] || ["Latest Govt Jobs","Bank Jobs","Railway Jobs","Police Jobs"];

  const container = document.createElement('div');
  container.className = 'related-jobs';
  container.innerHTML = `
    <div class="related-jobs-head">
      <i class="fa-solid fa-link"></i> Related Government Job Categories
    </div>
    <div style="padding:12px;display:flex;flex-wrap:wrap;gap:8px;">
      ${related.map(s => `
        <a href="view.html?section=${encodeURIComponent(s)}"
           style="display:inline-flex;align-items:center;gap:5px;padding:7px 13px;background:#f0f7ff;border:1px solid #bfdbfe;border-radius:20px;font-size:.78rem;font-weight:700;color:#1a56db;text-decoration:none;transition:background .15s;"
           onmouseover="this.style.background='#dbeafe'" onmouseout="this.style.background='#f0f7ff'">
          <i class="fa-solid fa-briefcase" style="font-size:.7rem;color:#93c5fd;"></i> ${s}
        </a>`).join('')}
    </div>`;

  const sidebar = document.getElementById('view-sidebar') || document.querySelector('.view-right');
  if (sidebar) sidebar.appendChild(container);
}

// ============================================================
//  JOBPOSTING SCHEMA — For job.html detail pages
// ============================================================
function injectJobPostingSchema(job) {
  if (!job) return;
  const schema = {
    "@context": "https://schema.org",
    "@type": "JobPosting",
    "title": job.name || job.title || "Government Job",
    "description": job.description || `Apply for ${job.name || job.title}. Check eligibility, vacancies, salary, last date and how to apply on Top Sarkari Jobs.`,
    "identifier": {
      "@type": "PropertyValue",
      "name": "Top Sarkari Jobs",
      "value": job.id || job.slug || "sarkari-job"
    },
    "datePosted": job.postedDate || new Date().toISOString().split('T')[0],
    "validThrough": job.lastDate || "",
    "employmentType": "FULL_TIME",
    "hiringOrganization": {
      "@type": "Organization",
      "name": job.organization || job.department || "Government of India",
      "sameAs": "https://www.topsarkarijobs.com/"
    },
    "jobLocation": {
      "@type": "Place",
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "IN",
        "addressRegion": job.state || job.location || "India"
      }
    },
    "jobBenefits": "Government job security, Provident Fund, Gratuity, Leave encashment, Medical benefits, HRA and other Central/State Government allowances",
    "educationRequirements": {
      "@type": "EducationalOccupationalCredential",
      "credentialCategory": job.qualification || "Varies by post"
    },
    "applicationContact": {
      "@type": "ContactPoint",
      "contactType": "Apply Online",
      "url": job.applyUrl || job.officialUrl || "https://www.topsarkarijobs.com/"
    }
  };
  if (job.vacancies) {
    schema.totalJobOpenings = parseInt(job.vacancies, 10);
  }
  if (job.salaryMin || job.salary) {
    schema.baseSalary = {
      "@type": "MonetaryAmount",
      "currency": "INR",
      "value": {
        "@type": "QuantitativeValue",
        "value": job.salaryMin || job.salary,
        "maxValue": job.salaryMax || undefined,
        "unitText": "MONTH"
      }
    };
  }
  const el = document.getElementById('jobSchema');
  if (el) el.textContent = JSON.stringify(schema);
}

// Initialize on DOMContentLoaded
document.addEventListener('DOMContentLoaded', function() {
  const page = (location.pathname.split('/').pop() || 'index.html').toLowerCase();
  if (page === 'view.html') {
    applyViewPageSEO();
    const section = new URLSearchParams(location.search).get('section') || '';
    renderRelatedSections(section);
  }
});
