    .edu-wrap { max-width: 860px; margin: 0 auto; padding: 12px 10px 40px; }

    /* ── Breadcrumb ── */

    /* ── Section List (when no slug) ── */

    .edu-list-item { display:flex; align-items:flex-start; gap:10px; padding:10px 14px; border-bottom:1px solid #f1f5f9; text-decoration:none; color:inherit; transition:background .15s; }
    .edu-list-item:last-child { border-bottom:none; }
    .edu-list-item:hover { background:#f8faff; }
    .edu-list-num { background:var(--blue); color:#fff; border-radius:50%; width:22px; height:22px; display:flex; align-items:center; justify-content:center; font-size:.65rem; font-weight:700; flex-shrink:0; margin-top:1px; }
    .edu-list-title { font-size:.82rem; font-weight:600; color:#1e293b; line-height:1.4; }
    .edu-list-date { font-size:.7rem; color:var(--muted); margin-top:2px; }
    .edu-list-badge { font-size:.62rem; background:#eff6ff; color:#1d4ed8; border-radius:4px; padding:1px 5px; font-weight:600; white-space:nowrap; margin-top:4px; display:inline-block; }

    /* ── Detail Page Header ── */
    .edu-hdr { background:linear-gradient(135deg,#1a56db,#1e40af); border-radius:12px; padding:16px; color:#fff; margin-bottom:14px; }
    .edu-hdr-title { font-size:1rem; font-weight:800; line-height:1.4; margin-bottom:6px; }
    .edu-hdr-meta { font-size:.72rem; opacity:.85; display:flex; flex-wrap:wrap; gap:10px; }
    .edu-hdr-meta span { display:flex; align-items:center; gap:4px; }

    /* ── Short Info Box ── */
    .edu-short-info { background:#f0f9ff; border-left:4px solid #0891b2; border-radius:0 8px 8px 0; padding:12px 14px; font-size:.82rem; color:#1e293b; line-height:1.65; margin-bottom:14px; }

    /* ── Cards ── */
    .edu-card { background:#fff; border-radius:12px; box-shadow:var(--shadow); margin-bottom:12px; overflow:hidden; }
    .edu-card-head { padding:10px 14px; color:#fff; font-size:.82rem; font-weight:700; display:flex; align-items:center; gap:8px; }
    .edu-card-body { padding:0; }

    /* ── Table ── */
    .edu-table { width:100%; border-collapse:collapse; font-size:.78rem; }
    .edu-table th { background:#f8faff; color:#374151; font-weight:700; padding:8px 12px; text-align:left; border-bottom:1px solid #e5e7eb; width:42%; }

    .edu-table tr:last-child th, .edu-table tr:last-child td { border-bottom:none; }
    .edu-table-scroll { overflow-x:auto; }
    .edu-table-full { width:100%; border-collapse:collapse; font-size:.78rem; }
    .edu-table-full thead th { background:linear-gradient(135deg,#1a56db,#1e40af); color:#fff; padding:8px 12px; text-align:left; font-weight:700; }

    .edu-table-full tbody tr:last-child td { border-bottom:none; }

    /* ── Paragraph ── */
    .edu-para { font-size:.82rem; color:#374151; line-height:1.7; padding:10px 14px; border-bottom:1px solid #f1f5f9; }

    /* ── List ── */

    .edu-link-btn { display:inline-flex; align-items:center; gap:5px; padding:5px 12px; border-radius:6px; font-size:.73rem; font-weight:700; text-decoration:none; transition:opacity .15s; white-space:nowrap; }
    .edu-link-btn:hover { opacity:.82; }
    .edu-link-btn-green  { background:#059669; color:#fff; }
    .edu-link-btn-blue   { background:#1a56db; color:#fff; }
    .edu-link-btn-orange { background:#f97316; color:#fff; }
    .edu-link-btn-red    { background:#dc2626; color:#fff; }
    /* fallback buttons (old style) */
    .edu-links-wrap { padding:12px 14px; display:flex; flex-wrap:wrap; gap:8px; }
    .edu-btn { display:inline-flex; align-items:center; gap:6px; padding:8px 14px; border-radius:8px; font-size:.75rem; font-weight:700; text-decoration:none; transition:opacity .15s; }
    .edu-btn:hover { opacity:.85; }
    .edu-btn-green  { background:#059669; color:#fff; }
    .edu-btn-blue   { background:#1a56db; color:#fff; }
    .edu-btn-orange { background:#f97316; color:#fff; }
    .edu-btn-red    { background:#dc2626; color:#fff; }

    /* ── Notice ── */
    .edu-notice { background:#fef3c7; border:1px solid #fbbf24; border-radius:8px; padding:10px 14px; font-size:.75rem; color:#78350f; margin-bottom:14px; display:flex; gap:8px; align-items:flex-start; }

    /* ── Loading / Error ── */
    .edu-loading { text-align:center; padding:40px 20px; color:var(--muted); font-size:.9rem; }
    .edu-error { background:#fff1f2; border:1px solid #fca5a5; border-radius:10px; padding:20px; text-align:center; color:#991b1b; font-size:.85rem; }

    /* ── Section Title ── */
    .edu-sec-title { font-size:.88rem; font-weight:700; color:#1e293b; padding:10px 14px 6px; border-bottom:1px solid #f1f5f9; display:flex; align-items:center; gap:6px; }
    .edu-sec-title i { color:var(--blue); }

    /* ── Back Button ── */
    .edu-back-btn { display:inline-flex; align-items:center; gap:6px; font-size:.78rem; color:var(--blue); text-decoration:none; background:#eff6ff; padding:6px 12px; border-radius:8px; margin-bottom:12px; font-weight:600; }
    .edu-back-btn:hover { background:#dbeafe; }

    @media(max-width:600px) {
      .edu-hdr-title { font-size:.88rem; }
      .edu-table th { width:38%; }
    }
  
    /* ── Set as Preferred Source on Google (education pages) ── */
    .edu-ps-card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.04);overflow:hidden;}
    .edu-ps-head{background:linear-gradient(135deg,#1a56db,#1e40af);color:#fff;font-size:.86rem;font-weight:700;padding:9px 14px;display:flex;align-items:center;gap:8px;}
    .edu-ps-desc{font-size:.83rem;color:#374151;line-height:1.7;padding:10px 14px 8px;border-bottom:1px solid #f1f5f9;}
    .edu-ps-table-wrap{width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch;}
    .edu-ps-table{width:100%;border-collapse:collapse;font-size:.80rem;min-width:320px;}
    .edu-ps-table th{background:#f8fafc;color:#475569;font-weight:700;font-size:.73rem;text-transform:uppercase;letter-spacing:.04em;padding:7px 10px;border-bottom:1px solid #e2e8f0;text-align:left;white-space:nowrap;}
    .edu-ps-table td{padding:7px 10px;color:#1e293b;border-bottom:1px solid #f1f5f9;vertical-align:middle;font-size:.79rem;}
    .edu-ps-table tr:last-child td{border-bottom:none;}
    .edu-ps-org{font-size:.73rem;color:#64748b;font-style:italic;padding:5px 14px 8px;margin:0;border-top:1px solid #f1f5f9;}
    .edu-ps-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.73rem;font-weight:700;background:#dcfce7;color:#166534;white-space:nowrap;}
    @media(max-width:640px){.edu-ps-table th,.edu-ps-table td{padding:6px 8px;font-size:.74rem;}}
</style>
  <script type="application/ld+json" id="eduSchema">{}</script>
  <script>
  /* Education page schema — injected at runtime */
  (function(){
    var path = location.pathname;
    var secM = path.match(/\/education\/([^\/]+)\/?/);
    if (!secM) return;
    var sectionId = decodeURIComponent(secM[1]);
    var label = sectionId.replace(/-/g,' ').replace(/\b\w/g,function(c){return c.toUpperCase();});
    var canonUrl = 'https://www.topsarkarijobs.com/education/' + sectionId + '/';
    var el = document.getElementById('eduSchema');
    if (el) el.textContent = JSON.stringify({
      '@context':'https://schema.org','@type':'WebPage',
      'name': label + ' Education Results 2026 | Top Sarkari Jobs',
      'description': 'Latest ' + label + ' education results, admit cards, recruitment 2026. Check results, dates and more.',
      'url': canonUrl,
      'breadcrumb': {
        '@type':'BreadcrumbList',
        'itemListElement':[
          {'@type':'ListItem','position':1,'name':'Home','item':'https://www.topsarkarijobs.com/'},
          {'@type':'ListItem','position':2,'name':'Education','item':'https://www.topsarkarijobs.com/education/'},
          {'@type':'ListItem','position':3,'name':label,'item':canonUrl}
        ]
      }
    });
  })();
  </script>

  <script>
  (() => {
    'use strict';

    const safe = v => (v ?? '').toString().trim();
    const esc  = s => safe(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

    /* ── URL normalisation: /education/section-id/ → read section from path ── */
    (function normalizeEduUrl() {
      var pathM = location.pathname.match(/^\/education\/([^\/]+)\/?$/);
      if (pathM && !location.search) {
        /* Clean path — nothing to do, section extracted from path below */
      } else if (pathM && location.search) {
        /* Has both path and query — normalize to just path */
        try { window.history.replaceState({},'', '/education/' + pathM[1] + '/' + location.search); } catch(_){}
      }
    })();
    const params  = new URLSearchParams(location.search);
    /* Read section from clean URL path /education/{sectionId}/ or legacy ?section= param */
    var _pathSec = (function(){ var m = location.pathname.match(/^\/education\/([^\/]+)\/?$/); return m ? decodeURIComponent(m[1]) : ''; })();
    const sectionId = _pathSec || safe(params.get('section') || '');
    /* Update canonical to clean URL */
    (function(){
      var can = document.getElementById('canonicalTag') || document.querySelector('link[rel="canonical"]');
      if (can && sectionId) {
        var slug = safe(params.get('slug') || '');
        var cleanUrl = 'https://www.topsarkarijobs.com/education/' + encodeURIComponent(sectionId) + '/';
        if (slug) cleanUrl += '?slug=' + encodeURIComponent(slug);
        can.href = cleanUrl;
        try { window.history.replaceState({}, '', '/education/' + encodeURIComponent(sectionId) + '/' + (slug ? '?slug=' + encodeURIComponent(slug) : '')); } catch(_){}
      }
    })();
    const slugArg   = safe(params.get('slug') || '');

    const loadingEl = document.getElementById('edLoading');
    const errorEl   = document.getElementById('edError');
    const contentEl = document.getElementById('edContent');
    const bcSection = document.getElementById('bcSection');

    function showError(msg) {
      loadingEl.style.display = 'none';
      errorEl.style.display   = '';
      document.getElementById('edErrorMsg').textContent = msg;
    }

    function makeSlug(title) {
      return safe(title).toLowerCase()
        .replace(/[^\w\s-]/g,'')
        .replace(/\s+/g,'-')
        .replace(/-+/g,'-')
        .replace(/^-|-$/g,'')
        .slice(0,120);
    }

    /* ── Render Section List (no slug) ── */
    function renderSectionList(section) {
      const title = section.title || section.id || 'Education';
      const items = section.items || [];

      document.title = title + ' Education | Top Sarkari Jobs';
      bcSection.textContent = title;

      let html = `
        <h1 style="font-size:1rem;font-weight:800;color:#1e293b;margin-bottom:14px;padding-left:2px;">
          <i class="fa-solid fa-graduation-cap" style="color:var(--blue);"></i> ${esc(title)} – Education Updates
        </h1>
        <div class="edu-notice">
          <i class="fa-solid fa-circle-info" style="flex-shrink:0;margin-top:1px;"></i>
          <span>Click on any item below to view full details including important dates, links and more.</span>
        </div>
        <div class="edu-list-card">
          <div class="edu-list-head">
            <i class="fa-solid fa-list"></i> ${esc(title)} Education (${items.length} Items)
          </div>`;

      items.forEach((item, idx) => {
        const slug = makeSlug(item.name || item.examName || '');
        const url  = `/education/${encodeURIComponent(sectionId)}/?slug=${encodeURIComponent(slug)}`;
        const date = safe(item.date || item.postDate || '');
        const cat  = safe(item.category || '');
        html += `
          <a href="${url}" class="edu-list-item">
            <span class="edu-list-num">${idx+1}</span>
            <div>
              <div class="edu-list-title">${esc(item.name || item.examName || 'Untitled')}</div>
              ${date ? `<div class="edu-list-date"><i class="fa-regular fa-calendar" style="color:var(--blue);"></i> ${esc(date)}</div>` : ''}
              ${cat  ? `<span class="edu-list-badge">${esc(cat)}</span>` : ''}
            </div>
          </a>`;
      });

      html += `</div>`;
      return html;
    }

    /* ── Render Content Blocks ── */
    function renderContent(blocks) {
      let html = '';
      blocks.forEach(block => {
        const type = (block.type || '').toLowerCase();

        if (type === 'paragraph') {
          const text = safe(block.text || '');
          if (text) html += `<div class="edu-para">${esc(text)}</div>`;

        } else if (type === 'table') {
          const rows = block.rows || [];
          if (!rows.length) return;

          // First row might be headers if block.headers is empty
          let headers = block.headers || [];
          let dataRows = rows;
          if (!headers.length && rows.length > 0 && rows[0].length) {
            // Check if first row looks like header (no numbers/dates)
            headers = rows[0];
            dataRows = rows.slice(1);
          }

          // 2-col table (key-value): use th/td layout
          if (headers.length === 2 || (dataRows.length && dataRows[0].length === 2)) {
            html += `<div class="edu-table-scroll"><table class="edu-table"><tbody>`;
            dataRows.forEach(row => {
              if (row.length >= 2) {
                html += `<tr><th>${esc(row[0])}</th><td>${esc(row[1])}</td></tr>`;
              }
            });
            html += `</tbody></table></div>`;
          } else {
            // Multi-col table
            html += `<div class="edu-table-scroll"><table class="edu-table-full"><thead><tr>`;
            headers.forEach(h => { html += `<th>${esc(h)}</th>`; });
            html += `</tr></thead><tbody>`;
            dataRows.forEach(row => {
              html += `<tr>`;
              row.forEach(cell => { html += `<td>${esc(cell)}</td>`; });
              html += `</tr>`;
            });
            html += `</tbody></table></div>`;
          }

        } else if (type === 'list') {
          const listItems = block.items || [];
          if (!listItems.length) return;
          const tag = (block.style || 'unordered') === 'ordered' ? 'ol' : 'ul';
          const cls = tag === 'ol' ? 'edu-ol' : 'edu-ul';
          html += `<${tag} class="${cls}">`;
          listItems.forEach(li => { html += `<li>${esc(li)}</li>`; });
          html += `</${tag}>`;

        } else if (type === 'merged_info') {
          const items = block.items || [];
          items.forEach(mi => {
            const label = safe(mi.label || '');
            const text  = safe(mi.text  || '');
            if (!label && !text) return;
            html += `<div class="edu-mi-item">`;
            if (label) html += `<div class="edu-mi-label">${esc(label)}</div>`;
            if (text)  html += `<div class="edu-mi-text">${esc(text)}</div>`;
            html += `</div>`;
          });

        } else if (type === 'important_links') {
          const links = block.links || [];
          if (!links.length) return;

          function categorizeLinkBtn(label) {
            const l = label.toLowerCase();
            if (/apply|register|form/i.test(l)) return 'edu-link-btn-green';
            if (/result|merit|score/i.test(l))  return 'edu-link-btn-orange';
            if (/admit|hall|call/i.test(l))      return 'edu-link-btn-orange';
            if (/notif|pdf|download/i.test(l))   return 'edu-link-btn-blue';
            if (/website|portal|official/i.test(l)) return 'edu-link-btn-red';
            return 'edu-link-btn-blue';
          }

          // Render as proper table with S.No, Name, Link columns
          html += `<div class="edu-links-table-wrap">
            <table class="edu-links-tbl">
              <thead>
                <tr>
                  <th style="width:50px;">S.No</th>
                  <th>Name / Description</th>
                  <th style="width:130px;">Link</th>
                </tr>
              </thead>
              <tbody>`;
          let sno = 1;
          links.forEach(lnk => {
            const href  = safe(lnk.url || lnk.href || '#');
            const label = safe(lnk.label || lnk.title || lnk.text || 'Official Link');
            const cls   = categorizeLinkBtn(label);
            if (!href || href === '#') return;
            html += `<tr>
              <td style="text-align:center;font-weight:700;color:#1a56db;">${sno++}</td>
              <td>${esc(label)}</td>
              <td><a href="${esc(href)}" class="edu-link-btn ${cls}" target="_blank" rel="noopener noreferrer">
                <i class="fa-solid fa-arrow-up-right-from-square"></i> Open
              </a></td>
            </tr>`;
          });
          html += `</tbody></table></div>`;
        }
      });
      return html;
    }

    /* ── Render Detail View ── */
    function renderDetail(item, sectionTitle) {
      const detail = item.detail || {};
      const title  = safe(detail.title || item.name || item.examName || 'Education Detail');
      const shortInfo = safe(detail.short_info || '');
      const sections  = detail.sections || [];

      document.title = title + ' | Top Sarkari Jobs';
      bcSection.textContent = title.slice(0, 50) + (title.length > 50 ? '…' : '');

      // Update meta
      const metaDesc = document.getElementById('metaDesc');
      if (metaDesc) metaDesc.setAttribute('content', shortInfo.slice(0, 160) || title);
      const ogTitle = document.getElementById('ogTitle');
      if (ogTitle) ogTitle.setAttribute('content', title + ' | Top Sarkari Jobs');

      let html = '';

      // Header
      const postDate = safe(item.postDate || item.date || '');
      const category = safe(item.category || sectionTitle || '');
      html += `
        <div class="edu-hdr">
          <div class="edu-hdr-title">${esc(title)}</div>
          <div class="edu-hdr-meta">
            ${category ? `<span><i class="fa-solid fa-tag"></i> ${esc(category)}</span>` : ''}
            ${postDate ? `<span><i class="fa-regular fa-calendar"></i> ${esc(postDate)}</span>` : ''}
          </div>
        </div>`;

      // Short Info
      if (shortInfo) {
        html += `<div class="edu-short-info">${esc(shortInfo)}</div>`;
      }

      // Notice
      html += `
        <div class="edu-notice">
          <i class="fa-solid fa-triangle-exclamation" style="flex-shrink:0;margin-top:1px;"></i>
          <span><strong>Important:</strong> Always verify details on the official website before applying. Dates &amp; eligibility may change without notice.</span>
        </div>`;

      // Official link (top)
      const officialUrl = safe(item.url || '');
      if (officialUrl && officialUrl.startsWith('http')) {
        html += `
          <div class="edu-card" style="margin-bottom:12px;">
            <div class="edu-links-wrap">
              <a href="${esc(officialUrl)}" class="edu-btn edu-btn-green" target="_blank" rel="noopener noreferrer">
                <i class="fa-solid fa-globe"></i> Official Website / Portal
              </a>
            </div>
          </div>`;
      }

      // Render each section from detail.sections (in sequence order)
      sections.forEach(sec => {
        const heading  = safe(sec.heading || '');
        const contents = sec.content || [];
        if (!contents.length) return;

        const bodyHtml = renderContent(contents);
        if (!bodyHtml.trim()) return;

        html += `<div class="edu-card">`;
        if (heading) {
          html += `<div class="edu-sec-title"><i class="fa-solid fa-circle-dot"></i> ${esc(heading)}</div>`;
        }
        html += `<div class="edu-card-body">${bodyHtml}</div></div>`;
      });

      // Render top-level important_links from item.detail.important_links
      const topLinks = detail.important_links || {};
      const structLinks = topLinks.structured_links || [];
      const clickHereLinks = topLinks.click_here || [];

      // Build unified links array - prefer structured_links, else fallback to click_here
      let allLinks = [];
      if (structLinks.length) {
        allLinks = structLinks.map((l, i) => ({
          label: l.label || ('Link ' + (i+1)),
          url: l.url || l.href || ''
        }));
      } else if (clickHereLinks.length) {
        allLinks = clickHereLinks.map((u, i) => ({
          label: 'Official Link ' + (i+1),
          url: u
        }));
      }

      if (allLinks.length) {
        function categorizeLinkBtnTop(label) {
          const l = label.toLowerCase();
          if (/apply|register|form/i.test(l)) return 'edu-link-btn-green';
          if (/result|merit|score/i.test(l))  return 'edu-link-btn-orange';
          if (/admit|hall|call/i.test(l))      return 'edu-link-btn-orange';
          if (/notif|pdf|download/i.test(l))   return 'edu-link-btn-blue';
          if (/website|portal|official/i.test(l)) return 'edu-link-btn-red';
          return 'edu-link-btn-blue';
        }
        let linksHtml = `<div class="edu-card">
          <div class="edu-card-head" style="background:linear-gradient(135deg,#1a56db,#1e40af);">
            <i class="fa-solid fa-link"></i> Important Links
          </div>
          <div class="edu-card-body">
            <div class="edu-links-table-wrap">
              <table class="edu-links-tbl">
                <thead><tr>
                  <th style="width:50px;">S.No</th>
                  <th>Name / Description</th>
                  <th style="width:130px;">Link</th>
                </tr></thead>
                <tbody>`;
        allLinks.forEach((lnk, idx) => {
          if (!lnk.url || lnk.url === '#') return;
          const cls = categorizeLinkBtnTop(lnk.label);
          linksHtml += `<tr>
            <td style="text-align:center;font-weight:700;color:#1a56db;">${idx+1}</td>
            <td>${esc(lnk.label)}</td>
            <td><a href="${esc(lnk.url)}" class="edu-link-btn ${cls}" target="_blank" rel="noopener noreferrer">
              <i class="fa-solid fa-arrow-up-right-from-square"></i> Open
            </a></td>
          </tr>`;
        });
        linksHtml += `</tbody></table></div></div></div>`;
        html += linksHtml;
      }

      return html;
    }

    /* ── Main Load ── */
    fetch('/Education_Jobs.json')
      .then(r => {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      })
      .then(data => {
        const allSections = data.sections || [];

        // Find the section matching sectionId
        const section = allSections.find(s => s.id === sectionId || s.title === sectionId);

        if (!section) {
          if (!sectionId) {
            // No section param: show all sections list
            bcSection.textContent = 'All Education';
            let html = `<h1 style="font-size:1rem;font-weight:800;color:#1e293b;margin-bottom:14px;padding-left:2px;">
              <i class="fa-solid fa-graduation-cap" style="color:var(--blue);"></i> Education State Wise – All Sections
            </h1>`;
            allSections.forEach(sec => {
              html += `<a href="/education/${encodeURIComponent(sec.id)}/" class="edu-list-item" style="display:flex;background:#fff;border-radius:10px;box-shadow:var(--shadow);margin-bottom:8px;padding:12px 14px;text-decoration:none;color:inherit;align-items:center;gap:10px;">
                <i class="fa-solid fa-graduation-cap" style="color:var(--blue);font-size:1.1rem;"></i>
                <div>
                  <div class="edu-list-title">${esc(sec.title)}</div>
                  <div class="edu-list-date">${sec.items ? sec.items.length + ' items' : ''}</div>
                </div>
                <i class="fa-solid fa-chevron-right" style="margin-left:auto;color:#d1d5db;font-size:.7rem;"></i>
              </a>`;
            });
            loadingEl.style.display = 'none';
            contentEl.innerHTML = html;
            contentEl.style.display = '';
            return;
          }
          showError('Section "' + sectionId + '" not found in Education_Jobs.json.');
          return;
        }

        let html = '';

        if (slugArg) {
          // Find item by slug
          const items = section.items || [];
          const item  = items.find(it => {
            const itSlug = makeSlug(it.name || it.examName || '');
            return itSlug === slugArg;
          });

          if (!item) {
            // Try partial match
            const partial = items.find(it => {
              const itSlug = makeSlug(it.name || it.examName || '');
              return itSlug.includes(slugArg) || slugArg.includes(itSlug.slice(0,20));
            });
            if (!partial) {
              showError('Item not found. Please go back and try again.');
              return;
            }
            html = renderDetail(partial, section.title);
          } else {
            html = renderDetail(item, section.title);
          }

          // Add "Back to section" link at bottom
          html += `
            <div style="margin-top:16px;text-align:center;">
              <a href="/education/${encodeURIComponent(sectionId)}/" class="edu-back-btn">
                <i class="fa-solid fa-arrow-left"></i> Back to ${esc(section.title)} List
              </a>
            </div>`;
        } else {
          // Show section item list
          html = renderSectionList(section);
        }


        /* ── Set as Preferred Source on Google ── */
        (function injectEduPS() {
          var _secTitle = (section && section.title) || sectionId || 'Education';
          var _isItem = !!(slugArg && item);
          var _itemName = _isItem ? (item.name || item.examName || _secTitle) : '';
          var _itemDate = _isItem ? (item.date || item.postDate || '2026') : '2026';
          var _itemCat  = _isItem ? (item.category || 'Board / University') : 'Board / University';

          /* Description */
          var _desc = _isItem
            ? esc(_itemName) + ' — ' + esc(_secTitle) + ' Education 2026. Get complete details, important dates, result, admit card and more at Top Sarkari Jobs.'
            : esc(_secTitle) + ' Education 2026 — Get complete details, official notifications, results, admit cards and exam dates at Top Sarkari Jobs.';

          /* Table rows */
          var _tableRows = _isItem
            ? '<tr>' +
              '<td><span class="edu-ps-badge">Education</span></td>' +
              '<td>' + esc(_itemName.length > 35 ? _itemName.substring(0,35)+'...' : _itemName) + '</td>' +
              '<td>' + esc(_itemDate) + '</td>' +
              '<td>' + esc(_itemCat) + '</td>' +
              '</tr>'
            : '<tr>' +
              '<td><span class="edu-ps-badge">Education</span></td>' +
              '<td>' + esc(_secTitle) + '</td>' +
              '<td>2026</td>' +
              '<td>State / Board Results</td>' +
              '</tr>';

          var psHtml = '<div class="edu-ps-card">' +
            '<div class="edu-ps-head"><i class="fa-solid fa-google"></i>&nbsp; Set as Preferred Source on Google</div>' +
            '<p class="edu-ps-desc">' + _desc + '</p>' +
            '<div class="edu-ps-table-wrap"><table class="edu-ps-table">' +
            '<thead><tr><th>Page Type</th><th>' + (_isItem ? 'Exam / Notification' : 'State / Board') + '</th><th>Date / Year</th><th>Category</th></tr></thead>' +
            '<tbody>' + _tableRows + '</tbody>' +
            '</table></div>' +
            '<p class="edu-ps-org">Top Sarkari Jobs — India No.1 Sarkari Jobs Portal</p>' +
            '</div>';
          html = psHtml + html;
        })();
        loadingEl.style.display = 'none';
        contentEl.innerHTML = html;
        contentEl.style.display = '';
      })
      .catch(err => {
        showError('Failed to load Education_Jobs.json: ' + err.message);
      });

  })();
  </script>

  <!-- External scripts -->
  <script src="/tsj-menu.js" defer></script>
</body>
</html>
