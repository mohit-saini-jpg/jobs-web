<!--
  FULL EXAMPLE — how to call the SEO hook in your existing JS:
  ─────────────────────────────────────────────────────────────
  (somewhere after you render the job data)

  function renderJob(jobData) {
    // ... your existing render code ...

    // ✅ ADD THIS BLOCK at the end of your render function:
    var seoJob = {
      title:           jobData.title || jobData.post_name || '',
      slug:            jobData.slug  || slugify(jobData.title || ''),
      org:             jobData.organization || jobData.dept || jobData.board || '',
      location:        jobData.state || jobData.location || 'India',
      datePosted:      jobData.notification_date || jobData.date || new Date().toISOString().split('T')[0],
      lastDate:        jobData.last_date || jobData.lastDate || '',
      salary:          extractSalary(jobData.salary || jobData.pay_scale || ''),
      totalVacancies:  String(jobData.total_vacancies || jobData.vacancies || ''),
      applyUrl:        window.location.href,
      desc:            jobData.short_desc || jobData.description || ''
    };
    if (window.__SEO_ENGINE_JOB_READY) window.__SEO_ENGINE_JOB_READY(seoJob);
  }

  function extractSalary(str) {
    var m = String(str).match(/[\d,]+/);
    return m ? m[0].replace(/,/g,'') : '';
  }
-->
