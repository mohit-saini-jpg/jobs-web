<!DOCTYPE html>
<html lang="en-IN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>VLE Admin Approval Panel | Top Sarkari Jobs</title>
<meta name="robots" content="noindex,nofollow"/>
<link rel="icon" href="/image.ico"/>
<link rel="preload" href="/fonts/fa/all.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'"/>
<noscript><link rel="stylesheet" href="/fonts/fa/all.min.css"/></noscript>
<link rel="stylesheet" href="/vle/vle.css"/>
</head>
<body>

<div class="vle-shell" id="vleAdminApp" style="display:none">
  <div class="vle-topbar">
    <div class="who">
      <b>VLE Admin</b>
      <span>Approval Panel</span>
    </div>
    <button class="vle-logout" id="vleAdminLogoutBtn"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
  </div>

  <div class="vle-card">
    <h2><i class="fa-solid fa-user-clock"></i> Pending VLEs (<span id="vlePendingCount">0</span>)</h2>
    <div id="vlePendingList"><div class="vle-empty">Loading…</div></div>
  </div>
</div>

<div class="vle-center" id="vleAdminLoginScreen" style="display:none">
  <div class="vle-auth-card">
    <div class="vle-auth-head">
      <span class="badge">ADMIN ONLY</span>
      <h1>VLE Admin Login</h1>
      <p>Naye VLE signups approve/reject karein</p>
    </div>
    <form id="vleAdminLoginForm" autocomplete="on">
      <div class="vle-field">
        <label for="vleAdminEmail">Email</label>
        <input type="email" id="vleAdminEmail" required autocomplete="username" placeholder="admin@example.com">
      </div>
      <div class="vle-field">
        <label for="vleAdminPassword">Password</label>
        <input type="password" id="vleAdminPassword" required autocomplete="current-password" placeholder="••••••••">
      </div>
      <button type="submit" class="vle-btn vle-btn-primary">
        <i class="fa-solid fa-right-to-bracket"></i> Login
      </button>
      <div class="vle-msg" id="vleAdminLoginMsg"></div>
    </form>
  </div>
</div>

<div class="vle-center" id="vleAdminLoadingScreen">
  <i class="fa-solid fa-spinner fa-spin" style="font-size:1.6rem;color:#0f766e"></i>
</div>

<script src="/vle/vle-auth.js"></script>
<script src="/vle/vle-admin.js"></script>
</body>
</html>
